const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DB = {
  userId: null,
  timer: null,
  async init(userId) {
    this.userId = userId;
    try {
      const { data } = await sb.from('user_data').select('store').eq('user_id', userId).single();
      if (data?.store) {
        Object.entries(data.store).forEach(([k, v]) => { if (v != null) localStorage.setItem(k, JSON.stringify(v)); });
      }
    } catch(e) {}
  },
  schedule() {
    clearTimeout(this.timer);
    this.timer = setTimeout(() => this.flush(), 1500);
  },
  async flush() {
    if (!this.userId) return;
    const store = {};
    ['transactions','fixedExpenses','budgets','networth','settings','cards'].forEach(k => {
      try { const v = localStorage.getItem(k); if (v) store[k] = JSON.parse(v); } catch(e) {}
    });
    try { await sb.from('user_data').upsert({ user_id: this.userId, store, updated_at: new Date().toISOString() }); } catch(e) {}
  }
};

const Store = {
  get: (key, def={}) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => { localStorage.setItem(key, JSON.stringify(val)); DB.schedule(); },
};

function triggerBackupDownload() {
  const data = {};
  ['transactions','fixedExpenses','budgets','networth','settings','cards'].forEach(k => {
    try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jiyujin-auto-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('lastAutoBackup', String(Date.now()));
}

function autoBackupCheck() {
  const s = Store.get('settings', {});
  if (!s.autoBackup) return;
  const txns = Store.get('transactions', []);
  if (!txns.length) return;
  const last = parseInt(localStorage.getItem('lastAutoBackup') || '0');
  const msDay = 86400000;
  const threshold = s.autoBackupInterval === 'weekly' ? 7 * msDay : msDay;
  if (Date.now() - last >= threshold) triggerBackupDownload();
}

function getCards() {
  const c = Store.get('cards', []);
  if (!c.length) return DEFAULT_CARDS;
  const names = new Set(c.map(x => x.name));
  const extras = [
    { id: 'cash-base', name: '現金',   last4: '' },
    { id: 'pp-base',   name: 'PayPay', last4: '' },
  ].filter(x => !names.has(x.name));
  return [...c, ...extras];
}
function cardColor(cards, name) { const i = cards.findIndex(c=>c.name===name); return i>=0 ? CARD_PALETTE[i%CARD_PALETTE.length] : '#9ca3af'; }

            style={{ width:'100%', fontSize:14, padding:'12px 16px', border:`1.5px solid ${C.border}`, borderRadius:12, outline:'none', background:C.bg, color:C.text }} />
        </div>

        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, marginBottom:6 }}>支払い</div>
          <select value={pay} onChange={e=>setPay(e.target.value)}
            style={{ width:'100%', fontSize:14, padding:'12px 16px', border:`1.5px solid ${C.border}`, borderRadius:12, outline:'none', background:C.bg, color:C.text, appearance:'none' }}>
            {getCards().map(c => <option key={c.id} value={c.name}>{c.name}{c.last4?` (${c.last4})`:''}</option>)}
          </select>
        </div>

        <div style={{ display:'flex', gap:8 }}>
          <button onClick={onDelete} style={{ flex:1, background:'#FEE2E2', color:'#DC2626', borderRadius:12, padding:'14px', fontSize:13, fontWeight:700, border:'none', cursor:'pointer' }}>削除</button>
          <button onClick={save} style={{ flex:2, background:C.primary, color:'white', borderRadius:12, padding:'14px', fontSize:14, fontWeight:700, border:'none', cursor:'pointer' }}>保存する</button>
        </div>
      </div>
    </div>
  );
}

// ── 06 Home ────────────────────────────────────────────────────────────────
function HomeScreen({ go }) {
  const [editTxn, setEditTxn] = useState(null);
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const isBiz = userType !== 'employee';
  const settingsIncome = (s.salary||0) + (s.sideIncome||0) + (s.income||0);
  const taxRate = s.taxRate || (userType === 'employee' ? 0 : 20);
  const savingsGoal = s.savingsGoal || 0;
  const today = new Date();
  const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const daysLeft = daysInMonth - today.getDate();
  const fixedTotal = Store.get('fixedExpenses',[]).filter(i=>i.active).reduce((s,i)=>s+i.amount,0);

  const mTxns = getThisMonthTxns();
  const allTxns = Store.get('transactions',[]);

  const confirmedIncome = mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const displayIncome = settingsIncome || confirmedIncome;

  const lifeSpent   = sumDiv(mTxns, '生活費');
  const bizSpent    = sumDiv(mTxns, '事業費');
  const taxSaved    = sumDiv(mTxns, '税金');
  const investSaved = sumDiv(mTxns, '投資');
  const totalSpent  = mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const bdg = Store.get('budgets', {});
  const lifeBudget  = bdg['生活費']  || 0;
  const bizBudget   = bdg['事業費']  || 0;
  const taxGoal     = bdg['税金積立'] || (displayIncome > 0 ? Math.round(displayIncome * taxRate / 100) : 0);
  const investGoal  = bdg['投資']    || savingsGoal;
  const totalBudget = lifeBudget + bizBudget + taxGoal + investGoal;

  const taxShortfall = Math.max(0, taxGoal - taxSaved);
  const taxSurplus   = Math.max(0, taxSaved - taxGoal);

  const lifeBizBudget = lifeBudget + bizBudget || Math.max(0, displayIncome - taxGoal - investGoal - fixedTotal);
  const lifeBizSpent  = lifeSpent + bizSpent;
  const lifeBizLeft   = lifeBizBudget - lifeBizSpent;
  const dailyBudget   = daysLeft > 0 ? Math.round(lifeBizLeft / daysLeft) : 0;
  const lifeLeft      = Math.max(0, lifeBudget - lifeSpent);
  const bizLeft       = Math.max(0, bizBudget  - bizSpent);

  const daysSoFar = today.getDate();
  const dailyRate = daysSoFar > 0 ? lifeBizSpent / daysSoFar : 0;
  const projected = Math.round(dailyRate * daysInMonth);
  const monthEndBalance = Math.round(displayIncome - projected - taxGoal - investGoal - fixedTotal);

  const nwData = Store.get('networth', { assets: [], liabilities: [] });
  const totalAssets = (nwData.assets||[]).reduce((s,a)=>s+a.amount,0);
  const totalLiab = (nwData.liabilities||[]).reduce((s,l)=>s+l.amount,0);
  const netWorth = totalAssets - totalLiab;
  const matchAssets = (kw) => (nwData.assets||[]).filter(a=>kw.some(k=>(a.name||'').includes(k)||(a.category||'').includes(k))).reduce((s,a)=>s+a.amount,0);
  const cashAmt   = matchAssets(['現金','預金','銀行','口座']);
  const investAmt = matchAssets(['NISA','投資','株','信託','iDeCo','積立']);
  const bizAmt    = matchAssets(['事業','法人','ビジネス']);
  const otherAmt  = Math.max(0, totalAssets - cashAmt - investAmt - bizAmt);

  const recentTxns = allTxns.slice(0, 5);
  const monthLabel = `${today.getMonth()+1}月`;
  const dateLabel = `${today.getFullYear()}年${today.getMonth()+1}月 · ${today.getDate()}日現在`;

  const spendPct = lifeBizBudget > 0 ? Math.round(lifeBizSpent/lifeBizBudget*100) : 0;
  const advisoryBad = spendPct >= 90 || taxShortfall > 0;
  let advisory = '';
  if (totalSpent === 0) advisory = 'まだ今月の記録がありません。入力してみましょう。';
  else if (spendPct >= 90) advisory = lifeBizLeft < 0 ? `消費枠の${spendPct}%を使用。-¥${fmt(-lifeBizLeft)}の超過です。` : `消費枠の${spendPct}%を使用。残り${daysLeft}日で¥${fmt(lifeBizLeft)}です。`;
  else if (taxShortfall > 0 && taxGoal > 0) advisory = `税金積立が¥${fmt(taxShortfall)}不足。月内に積立を。`;
  else if (spendPct <= 60 && daysLeft < 15) advisory = `消費ペースは良好（${spendPct}%）。このペースをキープ！`;
  else advisory = `${monthLabel}は順調です。このペースをキープしましょう。`;

  return (
    <Screen>
      <div style={{ flex:1, overflowY:'auto', paddingTop:48 }}>

        <div style={{ padding:'14px 20px 10px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <div style={{ fontSize:20, fontWeight:700, color:C.text, letterSpacing:'-0.5px' }}>{monthLabel}の家計</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:1 }}>{dateLabel}</div>
          </div>
        </div>

        {/* ── ① 結論 ── */}
        <div style={{ margin:'0 16px 16px', background:'linear-gradient(135deg, #1D2A22 0%, #0B1F17 100%)', borderRadius:24, padding:'22px 22px 18px', position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', right:-44, top:-44, width:160, height:160, background:'rgba(9,125,96,0.14)', borderRadius:'50%', pointerEvents:'none' }} />
          {isBiz ? (
            <>
              <div style={{ fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.48)', marginBottom:8, letterSpacing:'0.02em' }}>今月あと使える金額</div>
              <div style={{ display:'flex', gap:8, marginBottom:8 }}>
                <div style={{ flex:1, background:'rgba(255,255,255,0.07)', borderRadius:12, padding:'10px 12px' }}>
                  <div style={{ fontSize:10, color:'rgba(255,255,255,0.42)', marginBottom:3 }}>🏠 生活費あと</div>

                </div>
                <div style={{ flex:1, background:'rgba(255,255,255,0.07)', borderRadius:12, padding:'10px 12px' }}>

          ) : (

              <div style={{ fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.48)', marginBottom:3, letterSpacing:'0.02em' }}>{lifeBizLeft < 0 ? '今月の超過金額' : '今月あと使える金額'}</div>

              </div>
              <div style={{ fontSize:12, color:'rgba(255,255,255,0.38)', marginBottom:15 }}>
                {lifeBizLeft < 0 ? `予算を¥${fmt(-lifeBizLeft)}オーバーしています` : `残り${daysLeft}日 · 1日あたり ¥${fmt(dailyBudget)}ペースで使えます`}
              </div>

          <div style={{ display:'flex', gap:10 }}>
            <div style={{ flex:1, background:'rgba(255,255,255,0.08)', borderRadius:12, padding:'10px 12px' }}>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.42)', marginBottom:3 }}>月末残り予測</div>

// ── 07 History ─────────────────────────────────────────────────────────────
function HistoryScreen({ go }) {
  const [txns, setTxns] = useState(() => Store.get('transactions', []).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')));
  const [editTxn, setEditTxn] = useState(null);
  const [filter, setFilter] = useState('all');
  const [selectMode, setSelectMode] = useState(false);
  const [bulkSel, setBulkSel] = useState(new Set());

  const filtered = filter === 'all' ? txns
    : filter === 'income' ? txns.filter(t=>t.type==='income')
    : txns.filter(t=>t.division===filter);

  const groups = [];
  filtered.forEach(t => {
    const ym = t.date ? t.date.slice(0,7) : '不明';
    const last = groups[groups.length-1];
    if (!last || last.ym !== ym) groups.push({ ym, label: ym !== '不明' ? `${ym.slice(0,4)}年${parseInt(ym.slice(5,7))}月` : '不明', items: [t] });
    else last.items.push(t);
  });

  const allBulkSel = filtered.length > 0 && filtered.every(t => bulkSel.has(t.id));
  const toggleAllBulk = () => {
    if (allBulkSel) setBulkSel(new Set());
    else setBulkSel(new Set(filtered.map(t => t.id)));
  };
  const toggleBulk = id => {
    const next = new Set(bulkSel);
    next.has(id) ? next.delete(id) : next.add(id);
    setBulkSel(next);
  };
  const bulkDelete = () => {
    if (!bulkSel.size) return;
    const next = txns.filter(t => !bulkSel.has(t.id));
    setTxns(next); Store.set('transactions', next);
    setBulkSel(new Set()); setSelectMode(false);
  };
  const handleSave = updated => {
    const next = txns.map(t=>t.id===updated.id?updated:t);
    setTxns(next); Store.set('transactions', next); setEditTxn(null);
  };
  const handleDelete = () => {
    const next = txns.filter(t=>t.id!==editTxn.id);
    setTxns(next); Store.set('transactions', next); setEditTxn(null);
  };

  return (
    <Screen>
      <div style={{ flex:1, overflowY:'auto', padding:'16px 16px 20px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
          <button onClick={()=>go('home')} style={{ width:36, height:36, borderRadius:10, background:'white', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 1px 6px rgba(0,0,0,0.08)', flexShrink:0, border:'none', cursor:'pointer' }}>
            <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke={C.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:20, fontWeight:700, color:C.text }}>記録一覧</div>
            <div style={{ fontSize:12, color:C.textMuted }}>{selectMode ? `${bulkSel.size}件選択中` : 'タップで編集・削除できます'}</div>
          </div>
          <button onClick={() => { setSelectMode(v => !v); setBulkSel(new Set()); }} style={{ padding:'7px 14px', borderRadius:10, background:selectMode?C.bg:'#FEE2E2', color:selectMode?C.textMuted:'#DC2626', fontSize:12, fontWeight:700, border:'none', cursor:'pointer', flexShrink:0 }}>
            {selectMode ? 'キャンセル' : '一括消去'}
          </button>
        </div>

        <div style={{ display:'flex', gap:6, marginBottom:16, overflowX:'auto', paddingBottom:4 }}>
          {[['all','すべて'],['income','収入'],['生活費','生活費'],['事業費','事業費'],['税金','税金'],['投資','投資']].map(([v,l]) => (
            <button key={v} onClick={()=>setFilter(v)} style={{ background:filter===v?C.primary:'white', color:filter===v?'white':C.textMuted, borderRadius:999, padding:'7px 16px', fontSize:11, fontWeight:filter===v?700:500, whiteSpace:'nowrap', flexShrink:0, boxShadow:'0 1px 4px rgba(0,0,0,0.06)', border:'none', cursor:'pointer' }}>{l}</button>
          ))}
        </div>

        {selectMode && (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12, padding:'0 4px' }}>
            <button onClick={toggleAllBulk} style={{ display:'flex', alignItems:'center', gap:8, background:'none', border:'none', cursor:'pointer', padding:0 }}>
              <div style={{ width:20, height:20, borderRadius:5, border:`2px solid ${allBulkSel?C.primary:C.border}`, background:allBulkSel?C.primary:'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                {allBulkSel && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <span style={{ fontSize:13, fontWeight:600, color:C.text }}>全選択</span>
            </button>
            <span style={{ fontSize:12, color:C.textMuted }}>{bulkSel.size}件 / {filtered.length}件</span>
          </div>
        )}

        {groups.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 0', color:C.textFaint, fontSize:13 }}>記録がありません</div>
        ) : groups.map(({ ym, label, items }) => {
          const inc = items.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
          const exp = items.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
          return (
            <div key={ym} style={{ marginBottom:20 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, padding:'0 4px' }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.textMuted }}>{label}</div>
                <div style={{ fontSize:11, color:C.textMuted, fontFeatureSettings:tnum }}>
                  {inc>0&&<span style={{ color:C.primary }}>+¥{fmt(inc)} </span>}
                  {exp>0&&<span>-¥{fmt(exp)}</span>}
                </div>
              </div>
              {items.map(t => {
                const sel = bulkSel.has(t.id);
                return (
                  <button key={t.id} onClick={() => selectMode ? toggleBulk(t.id) : setEditTxn(t)} style={{ width:'100%', background:sel?C.primaryLight:'white', borderRadius:13, padding:'11px 14px', display:'flex', alignItems:'center', gap:10, marginBottom:6, boxShadow:'0 1px 4px rgba(0,0,0,0.04)', textAlign:'left', border:`1.5px solid ${sel?C.primary:'transparent'}`, cursor:'pointer' }}>
                    {selectMode && (
                      <div style={{ width:20, height:20, borderRadius:5, border:`2px solid ${sel?C.primary:C.border}`, background:sel?C.primary:'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                        {sel && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                    )}
                    {!selectMode && <span style={{ fontSize:18 }}>{t.type==='income'?'💰':(CAT_EMOJI[t.category]||'📋')}</span>}
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:C.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.memo||t.source||t.category}</div>
                      <div style={{ fontSize:10, color:C.textMuted, marginTop:1 }}>{t.date} · {t.type==='income'?'収入':(t.division||t.category)}</div>
                      {t.payment && <div style={{ marginTop:3 }}><CardBadge name={t.payment} /></div>}
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color:t.type==='income'?C.primary:C.text, fontFeatureSettings:tnum, flexShrink:0 }}>
                      {t.type==='income'?'+':'-'}¥{fmt(t.amount)}
                    </div>
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>

      {selectMode ? (
        <div style={{ padding:'12px 20px 16px', flexShrink:0, background:'white', borderTop:`1px solid ${C.bgCard}` }}>
          <button onClick={bulkDelete} style={{ width:'100%', background:bulkSel.size>0?'#DC2626':C.border, color:'white', borderRadius:16, padding:'16px', fontSize:15, fontWeight:700, border:'none', cursor:bulkSel.size>0?'pointer':'default', boxShadow:bulkSel.size>0?'0 6px 20px rgba(220,38,38,0.3)':'none' }}>
            {bulkSel.size > 0 ? `${bulkSel.size}件を削除する` : '削除する記録を選んでください'}
          </button>
        </div>
      ) : (
        <BottomNav active="home" go={go} />
      )}

      {editTxn && (
        <TxnEditModal
          txn={editTxn}
          onSave={handleSave}
          onDelete={handleDelete}
          onClose={()=>setEditTxn(null)}
        />
      )}
    </Screen>
  );
}

  );
}

// ── 09 Tax & Savings ───────────────────────────────────────────────────────
function TaxScreen({ go }) {
  const s = Store.get('settings', {});
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const goalAmt = Math.round(income * taxRate / 100);
  const txns = getThisMonthTxns();
  const savedAmt = sumDiv(txns, '税金');
  const pct = goalAmt > 0 ? Math.min(100, Math.round(savedAmt / goalAmt * 100)) : 0;
  const dashOffset = Math.round(327 * (1 - pct / 100));
  const remaining = Math.max(0, goalAmt - savedAmt);
  const today = new Date();
  const daysLeft = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate() - today.getDate();

  const allTxns = Store.get('transactions', []);
  const history = Array.from({length: 4}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const ym = d.toISOString().slice(0,7);
    const label = `${d.getMonth()+1}月`;
    const mSaved = allTxns.filter(t => t.date && t.date.startsWith(ym) && t.type==='expense' && t.division==='税金').reduce((s,t)=>s+t.amount,0);
    const mPct = goalAmt > 0 ? Math.min(100, Math.round(mSaved/goalAmt*100)) : 0;
    return { m: label, pct: mPct, amt: `¥${fmt(mSaved)}`, color: mPct >= 100 ? C.primary : C.warning };
  }).reverse();

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>
        {/* Sub-tab */}
        <div style={{ display: 'flex', background: C.primaryLight, borderRadius: 14, padding: 3, gap: 2, marginBottom: 20 }}>
          <button onClick={() => go('budget')} style={{ flex: 1, color: C.textMuted, padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 500, borderRadius: 12 }}>予算</button>
          <button style={{ flex: 1, background: C.primary, color: 'white', padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 700, borderRadius: 12, boxShadow: '0 3px 10px rgba(9,125,96,0.3)' }}>税金・積立</button>
        </div>

        <div style={{ fontSize: 21, fontWeight: 700, color: C.text, marginBottom: 4 }}>税金・積立</div>
        <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 24 }}>{today.getMonth()+1}月 — 目標達成まで頑張ろう</div>

        {/* Progress card */}
        <Card style={{ marginBottom: 16, padding: '28px 24px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
            <div style={{ flexShrink: 0, position: 'relative', width: 128, height: 128 }}>
              <svg width="128" height="128" viewBox="0 0 128 128" style={{ position: 'absolute', top: 0, left: 0 }}>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.bgCard} strokeWidth="11"/>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.warning} strokeWidth="11" strokeDasharray="327" strokeDashoffset={dashOffset} strokeLinecap="round" transform="rotate(-90 64 64)"/>
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: C.warning, lineHeight: 1, fontFeatureSettings: "'tnum'" }}>{pct}%</div>
                <div style={{ fontSize: 10, color: C.textMuted, marginTop: 4 }}>達成</div>
              </div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6 }}>積み立て済み</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: C.warning, letterSpacing: '-1px', fontFeatureSettings: "'tnum'", lineHeight: 1.1 }}>¥{fmt(savedAmt)}</div>
              <div style={{ height: 1, background: C.bgCard, margin: '12px 0' }} />
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 4 }}>今月の目標</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.text, fontFeatureSettings: "'tnum'" }}>¥{fmt(goalAmt)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>収入の{taxRate}%</div>
            </div>
          </div>
          {remaining > 0 && (
            <div style={{ marginTop: 20, background: C.warningBg, borderRadius: 14, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 10 }}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L16 14H2L9 2Z" stroke={C.warning} strokeWidth="1.4" fill="none" strokeLinejoin="round"/><path d="M9 7V10M9 12V12.5" stroke={C.warning} strokeWidth="1.4" strokeLinecap="round"/></svg>
              <div style={{ fontSize: 12, color: C.warning, lineHeight: 1.6 }}>あと <strong style={{ fontSize: 15, fontFeatureSettings: "'tnum'" }}>¥{fmt(remaining)}</strong> 積み立てが必要です。月末まであと{daysLeft}日。</div>
            </div>
          )}
          {remaining === 0 && goalAmt > 0 && (
            <div style={{ marginTop: 20, background: C.primaryLight, borderRadius: 14, padding: '14px 16px', fontSize: 13, color: C.primary, fontWeight: 700 }}>今月の目標達成！ 🎉</div>
          )}
        </Card>

        {/* History */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>月別積立状況</div>
          {history.map(row => (
            <div key={row.m} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: C.textMuted, width: 28, flexShrink: 0 }}>{row.m}</div>
              <div style={{ flex: 1, background: C.bgCard, borderRadius: 4, height: 8, overflow: 'hidden' }}>
                <div style={{ background: row.color, width: `${row.pct}%`, height: '100%', borderRadius: 4 }} />
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, color: row.color, width: 60, textAlign: 'right', fontFeatureSettings: "'tnum'" }}>{row.amt}</div>
            </div>
          ))}
        </Card>

        {/* Tips */}
        <div style={{ background: C.primaryLight, borderRadius: 18, padding: 18, marginBottom: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.primary, marginBottom: 8 }}>税金ガイド</div>
          <div style={{ fontSize: 12, color: C.textMed, lineHeight: 1.8 }}>年間所得400万円の場合、所得税+住民税の目安は約25〜30%です。消費税の納付義務がある場合はさらに10%の積み立てが必要です。</div>
        </div>

        {/* Future simulation */}
        {(() => {
          const s = Store.get('settings', {});
          const budgets = Store.get('budgets', {});
          const monthlyInvest = budgets['投資'] || s.savingsGoal || 0;
          if (!monthlyInvest) return null;
          const fv = (pmt, rate, yrs) => Math.round(pmt * ((Math.pow(1 + rate/12, yrs*12) - 1) / (rate/12)));
          return (
            <Card style={{ background: 'linear-gradient(135deg, #EDE8F8 0%, #E8F5F0 100%)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 4 }}>将来の資産シミュレーション 📈</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 14 }}>毎月 ¥{fmt(monthlyInvest)} × 年利5%複利</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                {[{l:'10年後',y:10},{l:'20年後',y:20},{l:'30年後',y:30}].map(r => (
                  <div key={r.l} style={{ background: 'white', borderRadius: 12, padding: '12px 8px', textAlign: 'center' }}>
                    <div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, marginBottom: 4 }}>{r.l}</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.invest, fontFeatureSettings: "'tnum'" }}>¥{fmt(fv(monthlyInvest, 0.05, r.y))}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 10, color: C.textFaint, marginTop: 10, lineHeight: 1.5 }}>※ 参考値。NISA・iDeCoでは利益が非課税。</div>
            </Card>
          );
        })()}
      </div>

      <BottomNav active="budget" go={go} />
    </Screen>
  );
}

// ── 10 Budget ──────────────────────────────────────────────────────────────
function BudgetScreen({ go }) {
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const defaultTax = Math.round(income * taxRate / 100);
  const [budgets, setBudgets] = useState(() => ({
    '生活費': 0, '事業費': 0, '税金積立': defaultTax, '投資': s.savingsGoal || 0,
    ...Store.get('budgets', {}),
  }));
  const [editKey, setEditKey] = useState(null);
  const [editVal, setEditVal] = useState('');

  const txns = getThisMonthTxns();
  const usedMap = {
    '生活費':  sumDiv(txns, '生活費'),
    '事業費':  sumDiv(txns, '事業費'),
    '税金積立': sumDiv(txns, '税金'),
    '投資':    sumDiv(txns, '投資'),
  };

  const cats = [
    { key:'生活費',  name:'生活費',  color:C.info,    icon:'🏠', desc:'食費・交通費など日々の出費' },
    { key:'事業費',  name:userType==='employee'?'特別支出':'事業費', color:C.primary, icon:'💼', desc:'材料費・機材・経費' },
    { key:'税金積立', name:'税金積立', color:C.warning, icon:'📊', desc:`${taxRate}% 積立目標` },
    { key:'投資',    name:userType==='freelance'?'投資':'貯蓄', color:C.invest, icon:'📈', desc:'将来への積立' },
  ];

  const totalBudget = cats.reduce((s,c)=>s+(budgets[c.key]||0), 0);
  const totalUsed   = cats.reduce((s,c)=>s+(usedMap[c.key]||0), 0);
  const unallocated = income - totalBudget;

  const commitEdit = (key) => {
    const next = { ...budgets, [key]: parseInt(editVal)||0 };
    setBudgets(next); Store.set('budgets', next); setEditKey(null);
  };

  const applyPreset = (name) => {
    if (!income) return;
    const tax = taxRate / 100;
    const presets = {
      'バランス型': [0.40, 0.20, tax, 0.10],
      '節税重視':   [0.35, 0.15, tax, 0.20],
      '事業優先':   [0.25, 0.35, tax, 0.10],
    };
    const [r0,r1,r2,r3] = presets[name];
    const next = { '生活費': Math.round(income*r0), '事業費': Math.round(income*r1), '税金積立': Math.round(income*r2), '投資': Math.round(income*r3) };
    setBudgets(next); Store.set('budgets', next);
  };

  return (
    <Screen>
      <div style={{ flex:1, overflowY:'auto', padding:'56px 20px 20px' }}>
        <div style={{ display:'flex', background:C.primaryLight, borderRadius:14, padding:3, gap:2, marginBottom:20 }}>
          <button style={{ flex:1, background:C.primary, color:'white', padding:'10px', fontSize:13, fontWeight:700, borderRadius:12, boxShadow:'0 3px 10px rgba(9,125,96,0.3)' }}>予算</button>
          <button onClick={() => go('tax')} style={{ flex:1, color:C.textMuted, padding:'10px', fontSize:13, fontWeight:500, borderRadius:12 }}>税金・積立</button>
        </div>

        <div style={{ fontSize:21, fontWeight:700, color:C.text, marginBottom:20 }}>月の予算設定</div>

        {/* Income + Unallocated */}
        <Card style={{ marginBottom:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, marginBottom:4 }}>今月の収入</div>
              <div style={{ fontSize:26, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(income)}</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:11, fontWeight:600, color:unallocated>=0?C.primary:C.warning, marginBottom:4 }}>{unallocated>=0?'未配分':'配分超過'}</div>
              <div style={{ fontSize:22, fontWeight:700, color:unallocated>=0?C.primary:C.warning, fontFeatureSettings:"'tnum'" }}>
                {unallocated<0&&'-'}¥{fmt(Math.abs(unallocated))}
              </div>
            </div>
          </div>

          {/* Allocation stacked bar */}
          <div style={{ background:C.bgCard, borderRadius:6, height:10, overflow:'hidden', display:'flex', marginBottom:10 }}>
            {cats.map(c => {
              const w = income > 0 ? Math.min(99, Math.round((budgets[c.key]||0)/income*100)) : 0;
              return w > 0 ? <div key={c.key} style={{ width:`${w}%`, background:c.color, height:'100%' }} /> : null;
            })}
          </div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:'6px 14px' }}>
            {cats.map(c => income>0 && (budgets[c.key]||0)>0 ? (
              <div key={c.key} style={{ display:'flex', alignItems:'center', gap:4 }}>
                <div style={{ width:7, height:7, borderRadius:2, background:c.color }} />
                <span style={{ fontSize:10, color:C.textMuted }}>{c.key} {Math.round((budgets[c.key]||0)/income*100)}%</span>
              </div>
            ) : null)}
          </div>

          {/* Quick presets */}
          {income > 0 && (
            <div style={{ marginTop:16, paddingTop:14, borderTop:`1px solid ${C.bgCard}` }}>
              <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, marginBottom:10 }}>クイック配分</div>
              <div style={{ display:'flex', gap:8 }}>
                {['バランス型','節税重視','事業優先'].map(p => (

  const thisExp = currT.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const thisBalance = thisInc - thisExp;
  const savingsRate = thisInc > 0 ? ((thisInc-thisExp)/thisInc*100).toFixed(1) : '0.0';

  // 6-month trend
  const months = Array.from({length:6}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth()-5+i, 1);

    return { label:`${d.getMonth()+1}月`, inc, exp, isCurrent:i===5 };
  });
  const maxVal = Math.max(...months.map(m=>Math.max(m.inc,m.exp)), 1);

function exportToFreee(expenses, income, ym) {
  const ACCOUNT_MAP = {
    '材料費':     '材料費',
    '機材・ソフト':'消耗品費',
    '出店料':     '地代家賃',
    '交際費':     '交際費',
    '教育・学習': '研修費',
    '交通費':     '旅費交通費',
    '通信費':     '通信費',
    '食費':       '会議費',
    '外食':       '会議費',
    '日用品':     '消耗品費',
    '美容・衣服': '消耗品費',
    '医療・健康': '福利厚生費',
    '趣味・娯楽': '雑費',
    'その他':     '雑費',
  };
  const rows = [['取引日','収支区分','勘定科目','取引先','品目','税区分','金額（税込）','備考']];
  income.forEach(t => rows.push([t.date,'収入','売上高','',t.memo||t.category||'','課税10%',t.amount,t.memo||'']));
  expenses.forEach(t => rows.push([t.date,'支出',ACCOUNT_MAP[t.category]||'雑費','',t.category||'','課税10%',t.amount,t.memo||'']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `freee_${ym}.csv`; a.click();
  URL.revokeObjectURL(url);
}

const FIXED_CATS = [
  { id: 'rent',    name: '住居',    emoji: '🏠', color: '#4A6898' },
  { id: 'utility', name: '光熱費',  emoji: '💡', color: '#E8935F' },

  { id: 'insure',  name: '保険',    emoji: '🛡️', color: '#5B7B6F' },
  { id: 'other',   name: 'その他',  emoji: '📋', color: '#9CA3AF' },
];

function FixedExpensesScreen({ go }) {
  const today = new Date();
  const thisMonth = String(today.getMonth() + 1);
  const thisYear  = TODAY.slice(0, 4);

  const [items, setItems] = useState(() => Store.get('fixedExpenses', []));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name: '', amount: '', cat: 'rent', payment: 'カード', cycle: 'monthly', day: '毎月1日', month: thisMonth, division: '生活費' });
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});

  const [regSet, setRegSet] = useState(() => new Set(
    Store.get('transactions',[]).filter(t=>t.source==='fixed'&&t.date&&t.date.startsWith(thisMonthStr())).map(t=>t.fixedId)
  ));
  const [yearlyRegSet, setYearlyRegSet] = useState(() => new Set(
    Store.get('transactions',[]).filter(t=>t.source==='fixed'&&t.date&&t.date.startsWith(thisYear)).map(t=>t.fixedId)
  ));

  const save = () => {
    if (!form.name || !form.amount) return;
    const next = [...items, { id: Date.now(), ...form, amount: Number(form.amount), active: true }];
    setItems(next); Store.set('fixedExpenses', next);
    setForm({ name: '', amount: '', cat: 'rent', payment: 'カード', cycle: 'monthly', day: '毎月1日', month: thisMonth, division: '生活費' });
    setShowForm(false);
  };
  const toggle = id => { const n = items.map(i => i.id === id ? {...i, active: !i.active} : i); setItems(n); Store.set('fixedExpenses', n); };
  const remove = id => { const n = items.filter(i => i.id !== id); setItems(n); Store.set('fixedExpenses', n); };
  const startEdit = item => {
    setEditId(item.id);
    setEditForm({ name: item.name, amount: String(item.amount), cat: item.cat || 'other', payment: item.payment || 'カード', cycle: item.cycle || 'monthly', day: item.day || '毎月1日', month: item.month || thisMonth, division: item.division || '生活費' });
    setShowForm(false);
  };
  const saveEdit = () => {
    if (!editForm.name || !editForm.amount) return;
    const next = items.map(i => i.id === editId ? { ...i, ...editForm, amount: Number(editForm.amount) } : i);
    setItems(next); Store.set('fixedExpenses', next);
    setEditId(null);
  };

  const unregistered = items.filter(i => {
    if (!i.active) return false;
    if (i.cycle === 'yearly') return i.month === thisMonth && !yearlyRegSet.has(i.id);
    return !regSet.has(i.id);
  });

  const registerAll = () => {
    if (!unregistered.length) return;
    const existing = Store.get('transactions', []);
    const newTxns = unregistered.map((item, idx) => ({
      id: Date.now() + idx, type: 'expense', amount: item.amount, category: 'その他',
      division: item.division || '生活費', payment: item.payment, memo: item.name,
      date: TODAY, source: 'fixed', fixedId: item.id,
    }));
    Store.set('transactions', [...existing, ...newTxns]);
    setRegSet(new Set([...regSet, ...unregistered.filter(i=>i.cycle!=='yearly').map(i=>i.id)]));
    setYearlyRegSet(new Set([...yearlyRegSet, ...unregistered.filter(i=>i.cycle==='yearly').map(i=>i.id)]));
  };

  const monthlyActive = items.filter(i => i.active && i.cycle !== 'yearly');
  const yearlyActive  = items.filter(i => i.active && i.cycle === 'yearly');
  const monthlyTotal  = monthlyActive.reduce((s,i) => s + i.amount, 0);
  const yearlyTotal   = yearlyActive.reduce((s,i) => s + i.amount, 0);
  const annualTotal   = monthlyTotal * 12 + yearlyTotal;

  const catGroups = FIXED_CATS.map(c => ({ ...c, items: items.filter(i => i.cat === c.id) })).filter(c => c.items.length > 0);
  const inputStyle = { background: C.bg, borderRadius: 10, padding: '11px 14px', fontSize: 14, color: C.text, border: `1.5px solid ${C.border}`, width: '100%', outline: 'none' };

  return (

        {/* Bulk register button */}
        {items.filter(i=>i.active).length > 0 && (
          <button onClick={registerAll} disabled={unregistered.length===0} style={{ width: '100%', background: unregistered.length>0 ? '#4A6898' : C.primaryLight, color: unregistered.length>0 ? 'white' : C.primary, borderRadius: 14, padding: '14px', fontSize: 13, fontWeight: 700, marginBottom: 10, boxShadow: unregistered.length>0 ? '0 6px 18px rgba(74,104,152,0.28)' : 'none', cursor: unregistered.length>0 ? 'pointer' : 'default' }}>

                const registered = regSet.has(item.id);
                const isEditing = editId === item.id;
                return (

                      {item.division === '投資' && <span style={{ fontSize: 9, fontWeight: 700, color: C.invest, background: C.invest+'22', borderRadius: 5, padding: '2px 6px', flexShrink: 0 }}>投資</span>}

                      {item.cycle === 'yearly' && <span style={{ fontSize: 9, fontWeight: 700, color: C.invest, background: C.invest+'18', borderRadius: 5, padding: '2px 6px', flexShrink: 0 }}>年払</span>}
                      <div style={{ fontSize: 14, fontWeight: 700, color: item.active ? C.text : C.textMuted, fontFeatureSettings: "'tnum'", flexShrink: 0 }}>¥{fmt(item.amount)}</div>
                      <button onClick={() => isEditing ? setEditId(null) : startEdit(item)} style={{ width: 28, height: 28, borderRadius: 7, background: isEditing ? C.primary : '#E8F5F1', color: isEditing ? 'white' : C.primary, fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: 'none', cursor: 'pointer' }}>✏</button>
                      <button onClick={() => toggle(item.id)} style={{ width: 40, height: 22, borderRadius: 11, background: item.active ? C.primary : C.border, position: 'relative', flexShrink: 0, border: 'none', cursor: 'pointer', transition: 'background .2s' }}>
                        <div style={{ width: 16, height: 16, background: 'white', borderRadius: '50%', position: 'absolute', top: 3, left: item.active ? 21 : 3, transition: 'left .2s', boxShadow: '0 1px 4px rgba(0,0,0,0.2)' }} />
                      </button>
                      <button onClick={() => remove(item.id)} style={{ width: 28, height: 28, borderRadius: 7, background: '#FEE2E2', color: '#DC2626', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: 'none', cursor: 'pointer' }}>×</button>
                    </div>
                    {isEditing && (
                      <div style={{ background: 'white', borderRadius: 12, padding: 14, border: `1.5px solid ${C.primary}` }}>

                          <input type="number" value={editForm.amount} onChange={e => setEditForm(f=>({...f, amount:e.target.value}))} style={{ ...inputStyle, fontSize: 20, fontWeight: 700 }} placeholder="金額" />
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 5 }}>
                            {FIXED_CATS.map(c => (
                              <button key={c.id} onClick={() => setEditForm(f=>({...f, cat:c.id}))} style={{ background: editForm.cat===c.id ? c.color : C.bg, color: editForm.cat===c.id ? 'white' : C.text, borderRadius: 8, padding: '6px 4px', fontSize: 10, fontWeight: editForm.cat===c.id ? 700 : 400, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1, border: 'none', cursor: 'pointer' }}>

                          <div style={{ display: 'flex', gap: 6 }}>
                            {['生活費','事業費','投資'].map(d => (
                              <button key={d} onClick={() => setEditForm(f=>({...f, division:d}))} style={{ flex:1, background: editForm.division===d ? C.primary : C.bg, color: editForm.division===d ? 'white' : C.text, borderRadius:8, padding:'8px', fontSize:12, fontWeight:700, border:'none', cursor:'pointer' }}>{d}</button>
                            ))}
                          </div>
                          <div style={{ display: 'flex', gap: 6 }}>
                            {[['monthly','毎月'],['yearly','年1回']].map(([v,l]) => (
                              <button key={v} onClick={() => setEditForm(f=>({...f, cycle:v}))} style={{ flex:1, background: editForm.cycle===v ? C.primary : C.bg, color: editForm.cycle===v ? 'white' : C.text, borderRadius:8, padding:'8px', fontSize:12, fontWeight:700, border:'none', cursor:'pointer' }}>{l}</button>
                            ))}
                          </div>
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                            <div>
                              <div style={{ fontSize: 10, color: C.textMuted, marginBottom: 4, fontWeight: 600 }}>{editForm.cycle==='yearly' ? '支払い月' : '引き落とし日'}</div>
                              {editForm.cycle === 'yearly' ? (
                                <select value={editForm.month} onChange={e => setEditForm(f=>({...f, month:e.target.value}))} style={{ ...inputStyle, fontSize: 12 }}>
                                  {Array.from({length:12},(_,i)=>`${i+1}`).map(m => <option key={m} value={m}>{m}月</option>)}
                                </select>
                              ) : (
                                <select value={editForm.day} onChange={e => setEditForm(f=>({...f, day:e.target.value}))} style={{ ...inputStyle, fontSize: 12 }}>
                                  {[...Array.from({length:31},(_,i)=>`毎月${i+1}日`), '毎月末日'].map(d => <option key={d}>{d}</option>)}
                                </select>
                              )}
                            </div>
                            <div>
                              <div style={{ fontSize: 10, color: C.textMuted, marginBottom: 4, fontWeight: 600 }}>支払い</div>
                              <select value={editForm.payment} onChange={e => setEditForm(f=>({...f, payment:e.target.value}))} style={{ ...inputStyle, fontSize: 12 }}>
                                {getCards().map(c => <option key={c.id} value={c.name}>{c.name}{c.last4 ? ` (${c.last4})` : ''}</option>)}

                            </div>
                          </div>
                          <div style={{ display: 'flex', gap: 8 }}>
                            <button onClick={saveEdit} style={{ flex:1, background: C.primary, color:'white', borderRadius:10, padding:'11px', fontSize:13, fontWeight:700, border:'none', cursor:'pointer' }}>保存</button>
                            <button onClick={() => setEditId(null)} style={{ flex:1, background: C.bg, color:C.textMuted, borderRadius:10, padding:'11px', fontSize:13, border:'none', cursor:'pointer' }}>キャンセル</button>

            </div>
          )}
        </Card>
      </div>

      <BottomNav active="settings" go={go} />
    </Screen>
  );
}

// ── 12b Cards Management ───────────────────────────────────────────────────
function CardsScreen({ go }) {
  const [cards, setCards] = useState(() => Store.get('cards', []));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name: '', last4: '' });
  const [toast, setToast] = useState('');

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''), 2000); };

  const save = () => {
    if (!form.name.trim()) return;
    if (form.last4 && !/^\d+$/.test(form.last4)) { showToast('末尾4桁は数字で入力してください'); return; }
    const next = [...cards, { id: Date.now(), name: form.name.trim(), last4: form.last4.trim() }];
    setCards(next); Store.set('cards', next);
    setForm({ name: '', last4: '' }); setShowForm(false);
    showToast('追加しました');
  };

  const remove = id => {
    const next = cards.filter(c => c.id !== id);
    setCards(next); Store.set('cards', next);
  };

  const inputStyle = { background: C.bg, borderRadius: 12, padding: '12px 16px', fontSize: 14, color: C.text, border: 'none', width: '100%', outline: 'none' };

  return (
    <Screen>
      {toast && (
        <div style={{ position:'fixed', top:64, left:'50%', transform:'translateX(-50%)', background:'#1a1a2e', color:'white', borderRadius:12, padding:'10px 20px', fontSize:13, fontWeight:600, zIndex:999, whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.25)', pointerEvents:'none' }}>
          {toast}
        </div>
      )}
      <div style={{ display:'flex', alignItems:'center', gap:16, padding:'56px 20px 16px' }}>
        <button onClick={() => go('settings')} style={{ background:'none', border:'none', fontSize:14, color:C.primary, fontWeight:600, cursor:'pointer', padding:0 }}>← 戻る</button>
        <div style={{ fontSize:19, fontWeight:700, color:C.text }}>カード・支払い管理</div>
      </div>
      <div style={{ padding:'0 20px 20px', overflowY:'auto', flex:1 }}>
        <div style={{ fontSize:12, color:C.textMuted, marginBottom:16, lineHeight:1.7 }}>
          登録したカードは支出入力・固定費の支払い方法として使えます
        </div>

        {cards.length === 0 && !showForm && (
          <div style={{ textAlign:'center', color:C.textFaint, fontSize:13, padding:'32px 0' }}>カードを追加してください</div>
        )}

        {cards.map((card, i) => (
          <div key={card.id} style={{ background:'white', borderRadius:16, padding:'14px 18px', marginBottom:10, display:'flex', alignItems:'center', gap:14, boxShadow:'0 1px 6px rgba(0,0,0,0.05)' }}>
            <div style={{ width:40, height:40, background:CARD_PALETTE[i%CARD_PALETTE.length], borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontWeight:800, fontSize:16, flexShrink:0 }}>
              {card.name.slice(0,1)}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:15, fontWeight:600, color:C.text }}>{card.name}</div>
              {card.last4 && <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>**** {card.last4}</div>}
            </div>
            <button onClick={() => remove(card.id)} style={{ background:'#FEE2E2', border:'none', color:'#DC2626', borderRadius:8, width:32, height:32, fontSize:16, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
          </div>
        ))}

        {showForm ? (
          <div style={{ background:'white', borderRadius:16, padding:'20px', marginTop:8, boxShadow:'0 1px 6px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:16 }}>カードを追加</div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, color:C.textMuted, fontWeight:600, marginBottom:6 }}>カード名 *</div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="例：楽天カード、三井住友カード" style={inputStyle} autoFocus />
            </div>
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:11, color:C.textMuted, fontWeight:600, marginBottom:6 }}>末尾4桁（任意）</div>
              <input value={form.last4} onChange={e=>setForm(f=>({...f,last4:e.target.value.replace(/\D/g,'')}))} placeholder="例：1234" maxLength={4} type="tel" style={inputStyle} />
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>setShowForm(false)} style={{ flex:1, background:C.bg, borderRadius:12, padding:'12px', fontSize:13, fontWeight:600, color:C.textMuted, border:'none', cursor:'pointer' }}>キャンセル</button>
              <button onClick={save} style={{ flex:2, background:C.primary, borderRadius:12, padding:'12px', fontSize:13, fontWeight:700, color:'white', border:'none', cursor:'pointer' }}>追加する</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setShowForm(true)} style={{ width:'100%', background:C.primaryLight, color:C.primary, borderRadius:14, padding:'14px', fontSize:14, fontWeight:700, border:`1.5px dashed ${C.primary}`, cursor:'pointer', marginTop:cards.length?8:0 }}>
            ＋ カード・支払い方法を追加
