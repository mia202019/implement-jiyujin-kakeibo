function guessCategory(name) {
  if (!name) return 'その他';
  const up = name.toUpperCase();
  for (const rule of CLASSIFY_RULES) {
    if (rule.keys.some(k => up.includes(k.toUpperCase()))) return rule.cat;
  }
  return 'その他';
}

function parseCSVText(text) {
  const lines = text.replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim());
  const firstLine = lines[0] || '';
  const sep = firstLine.split('\t').length > firstLine.split(',').length ? '\t' : ',';
  return lines.map(line => {
    if (sep === '\t') return line.split('\t').map(s => s.trim());
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur=''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function normalizeDate(str) {
  if (!str) return '';
  const s = str.replace(/年/,'-').replace(/月/,'-').replace(/日/,'').replace(/\//g,'-').trim().slice(0,10);
  if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)) {
    const [y,m,d] = s.split('-');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  if (/^\d{1,2}-\d{1,2}$/.test(s)) {
    const [m,d] = s.split('-');
    return `${TODAY.slice(0,4)}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return '';
}

function normalizeAmount(str) {
  const n = parseInt(String(str||'').replace(/[^0-9]/g,''));
  return isNaN(n) ? 0 : n;
}

function detectFormat(rows) {
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const h = rows[i].join(',');
    if (h.includes('利用日') || h.includes('ご利用')) return { fmt:'vpass', headerIdx:i };
    if (h.includes('取引日') && (h.includes('取引先') || h.includes('支払'))) return { fmt:'paypay', headerIdx:i };
    if (h.includes('支払金額') && (h.includes('入金額') || h.includes('預り金額'))) return { fmt:'bank-stmt', headerIdx:i };
  }
  const isDate = s => /^\d{4}\/\d{1,2}\/\d{1,2}$/.test((s || '').trim());
  const isInt  = s => /^\d+$/.test((s || '').trim());
  // 7月形式: 1行目が日付データ
  if (rows.length > 0 && isDate(rows[0][0])) return { fmt:'vpass-noheader', headerIdx:-1 };
  // 6月形式: カード情報行+データ行が混在、日付列0・金額列2
  if (rows.some(r => isDate(r[0]) && isInt(r[2]))) return { fmt:'vpass-monthly', headerIdx:-1 };
  return { fmt:'generic', headerIdx:0 };
}

function rawAmt(str) {
  // 符号を保持したまま数値化
  const s = String(str || '').trim();
  const n = parseInt(s.replace(/[^0-9]/g, ''));
  return isNaN(n) ? 0 : (s.startsWith('-') ? -n : n);
}

function rowToTxn(row, headers, fmt, autoClassOn, idx) {
  let date = TODAY, desc = '', amount = 0, payment = 'カード';
  const hi = k => headers.findIndex(h => h.includes(k));

  if (fmt === 'bank-stmt') {
    // 銀行通帳形式: 年,月,日,...,内容,支払金額,入金額  or PayPayビジネス形式: ヘッダーで列を探す
    const dateColIdx = hi('取引日') >= 0 ? hi('取引日') : hi('日付') >= 0 ? hi('日付') : hi('取引日時') >= 0 ? hi('取引日時') : -1;
    date = dateColIdx >= 0
      ? normalizeDate((row[dateColIdx] || '').slice(0, 10))
      : normalizeDate(`${row[0]}/${row[1]}/${row[2]}`);
    const descColIdx = hi('摘要') >= 0 ? hi('摘要') : hi('内容') >= 0 ? hi('内容') : hi('取引先') >= 0 ? hi('取引先') : -1;
    desc = descColIdx >= 0 ? row[descColIdx] : row[7] || '';
    const payColIdx = hi('支払金額') >= 0 ? hi('支払金額') : 8;
    const depColIdx = hi('入金額') >= 0 ? hi('入金額') : 9;
    const pay = normalizeAmount(row[payColIdx]);
    const dep = normalizeAmount(row[depColIdx]);
    if (pay > 0) { amount = pay; }
    else if (dep > 0) { amount = dep; return { tempId:idx, date, memo:desc, category: autoClassOn ? guessCategory(desc) : 'その他', amount, type:'income', division:'事業収入', payment:'振込' }; }
    else return null;
  } else if (fmt === 'vpass-monthly') {
    // 6月形式: date,store,totalAmt,payType,count,todayAmt,foreignInfo[,cardName]
    if (!/^\d{4}\/\d{1,2}\/\d{1,2}$/.test((row[0] || '').trim())) return null;
    date   = normalizeDate(row[0]);
    desc   = row[1] || '';
    const monthly = normalizeAmount(row[5]);
    const total   = normalizeAmount(row[2]);
    amount = monthly > 0 ? monthly : total;
    if (row[7]) payment = row[7];
  } else if (fmt === 'vpass-noheader') {
    // 7月形式: date,store,国,支払区分,...,金額,...
    date   = normalizeDate(row[0]);
    desc   = row[1] || '';
    const a = rawAmt(row[6]);
    if (a <= 0) return null;
    amount = a;
  } else if (fmt === 'vpass') {
    date   = normalizeDate(row[hi('利用日')]);
    desc   = row[hi('店名')] || row[hi('商品')] || '';
    const amtCol = hi('今回払い') >= 0 ? hi('今回払い') : hi('金額');
    amount = normalizeAmount(row[amtCol]);
  } else if (fmt === 'paypay') {
    const typeCol = hi('種別');
    const typeVal = row[typeCol] || '';
    if (!typeVal.includes('支払') && !typeVal.includes('決済') && typeVal !== '') return null;
    date   = normalizeDate((row[hi('取引日')] || '').slice(0,10));
    const descCol = ['取引先名','商品名','内容','摘要','備考','コメント'].map(k=>hi(k)).find(i=>i>=0) ?? -1;
    desc = descCol >= 0 ? row[descCol] : row[1] || '';
    const payCol = hi('支払金額') >= 0 ? hi('支払金額') : hi('取引金額');
    amount = normalizeAmount(row[payCol]);
  } else {
    // generic
    const dateCol = hi('日付') >= 0 ? hi('日付') : hi('日') >= 0 ? hi('日') : 0;
    const amtCol  = headers.findIndex(h => /金額|amount/i.test(h));
    const descCol = headers.findIndex(h => /店名|商品|摘要|内容|description|memo/i.test(h));
    date   = normalizeDate(row[dateCol]);
    desc   = descCol >= 0 ? row[descCol] : row[1] || '';
    amount = amtCol >= 0 ? normalizeAmount(row[amtCol]) : 0;
  }

  if (!amount || amount <= 0) return null;
  if (!date) return null;
  return {
    tempId: idx,
    date, memo: desc,
    category: autoClassOn ? guessCategory(desc) : 'その他',
    amount, type: 'expense', division: (fmt === 'paypay' || fmt === 'bank-stmt') ? '事業費' : '生活費', payment,
  };
}

function CsvImportScreen({ go }) {
  const [step, setStep]         = useState('upload');
  const [csvFmt, setCsvFmt]     = useState('auto');
  const [autoClass, setAutoClass] = useState(true);
  const [preview, setPreview]   = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [editIdx, setEditIdx]   = useState(null);
  const [toast, setToast]       = useState('');
  const [cardFilter, setCardFilter] = useState('all');

  const cardNames = [...new Set(preview.map(r => r.payment || 'カード'))];
  const showCardFilter = cardNames.length > 1;
  const visibleIdxs = cardFilter === 'all'
    ? preview.map((_, i) => i)
    : preview.map((r, i) => (r.payment || 'カード') === cardFilter ? i : null).filter(x => x !== null);
  const allVisible = visibleIdxs.length > 0 && visibleIdxs.every(i => selected.has(i));
  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    showToast('読み込み中...');

    const tryProcess = (text) => {
      try {
        const rows = parseCSVText(text);
        if (rows.length < 1) return false;
        const { fmt: detected, headerIdx } = detectFormat(rows);
        const useFmt = csvFmt === 'auto' ? detected : csvFmt;
        const headers = headerIdx >= 0 ? rows[headerIdx] : [];
        let dataRows = headerIdx >= 0 ? rows.slice(headerIdx + 1) : rows;
        // For vpass-monthly: tag each date row with card name from section headers
        if (useFmt === 'vpass-monthly') {
          let card = 'カード';
          const enriched = [];
          for (const row of dataRows) {
            if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test((row[0]||'').trim())) {
              enriched.push([...row, card]);
            } else if (row.some(Boolean)) {
              const c = (row[1] || '').trim();
              if (c) card = c;
            }
          }
          dataRows = enriched;
        }
        const existing = Store.get('transactions', []);
        const txns = dataRows
          .map((r, i) => rowToTxn(r, headers, useFmt, autoClass, i))
          .filter(Boolean)
          .map(t => {
            const dup = existing.some(e => e.date === t.date && e.amount === t.amount);
            return { ...t, isDuplicate: dup };
          });
        if (!txns.length) return false;
        setPreview(txns);
        setSelected(new Set(txns.map((_, i) => i).filter(i => !txns[i].isDuplicate)));
        setStep('preview');
        return true;
      } catch(err) { return false; }
    };

    // ArrayBuffer + TextDecoder for reliable multi-encoding detection
    const reader = new FileReader();
    reader.onload = ev => {
      const buf = ev.target.result;
      // Try UTF-8 strict first — if it throws the file is not UTF-8
      let ok = false;
      try {
        const text = new TextDecoder('UTF-8', { fatal: true }).decode(buf);
        ok = tryProcess(text);
      } catch {}
      if (ok) return;
      // Shift-JIS (most Japanese bank/card CSVs)
      try {
        const text = new TextDecoder('Shift_JIS', { fatal: false }).decode(buf);
        ok = tryProcess(text);
      } catch {}
      if (ok) return;
      // EUC-JP fallback
      try {
        const text = new TextDecoder('EUC-JP', { fatal: false }).decode(buf);
        ok = tryProcess(text);
      } catch {}
      if (!ok) showToast('読み込めませんでした。形式を手動で選択してください');
    };
    reader.onerror = () => showToast('ファイルを開けませんでした');
    reader.readAsArrayBuffer(file);
  };

  const toggleAll = () => {
    const next = new Set(selected);
    if (allVisible) visibleIdxs.forEach(i => next.delete(i));
    else visibleIdxs.forEach(i => next.add(i));
    setSelected(next);
  };

  const toggle = i => {
    const next = new Set(selected);
    next.has(i) ? next.delete(i) : next.add(i);
    setSelected(next);
  };

  const updateRow = (i, updates) => {
    setPreview(prev => prev.map((r, j) => j === i ? { ...r, ...updates } : r));
  };

  const importAll = () => {
    const toAdd = preview
      .filter((_, i) => selected.has(i))
      .map((r, i) => { const { tempId, ...rest } = r; return { ...rest, id: Date.now() + i }; });
    Store.set('transactions', [...toAdd, ...Store.get('transactions', [])]);
    showToast(`${toAdd.length}件を取り込みました`);
    setTimeout(() => go('home'), 1200);
  };

  return (
    <Screen>
      {toast && (
        <div style={{ position:'fixed', top:64, left:'50%', transform:'translateX(-50%)', background:'#1a1a2e', color:'white', borderRadius:12, padding:'10px 20px', fontSize:13, fontWeight:600, zIndex:999, whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.25)', pointerEvents:'none' }}>
          {toast}
        </div>
      )}

      <div style={{ flex:1, overflowY:'auto', padding:'56px 20px 20px' }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
          <button type="button" onClick={() => step==='preview' ? setStep('upload') : go('input')} style={{ width:36, height:36, borderRadius:10, background:'white', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 1px 6px rgba(0,0,0,0.08)', flexShrink:0, border:'none', cursor:'pointer' }}>
            <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke={C.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div>
            <div style={{ fontSize:20, fontWeight:700, color:C.text }}>CSVで一括取り込み</div>
            <div style={{ fontSize:12, color:C.textMuted }}>{step==='upload' ? 'Vpass・PayPayビジネスなどのCSVを読み込む' : `${preview.length}件を確認・編集中`}</div>
          </div>
        </div>

        {step === 'upload' ? (<>
          {/* Format */}
          <Card style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, fontWeight:700, color:C.textMuted, letterSpacing:'0.06em', marginBottom:10 }}>形式</div>
            {[['auto','自動検出（おすすめ）','🔍'],['vpass','Vpass（三井住友カード）','💳'],['paypay','PayPayビジネス','📱'],['bank-stmt','銀行通帳（PayPay銀行など）','🏦']].map(([v,l,em]) => (
              <button key={v} type="button" onClick={() => setCsvFmt(v)} style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'12px 14px', borderRadius:12, background:csvFmt===v ? C.primaryLight : C.bg, border:`1.5px solid ${csvFmt===v ? C.primary : 'transparent'}`, cursor:'pointer', textAlign:'left', marginBottom:6 }}>
                <span style={{ fontSize:18 }}>{em}</span>
                <span style={{ fontSize:13, fontWeight:csvFmt===v?700:500, color:csvFmt===v?C.primary:C.text }}>{l}</span>
                <div style={{ marginLeft:'auto', width:18, height:18, borderRadius:'50%', border:`2px solid ${csvFmt===v ? C.primary : C.border}`, background:csvFmt===v ? C.primary : 'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  {csvFmt===v && <div style={{ width:6, height:6, borderRadius:'50%', background:'white' }} />}
                </div>
              </button>
            ))}
          </Card>

          {/* Auto-classify */}
          <Card style={{ marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:C.text }}>自動カテゴリ分類</div>
                <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>店名からカテゴリを自動推定（後で変更可）</div>
              </div>
              <button type="button" onClick={() => setAutoClass(v => !v)} style={{ width:46, height:26, borderRadius:13, background:autoClass ? C.primary : C.border, position:'relative', border:'none', cursor:'pointer', flexShrink:0 }}>
                <div style={{ width:20, height:20, background:'white', borderRadius:'50%', position:'absolute', top:3, left:autoClass?23:3, transition:'left .2s', boxShadow:'0 1px 4px rgba(0,0,0,0.2)' }} />
              </button>
            </div>
            {autoClass && <div style={{ marginTop:10, fontSize:11, color:C.textMuted, lineHeight:1.8 }}>例: コンビニ→食費・JR→交通費・Netflix→趣味娯楽</div>}
          </Card>

          {/* File picker */}
          <label style={{ display:'block', cursor:'pointer' }}>
            <input type="file" accept=".csv,.txt" onChange={handleFile} style={{ display:'none' }} />
            <div style={{ background:C.primaryLight, borderRadius:20, padding:'40px 20px', display:'flex', flexDirection:'column', alignItems:'center', gap:12, border:`2px dashed ${C.primary}` }}>
              <div style={{ fontSize:44 }}>📂</div>
              <div style={{ fontSize:15, fontWeight:700, color:C.primary }}>CSVファイルを選択</div>
              <div style={{ fontSize:12, color:C.textMuted, textAlign:'center' }}>ダウンロードしたCSVファイルを読み込みます</div>
            </div>
          </label>

          {/* Help */}
          <div style={{ marginTop:14, background:'#EFF6FF', borderRadius:14, padding:'14px 16px' }}>
            <div style={{ fontSize:12, fontWeight:700, color:'#2563EB', marginBottom:6 }}>CSVのダウンロード方法</div>
            <div style={{ fontSize:11, color:'#1D4ED8', lineHeight:2 }}>
              <strong>Vpass:</strong> マイページ → ご利用明細 → CSV出力<br/>
              <strong>PayPayビジネス:</strong> 管理画面 → 入出金明細 → CSV出力
            </div>
          </div>
        </>) : (<>
          {/* Duplicate warning */}
          {preview.some(r => r.isDuplicate) && (
            <div style={{ background:'#FFF7ED', border:'1.5px solid #F59E0B', borderRadius:12, padding:'10px 14px', marginBottom:10, display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontSize:16 }}>⚠️</span>
              <div>
                <div style={{ fontSize:12, fontWeight:700, color:'#92400E' }}>
                  {preview.filter(r=>r.isDuplicate).length}件の重複が検出されました
                </div>
                <div style={{ fontSize:11, color:'#B45309' }}>同じ日付・金額の記録が既に存在します。チェックを外した状態にしています。</div>
              </div>
            </div>
          )}

          {/* Card filter chips */}
          {showCardFilter && (
            <div style={{ display:'flex', gap:6, marginBottom:10, flexWrap:'wrap' }}>
              {['all', ...cardNames].map(c => (
                <button key={c} type="button" onClick={() => setCardFilter(c)} style={{ background:cardFilter===c?C.primary:'white', color:cardFilter===c?'white':C.textMuted, borderRadius:999, padding:'5px 12px', fontSize:11, fontWeight:cardFilter===c?700:500, border:`1.5px solid ${cardFilter===c?C.primary:C.border}`, cursor:'pointer', whiteSpace:'nowrap', flexShrink:0 }}>
                  {c === 'all' ? `すべて（${preview.length}件）` : c}
                </button>
              ))}
            </div>
          )}

          {/* Select all */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <button type="button" onClick={toggleAll} style={{ display:'flex', alignItems:'center', gap:8, background:'none', border:'none', cursor:'pointer', padding:0 }}>
              <div style={{ width:22, height:22, borderRadius:6, border:`2px solid ${allVisible ? C.primary : C.border}`, background:allVisible ? C.primary : 'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                {allVisible && <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <span style={{ fontSize:13, fontWeight:600, color:C.text }}>すべて選択</span>
            </button>
            <span style={{ fontSize:12, color:C.textMuted }}>{visibleIdxs.filter(i=>selected.has(i)).length}件選択 / {visibleIdxs.length}件</span>
          </div>

          {/* Preview list */}
          {preview.map((row, i) => {
            if (cardFilter !== 'all' && (row.payment || 'カード') !== cardFilter) return null;
            const checked = selected.has(i);
            const isEditing = editIdx === i;
            const catObj = EXPENSE_CATS.find(c => c.name === row.category);
            return (
              <React.Fragment key={i}>
                <div style={{ display:'flex', alignItems:'center', gap:10, background: row.isDuplicate ? '#FFFBEB' : checked ? C.primaryLight : 'white', borderRadius:isEditing ? '12px 12px 0 0' : 12, padding:'11px 12px', marginBottom:isEditing ? 0 : 6, border:`1.5px solid ${row.isDuplicate ? '#F59E0B' : checked ? C.primary : 'transparent'}`, cursor:'pointer' }} onClick={() => toggle(i)}>
                  <div style={{ width:20, height:20, borderRadius:5, border:`2px solid ${checked ? C.primary : C.border}`, background:checked ? C.primary : 'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    {checked && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:C.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{row.memo || '—'}</div>
                    <div style={{ fontSize:11, color:C.textMuted, marginTop:1 }}>
                      {row.date} · <span style={{ background:C.infoBg, color:C.info, borderRadius:4, padding:'1px 6px', fontWeight:600, fontSize:10 }}>{catObj?.emoji || '📋'} {row.category}</span>
                      {row.isDuplicate && <span style={{ marginLeft:4, background:'#FEF3C7', color:'#92400E', borderRadius:4, padding:'1px 6px', fontWeight:700, fontSize:10 }}>重複</span>}
                    </div>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'", flexShrink:0 }}>¥{fmt(row.amount)}</div>
                    <button type="button" onClick={e => { e.stopPropagation(); setEditIdx(isEditing ? null : i); }} style={{ width:26, height:26, borderRadius:7, background:isEditing ? C.primary : '#E8F5F1', color:isEditing ? 'white' : C.primary, fontSize:12, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>✏</button>
                  </div>
                </div>
                {isEditing && (
                  <div style={{ background:'white', borderRadius:'0 0 12px 12px', padding:'12px 14px', border:`1.5px solid ${C.primary}`, borderTop:'none', marginBottom:6 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:C.textMuted, marginBottom:8 }}>カテゴリ</div>
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:5, marginBottom:10 }}>
                      {[...EXPENSE_CATS, {name:'その他', emoji:'📋'}].map(c => (
                        <button key={c.name} type="button" onClick={() => updateRow(i, {category:c.name})} style={{ background:row.category===c.name ? C.primary : C.bg, color:row.category===c.name ? 'white' : C.text, borderRadius:8, padding:'7px 3px', fontSize:9, fontWeight:700, border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
                          <span style={{ fontSize:16 }}>{c.emoji}</span>{c.name}
                        </button>
                      ))}
                    </div>
                    <div style={{ fontSize:11, fontWeight:700, color:C.textMuted, marginBottom:6 }}>区分</div>
                    <div style={{ display:'flex', gap:6, marginBottom:8 }}>
                      {['生活費','事業費','投資'].map(d => (
                        <button key={d} type="button" onClick={() => updateRow(i, {division:d})} style={{ flex:1, background:row.division===d ? C.primary : C.bg, color:row.division===d ? 'white' : C.textMuted, borderRadius:8, padding:'8px', fontSize:11, fontWeight:700, border:'none', cursor:'pointer' }}>{d}</button>
                      ))}
                    </div>
                    <button type="button" onClick={() => setEditIdx(null)} style={{ width:'100%', background:C.bg, color:C.textMuted, borderRadius:8, padding:'9px', fontSize:12, border:'none', cursor:'pointer' }}>完了</button>
                  </div>
                )}
              </React.Fragment>
            );
          })}
        </>)}
      </div>

      {step === 'preview' && (
        <div style={{ padding:'12px 20px 16px', flexShrink:0, background:'white', borderTop:`1px solid ${C.bgCard}` }}>
          <button type="button" onClick={importAll}
            style={{ width:'100%', background:selected.size>0 ? C.primary : C.border, color:'white', borderRadius:16, padding:'16px', fontSize:15, fontWeight:700, border:'none', cursor:selected.size>0 ? 'pointer' : 'default', boxShadow:selected.size>0 ? '0 6px 20px rgba(9,125,96,0.3)' : 'none' }}>
            {selected.size > 0 ? `${selected.size}件を取り込む` : '取引を選択してください'}
          </button>
        </div>
      )}

      <BottomNav active="input" go={go} />
    </Screen>
  );
}

// ── freee CSV Export ───────────────────────────────────────────────────────
const FREEE_ACCOUNT_MAP = {
  '食費': '食費', '交通費': '旅費交通費', '日用品': '消耗品費',
  '美容・衣服': '雑費', '医療・健康': '医療費', '趣味・娯楽': '雑費',
  '材料費': '仕入高', '機材・ソフト': '消耗品費', '出店料': '地代家賃',
  '交際費': '交際費', '教育・学習': '研修費',
  '税金': '租税公課', '投資': '投資有価証券',
};

function FreeeExportScreen({ go }) {
  const allTxns = Store.get('transactions', [])
    .filter(t => t.date)
    .sort((a, b) => b.date.localeCompare(a.date));

  const getFiltered = (p) => {
    if (p === 'month') return allTxns.filter(t => t.date.startsWith(TODAY.slice(0, 7)));
    if (p === 'last') {
      const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - 1);
      return allTxns.filter(t => t.date.startsWith(d.toISOString().slice(0, 7)));
    }
    if (p === 'year') return allTxns.filter(t => t.date.startsWith(TODAY.slice(0, 4)));
    return allTxns;
  };

  const [period, setPeriod]   = useState('month');
  const [selected, setSelected] = useState(() => new Set(getFiltered('month').map(t => t.id)));
  const [toast, setToast]     = useState('');

  const filtered    = getFiltered(period);
  const allSelected = filtered.length > 0 && filtered.every(t => selected.has(t.id));
  const showToast   = msg => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const changePeriod = v => {
    setPeriod(v);
    setSelected(new Set(getFiltered(v).map(t => t.id)));
  };

  const toggleAll = () => {
    if (allSelected) setSelected(new Set());
    else setSelected(new Set(filtered.map(t => t.id)));
  };

  const toggle = id => {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
  };

  const toAccount = t => {
    if (t.type === 'income') return t.division === '事業収入' ? '売上高' : '給与収入';
    return FREEE_ACCOUNT_MAP[t.category] || '雑費';
  };

  const exportCSV = () => {
    const rows = allTxns
      .filter(t => selected.has(t.id))
      .sort((a, b) => a.date.localeCompare(b.date));
    if (!rows.length) { showToast('出力する取引を選択してください'); return; }

    const header = ['取引日', '収支区分', '勘定科目', '税区分', '金額', '摘要', 'メモ'];
    const lines = rows.map(t => {
      const type    = t.type === 'income' ? '収入' : '支出';
      const account = toAccount(t);
      const taxDiv  = (t.division === '事業費' || t.division === '事業収入') ? '課税仕入10%' : '不課税';
      const desc    = (t.memo || t.category || t.source || '').replace(/"/g, '""');
      const memo    = [t.payment, t.division].filter(Boolean).join(' / ').replace(/"/g, '""');
      return [t.date, type, account, taxDiv, t.amount, `"${desc}"`, `"${memo}"`].join(',');
    });

    const csv  = '﻿' + [header.join(','), ...lines].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `freee-${TODAY}.csv`; a.click();
    URL.revokeObjectURL(url);
    showToast(`${rows.length}件をCSVで出力しました`);
  };

  const PERIODS = [['month','今月'], ['last','先月'], ['year','今年'], ['all','全期間']];

  return (
    <Screen>
      {toast && (
        <div style={{ position:'fixed', top:64, left:'50%', transform:'translateX(-50%)', background:'#1a1a2e', color:'white', borderRadius:12, padding:'10px 20px', fontSize:13, fontWeight:600, zIndex:999, whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.25)', pointerEvents:'none' }}>
          {toast}
        </div>
      )}

      <div style={{ flex:1, overflowY:'auto', padding:'56px 20px 20px' }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
          <button onClick={() => go('settings')} style={{ width:36, height:36, borderRadius:10, background:'white', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 1px 6px rgba(0,0,0,0.08)', flexShrink:0, border:'none', cursor:'pointer' }}>
            <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke={C.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div>
            <div style={{ fontSize:20, fontWeight:700, color:C.text }}>freee出力</div>
            <div style={{ fontSize:12, color:C.textMuted }}>取引データをfreee用CSVで書き出し</div>
          </div>
        </div>

        {/* Period */}
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:700, color:C.textMuted, letterSpacing:'0.06em', marginBottom:10 }}>期間</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
            {PERIODS.map(([v,l]) => (
              <button key={v} onClick={() => changePeriod(v)} style={{ background:period===v ? C.primary : C.bg, color:period===v ? 'white' : C.text, borderRadius:10, padding:'10px', fontSize:13, fontWeight:period===v ? 700 : 500, border:'none', cursor:'pointer' }}>{l}</button>
            ))}
          </div>
        </Card>

        {/* Select all row */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10, padding:'0 2px' }}>
          <button type="button" onClick={toggleAll} style={{ display:'flex', alignItems:'center', gap:8, background:'none', border:'none', cursor:'pointer', padding:0 }}>
            <div style={{ width:22, height:22, borderRadius:6, border:`2px solid ${allSelected ? C.primary : C.border}`, background:allSelected ? C.primary : 'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              {allSelected && <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <span style={{ fontSize:13, fontWeight:600, color:C.text }}>すべて選択</span>
          </button>
          <span style={{ fontSize:12, color:C.textMuted }}>{selected.size}件選択 / {filtered.length}件</span>
        </div>

        {/* List */}
        {filtered.length === 0 ? (
          <div style={{ textAlign:'center', padding:'40px 0', color:C.textFaint, fontSize:13 }}>この期間に取引がありません</div>
        ) : filtered.map(t => {
          const checked = selected.has(t.id);
          return (
            <button key={t.id} type="button" onClick={() => toggle(t.id)}
              style={{ width:'100%', display:'flex', alignItems:'center', gap:12, background:checked ? C.primaryLight : 'white', borderRadius:12, padding:'11px 14px', marginBottom:6, border:`1.5px solid ${checked ? C.primary : 'transparent'}`, cursor:'pointer', textAlign:'left' }}>
              <div style={{ width:20, height:20, borderRadius:5, border:`2px solid ${checked ? C.primary : C.border}`, background:checked ? C.primary : 'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                {checked && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:12, fontWeight:600, color:C.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.memo || t.category || t.source || '—'}</div>
                <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>{t.date} · {t.category || t.incomeType || ''}</div>
              </div>
              <div style={{ fontSize:13, fontWeight:700, color:t.type==='income'?C.primary:C.text, fontFeatureSettings:"'tnum'", flexShrink:0 }}>{t.type==='income'?'+':'-'}¥{fmt(t.amount)}</div>
            </button>
          );
        })}
      </div>

      {/* Export button */}
      <div style={{ padding:'12px 20px 16px', flexShrink:0, background:'white', borderTop:`1px solid ${C.bgCard}` }}>
        <button type="button" onClick={exportCSV}
          style={{ width:'100%', background:selected.size>0 ? '#4A6898' : C.border, color:'white', borderRadius:16, padding:'16px', fontSize:15, fontWeight:700, border:'none', cursor:selected.size>0 ? 'pointer' : 'default', boxShadow:selected.size>0 ? '0 6px 18px rgba(74,104,152,0.3)' : 'none' }}>
          {selected.size > 0 ? `${selected.size}件をfreee用CSVで出力` : '取引を選択してください'}
        </button>
      </div>

      <BottomNav active="settings" go={go} />
    </Screen>
  );
}

// ── App (router) ───────────────────────────────────────────────────────────
function App() {
  const [user, setUser]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [screen, setScreen] = useState('home');
  const [prev,   setPrev]   = useState('home');

  const go  = useCallback((s) => { setPrev(screen); setScreen(s); }, [screen]);
  const nav = useCallback((key) => {
    const map = { home: 'home', input: 'input', budget: 'budget', report: 'report', settings: 'settings' };
    go(map[key] || key);
  }, [go]);

  useEffect(() => {
    const setup = async (session) => {
      const u = {
        name: session.user.user_metadata.full_name || session.user.email,
        email: session.user.email,
        picture: session.user.user_metadata.avatar_url,
      };
      localStorage.setItem('gUser', JSON.stringify(u));
      await DB.init(session.user.id);
      setUser(u);
      setScreen(Store.get('settings', {}).onboardingDone ? 'home' : 'usertype');
      setLoading(false);
      setTimeout(autoBackupCheck, 2000);
    };

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) { setup(session); return; }
      const g = JSON.parse(localStorage.getItem('gUser') || 'null');
      if (g?.guest) { setUser(g); setScreen(Store.get('settings',{}).onboardingDone ? 'home' : 'usertype'); }
      setLoading(false);
    });

    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) setup(session);
      else if (event === 'SIGNED_OUT') { setUser(null); setScreen('home'); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const onLogout = async () => {
    await sb.auth.signOut();
    localStorage.clear();
    DB.userId = null;
    setUser(null);
  };

  const onSelectType = (type) => {
    Store.set('settings', { ...Store.get('settings'), userType: type });
    go(type === 'freelance' ? 'fl-ob1' : type === 'employee' ? 'emp-ob1' : 'hyb-ob1');
  };

  if (loading) return (
    <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ width: 60, height: 60, borderRadius: 16, overflow: 'hidden', margin: '0 auto 16px' }}>
          <img src="logo.png" style={{ width: '115%', height: '115%', margin: '-7.5%', display: 'block' }} alt="" />
        </div>
        <div style={{ fontSize: 13, color: C.textMuted }}>読み込み中...</div>
      </div>
    </div>
  );

  const render = () => {
    if (!user) return (
      <LoginScreen onSkip={() => {
        const g = { name: 'ゲスト', email: '', picture: null, guest: true };
        localStorage.setItem('gUser', JSON.stringify(g));
        setUser(g);
        setScreen(Store.get('settings',{}).onboardingDone ? 'home' : 'usertype');
      }} />
    );
    switch (screen) {
      case 'usertype':      return <UserTypeScreen onSelect={onSelectType} />;
      case 'fl-ob1':        return <Onboarding1    onNext={() => go('fl-ob2')} />;
      case 'fl-ob2':        return <Onboarding2    onNext={() => go('fl-ob3')} />;
      case 'fl-ob3':        return <Onboarding3    onNext={() => go('home')} />;
      case 'emp-ob1':       return <EmpOnboarding1 onNext={() => go('emp-ob2')} />;
      case 'emp-ob2':       return <EmpOnboarding2 onNext={() => go('home')} />;
      case 'hyb-ob1':       return <HybOnboarding1 onNext={() => go('hyb-ob2')} />;
      case 'hyb-ob2':       return <HybOnboarding2 onNext={() => go('hyb-ob3')} />;
      case 'hyb-ob3':       return <HybOnboarding3 onNext={() => go('home')} />;
      case 'home':          return <HomeScreen      go={nav} />;
      case 'history':       return <HistoryScreen   go={nav} />;
      case 'input':         return <InputSelector   go={nav} />;
      case 'expense-input': return <ExpenseInput    onBack={() => go(prev)} onDone={() => go('home')} go={nav} />;
      case 'income-input':  return <IncomeInput     onBack={() => go(prev)} onDone={() => go('home')} go={nav} />;
      case 'csv-import':    return <CsvImportScreen go={nav} />;
      case 'tax':           return <TaxScreen       go={nav} />;
      case 'budget':        return <BudgetScreen    go={nav} />;
      case 'biz':           return <BizScreen       go={nav} />;
      case 'report':        return <ReportScreen    go={nav} />;
      case 'networth':      return <NetWorthScreen      go={nav} />;
      case 'fixed':         return <FixedExpensesScreen go={nav} />;
      case 'cards':         return <CardsScreen         go={nav} />;
      case 'freee':         return <FreeeExportScreen   go={nav} />;
      case 'settings':      return <SettingsScreen  go={nav} user={user} onLogout={onLogout} />;
      default:              return <HomeScreen      go={nav} />;
    }
  };

  return <div style={{ minHeight: '100vh', background: C.bg }}>{render()}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
