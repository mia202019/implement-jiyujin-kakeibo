<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>自由人家計簿</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script>if (window.innerWidth >= 768 && !/Mobi|Android/i.test(navigator.userAgent)) { location.replace('desktop.html'); }</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #B2CEC8; }
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #root {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
    }
    @media (min-width: 431px) {
      #root {
        box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 30px 80px rgba(0,0,0,0.3);
      }
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input { font-family: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 7px; border-radius: 4px; background: #E0F0EC; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
    input[type=range]::-moz-range-thumb { width: 30px; height: 30px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const CLIENT_ID = '954710101476-go30mqdlnjbu24qji456qkjhe318bf9q.apps.googleusercontent.com';
function parseJwt(t) { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
const Store = {
  get: (key, def={}) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
};

// ── Design tokens ──────────────────────────────────────────────────────────
const C = {
  primary:     '#097D60',
  primaryDark: '#054D3C',
  primaryLight:'#D4E8E3',
  bg:          '#EFF8F5',
  bgCard:      '#E0F0EC',
  border:      '#C0DED6',
  warning:     '#C8748E',
  warningBg:   '#FAE8F0',
  info:        '#4A6898',
  infoBg:      '#E6EDF8',
  infoBorder:  '#A4B8D8',
  invest:      '#6A5E9C',
  text:        '#1A1917',
  textMed:     '#5A5652',
  textMuted:   '#9E9994',
  textFaint:   '#C0BAB2',
};

const fmt = n => n.toLocaleString('ja-JP');
const TODAY = new Date().toISOString().slice(0,10);
const YESTERDAY = new Date(Date.now()-86400000).toISOString().slice(0,10);
function resolveDate(d) { if (d==='今日') return TODAY; if (d==='昨日') return YESTERDAY; return d; }
function getThisMonthTxns() { const ym=TODAY.slice(0,7); return Store.get('transactions',[]).filter(t=>t.date&&t.date.startsWith(ym)); }
function sumDiv(txns, div) { return txns.filter(t=>t.type==='expense'&&t.division===div).reduce((s,t)=>s+t.amount,0); }
const CAT_EMOJI = {
  '食費':'🛒', '外食':'🍜', '交通費':'🚌', '日用品':'🧴',
  '美容・衣服':'👗', '医療・健康':'💊', '通信費':'📱', '趣味・娯楽':'🎮',
  '材料費':'🎨', '機材・ソフト':'💻', '出店料':'🏪', '交際費':'🥂',
  '教育・学習':'📚', 'その他':'📋', '売上':'💰',
};
const EXPENSE_CATS = [
  { name:'食費',       emoji:'🛒', group:'life' },
  { name:'外食',       emoji:'🍜', group:'life' },
  { name:'交通費',     emoji:'🚌', group:'life' },
  { name:'日用品',     emoji:'🧴', group:'life' },
  { name:'美容・衣服', emoji:'👗', group:'life' },
  { name:'医療・健康', emoji:'💊', group:'life' },
  { name:'通信費',     emoji:'📱', group:'life' },
  { name:'趣味・娯楽', emoji:'🎮', group:'life' },
  { name:'材料費',     emoji:'🎨', group:'biz'  },
  { name:'機材・ソフト',emoji:'💻', group:'biz'  },
  { name:'出店料',     emoji:'🏪', group:'biz'  },
  { name:'交際費',     emoji:'🥂', group:'biz'  },
  { name:'教育・学習', emoji:'📚', group:'biz'  },
  { name:'その他',     emoji:'📋', group:'other' },
];
const INVEST_TYPES = ['積立NISA','一般NISA','iDeCo','株式・投資信託','貯蓄・その他'];
const INCOME_PRESETS = ['ハンドメイド','WEBデザイン','ライティング','ネット販売','給与','アルバイト'];
const CARD_PALETTE = ['#097D60','#6366f1','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6'];
const DEFAULT_CARDS = [
  { id: 'card-def', name: 'カード', last4: '' },
  { id: 'cash-def', name: '現金',   last4: '' },
  { id: 'pp-def',   name: 'PayPay', last4: '' },
];
function getCards() { const c = Store.get('cards', []); return c.length ? c : DEFAULT_CARDS; }
function cardColor(cards, name) { const i = cards.findIndex(c=>c.name===name); return i>=0 ? CARD_PALETTE[i%CARD_PALETTE.length] : '#9ca3af'; }

// ── Shared components ──────────────────────────────────────────────────────
function Card({ children, style = {} }) {
  return (
    <div style={{ background: 'white', borderRadius: 20, padding: 20, boxShadow: '0 2px 10px rgba(0,0,0,0.05)', ...style }}>
      {children}
    </div>
  );
}

function PrimaryBtn({ children, onClick, style = {} }) {
  return (
    <button onClick={onClick} style={{
      background: C.primary, color: 'white', borderRadius: 18,
      padding: 18, textAlign: 'center', fontSize: 16, fontWeight: 700,
      boxShadow: '0 8px 24px rgba(9,125,96,0.32)', width: '100%',
      display: 'block', ...style
    }}>
      {children}
    </button>
  );
}

function Bar({ pct, color, bg = C.bgCard }) {
  return (
    <div style={{ background: bg, borderRadius: 4, height: 8, overflow: 'hidden' }}>
      <div style={{ background: color, width: `${Math.min(100, pct)}%`, height: '100%', borderRadius: 4, transition: 'width 0.3s' }} />
    </div>
  );
}

function CardBadge({ name }) {
  const cards = getCards();
  const col = cardColor(cards, name);
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:3, background:col+'22', color:col, borderRadius:6, padding:'2px 8px', fontSize:11, fontWeight:700, whiteSpace:'nowrap' }}>
      💳 {name}
    </span>
  );
}

// ── Bottom navigation ──────────────────────────────────────────────────────
function BottomNav({ active, go }) {
  const items = [
    { key: 'home',     label: 'ホーム',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M2 9.5L11 2L20 9.5V20C20 20.55 19.55 21 19 21H14V15.5H8V21H3C2.45 21 2 20.55 2 20V9.5Z" fill={a ? C.primary : 'none'} stroke={a ? 'none' : C.textFaint} strokeWidth="1.5"/></svg> },
    { key: 'input',    label: '入力',
      icon: a => <div style={{ width: 22, height: 22, borderRadius: '50%', border: `1.5px solid ${a ? C.primary : C.textFaint}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 1V9M1 5H9" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg></div> },
    { key: 'budget',   label: '予算',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="4" width="18" height="14" rx="3" fill={a ? C.primary : 'none'} stroke={a ? 'none' : C.textFaint} strokeWidth="1.5"/><path d="M7 9H15M7 13H11" stroke={a ? 'white' : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg> },
    { key: 'biz',      label: '事業',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="7" y="6" width="8" height="5" rx="1.5" stroke={a?C.primary:C.textFaint} strokeWidth="1.5" fill="none"/><rect x="2" y="10" width="18" height="10" rx="2.5" fill={a?C.primary:'none'} stroke={a?'none':C.textFaint} strokeWidth="1.5"/><path d="M11 14V16" stroke={a?'white':C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg> },
    { key: 'settings', label: '設定',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5"/><path d="M11 2V4M11 18V20M2 11H4M18 11H20M4.22 4.22L5.64 5.64M16.36 16.36L17.78 17.78M4.22 17.78L5.64 16.36M16.36 5.64L17.78 4.22" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg> },
  ];
  return (
    <div style={{ background: 'rgba(255,255,255,0.97)', borderTop: `1px solid ${C.bgCard}`, display: 'flex', flexShrink: 0, paddingBottom: 'env(safe-area-inset-bottom, 8px)' }}>
      {items.map(({ key, label, icon }) => {
        const a = active === key;
        return (
          <button key={key} onClick={() => go(key)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '10px 0 8px' }}>
            {icon(a)}
            <span style={{ fontSize: 10, fontWeight: a ? 700 : 500, color: a ? C.primary : C.textMuted }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── Screen wrapper (adds safe status bar space) ────────────────────────────
function Screen({ children, bg = C.bg }) {
  return (
    <div style={{ height: '100vh', background: bg, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {children}
    </div>
  );
}

// ── 01 Login ───────────────────────────────────────────────────────────────
function LoginScreen({ onLogin, onSkip }) {
  useEffect(() => {
    const init = () => {
      if (!window.google) { setTimeout(init, 200); return; }
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: ({ credential }) => {
          const p = parseJwt(credential);
          onLogin({ name: p.name, email: p.email, picture: p.picture });
        }
      });
      google.accounts.id.renderButton(document.getElementById('g-btn-mobile'), {
        theme: 'outline', size: 'large', width: 300, locale: 'ja'
      });
    };
    init();
  }, []);

  return (
    <Screen bg="linear-gradient(160deg, #EFF8F5 0%, #D4E8E3 55%, #D4E8E3 100%)">
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 40px' }}>
        <div style={{ width: 80, height: 80, borderRadius: 20, overflow: 'hidden', marginBottom: 28, boxShadow: '0 8px 24px rgba(9,125,96,0.15)' }}>
          <img src="logo.png" alt="logo" style={{ width: '115%', height: '115%', margin: '-7.5%', display: 'block' }} />
        </div>
        <div style={{ fontSize: 28, fontWeight: 700, color: C.text, letterSpacing: '-0.6px', marginBottom: 10, textAlign: 'center' }}>自由人家計簿</div>
        <div style={{ fontSize: 15, color: C.textMed, textAlign: 'center', lineHeight: 1.75, marginBottom: 6 }}>自由になるために、</div>
        <div style={{ fontSize: 15, color: C.textMed, textAlign: 'center', lineHeight: 1.75 }}>まず家計管理から。</div>
      </div>

      <div style={{ padding: '0 28px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
        <div id="g-btn-mobile" />
        <button onClick={onSkip} style={{ fontSize: 13, color: C.textMuted }}>アカウントなしでお試し →</button>
      </div>
      <div style={{ textAlign: 'center', padding: '0 28px 36px' }}>
        <span style={{ fontSize: 11, color: C.textFaint }}>プライバシーポリシー　·　利用規約</span>
      </div>
    </Screen>
  );
}

// ── 01b User Type Selection ────────────────────────────────────────────────
function UserTypeScreen({ onSelect }) {
  const [sel, setSel] = useState(null);
  const types = [
    { id: 'creator',   emoji: '🎨', title: 'クリエイター',   desc: 'ハンドメイド・デザイン・アートなど創作で収入を得ている' },
    { id: 'freelance', emoji: '💼', title: 'フリーランス',   desc: '個人事業主・フリーランスとして活動中' },
    { id: 'hybrid',    emoji: '⚡', title: '会社員 + 副業',  desc: '給与と副収入の両方がある' },
    { id: 'employee',  emoji: '🏢', title: '会社員',         desc: '会社に勤めて給与をもらっている' },
  ];
  return (
    <Screen bg="linear-gradient(160deg, #EFF8F5 0%, #D4E8E3 100%)">
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 0 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>あなたの<br/>働き方は？</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 32 }}>あなたに合った設定でスタートします</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {types.map(t => {
            const active = sel === t.id;
            return (
              <button key={t.id} onClick={() => setSel(t.id)} style={{ background: active ? C.primaryLight : 'white', border: `${active ? 2 : 1.5}px solid ${active ? C.primary : C.border}`, borderRadius: 20, padding: '20px 20px', display: 'flex', alignItems: 'center', gap: 16, boxShadow: active ? '0 4px 16px rgba(9,125,96,0.15)' : 'none', width: '100%', textAlign: 'left' }}>
                <div style={{ width: 48, height: 48, background: active ? C.primary : C.bg, borderRadius: 14, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>{t.emoji}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 3 }}>{t.title}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{t.desc}</div>
                </div>
                {active && <div style={{ width: 24, height: 24, background: C.primary, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></div>}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}>
        <PrimaryBtn onClick={() => sel && onSelect(sel)} style={{ opacity: sel ? 1 : 0.5 }}>次へ →</PrimaryBtn>
      </div>
    </Screen>
  );
}

// ── 02 Onboarding 1/3 — Income type ───────────────────────────────────────
function Onboarding1({ onNext }) {

// ── 03 Onboarding 2/3 — Tax rate ──────────────────────────────────────────
function Onboarding2({ onNext }) {
  const [rate, setRate] = useState(20);
  const income = 380000;
  const tax = Math.round(income * rate / 100);
  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= 1 ? C.primary : C.border }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 2 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>税金の積み立て率を<br/>設定しましょう</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 28, lineHeight: 1.7 }}>収入の何%を税金用に確保しますか？<br/>あとから変更できます。</div>

        <Card style={{ marginBottom: 16 }}>
          <div style={{ textAlign: 'center', marginBottom: 28 }}>
            <div style={{ fontSize: 60, fontWeight: 700, color: C.warning, letterSpacing: '-3px', lineHeight: 1 }}>{rate}%</div>
            <div style={{ fontSize: 12, color: C.textMuted, marginTop: 8 }}>おすすめ：フリーランスは20〜30%</div>
          </div>
          <input type="range" min={10} max={40} value={rate} onChange={e => setRate(+e.target.value)}
            style={{ width: '100%', marginBottom: 8 }} />
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 11, color: C.textFaint }}>10%</span>
            <span style={{ fontSize: 11, color: C.textFaint }}>25%</span>
            <span style={{ fontSize: 11, color: C.textFaint }}>40%</span>
          </div>
        </Card>

        <div style={{ background: C.warningBg, borderRadius: 18, padding: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: C.warning, marginBottom: 14 }}>月収 ¥{fmt(income)} の場合</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.warning, fontFeatureSettings: "'tnum'", letterSpacing: '-0.5px' }}>¥{fmt(tax)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>税金積立（{rate}%）</div>
            </div>
            <svg width="20" height="16" viewBox="0 0 20 16" fill="none"><path d="M1 8H18M13 3L18 8L13 13" stroke={C.border} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.primary, fontFeatureSettings: "'tnum'", letterSpacing: '-0.5px' }}>¥{fmt(income - tax)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>使えるお金</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={() => { Store.set('settings', { ...Store.get('settings'), taxRate: rate }); onNext(); }}>次へ →</PrimaryBtn></div>
    </Screen>
  );
}

// ── 04 Onboarding 3/3 — Category selection ────────────────────────────────
function Onboarding3({ onNext }) {
  const lifeCats = ['食費', '交通費', '日用品', '美容・衣服', '外食', '娯楽', '医療'];
  const bizCats  = ['材料費', '機材・ソフト', '外注費', '交通費（事業）', '広告宣伝', 'イベント出店'];
  const [life, setLife] = useState(new Set(['食費', '交通費', '日用品', '外食']));
  const [biz,  setBiz]  = useState(new Set(['材料費', '機材・ソフト', '交通費（事業）']));

  const toggle = (set, setFn, cat) => {
    const n = new Set(set);
    n.has(cat) ? n.delete(cat) : n.add(cat);
    setFn(n);
  };

  const Pill = ({ cat, sel, color, bg, border, onToggle }) => (
    <button onClick={onToggle} style={{ background: sel ? color : bg, color: sel ? 'white' : color, borderRadius: 999, padding: '8px 16px', fontSize: 12, fontWeight: sel ? 600 : 500, border: `1px solid ${sel ? 'transparent' : border}` }}>
      {cat}
    </button>
  );

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: C.primary }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 3 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>カテゴリを選んで<br/>ください</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 28 }}>あとから追加・変更できます</div>

        <div style={{ fontSize: 11, fontWeight: 700, color: C.info, letterSpacing: '0.06em', marginBottom: 10 }}>生活費カテゴリ</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 24 }}>
          {lifeCats.map(c => <Pill key={c} cat={c} sel={life.has(c)} color={C.info} bg={C.infoBg} border={C.infoBorder} onToggle={() => toggle(life, setLife, c)} />)}
        </div>

        <div style={{ fontSize: 11, fontWeight: 700, color: C.primary, letterSpacing: '0.06em', marginBottom: 10 }}>事業費カテゴリ</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {bizCats.map(c => <Pill key={c} cat={c} sel={biz.has(c)} color={C.primary} bg={C.primaryLight} border="#68B09A" onToggle={() => toggle(biz, setBiz, c)} />)}
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={() => { Store.set('settings', { ...Store.get('settings'), categories: [...life, ...biz], onboardingDone: true }); onNext(); }}>はじめる</PrimaryBtn></div>
    </Screen>
  );
}

// ── 05 Home ────────────────────────────────────────────────────────────────
function HomeScreen({ go }) {
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const settingsIncome = (s.salary||0) + (s.sideIncome||0) + (s.income||0);
  const taxRate = s.taxRate || (userType === 'employee' ? 0 : 20);
  const savingsGoal = s.savingsGoal || 0;
  const today = new Date();
  const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const daysLeft = daysInMonth - today.getDate();
  const fixedTotal = Store.get('fixedExpenses',[]).filter(i=>i.active).reduce((s,i)=>s+i.amount,0);

  const mTxns = getThisMonthTxns();
  const allTxns = Store.get('transactions',[]);

  const confirmedIncome = mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const displayIncome = settingsIncome || confirmedIncome;

  const lifeSpent   = sumDiv(mTxns, '生活費');
  const bizSpent    = sumDiv(mTxns, '事業費');
  const taxSaved    = sumDiv(mTxns, '税金');
  const investSaved = sumDiv(mTxns, '投資');
  const totalSpent  = mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const bdg = Store.get('budgets', {});
  const lifeBudget  = bdg['生活費']  || 0;
  const bizBudget   = bdg['事業費']  || 0;
  const taxGoal     = bdg['税金積立'] || (displayIncome > 0 ? Math.round(displayIncome * taxRate / 100) : 0);
  const investGoal  = bdg['投資']    || savingsGoal;
  const totalBudget = lifeBudget + bizBudget + taxGoal + investGoal;

  const taxShortfall = Math.max(0, taxGoal - taxSaved);
  const taxSurplus   = Math.max(0, taxSaved - taxGoal);

  const lifeBizBudget = lifeBudget + bizBudget || Math.max(0, displayIncome - taxGoal - investGoal - fixedTotal);
  const lifeBizSpent  = lifeSpent + bizSpent;
  const lifeBizLeft   = Math.max(0, lifeBizBudget - lifeBizSpent);
  const dailyBudget   = daysLeft > 0 ? Math.round(lifeBizLeft / daysLeft) : 0;

  const daysSoFar = today.getDate();
  const dailyRate = daysSoFar > 0 ? lifeBizSpent / daysSoFar : 0;
  const projected = dailyRate * daysInMonth;
  const monthEndBalance = displayIncome - projected - taxGoal - investGoal - fixedTotal;

  const nwData = Store.get('networth', { assets: [], liabilities: [] });
  const totalAssets = (nwData.assets||[]).reduce((s,a)=>s+a.amount,0);
  const totalLiab = (nwData.liabilities||[]).reduce((s,l)=>s+l.amount,0);
  const netWorth = totalAssets - totalLiab;
  const matchAssets = (kw) => (nwData.assets||[]).filter(a=>kw.some(k=>(a.name||'').includes(k)||(a.category||'').includes(k))).reduce((s,a)=>s+a.amount,0);
  const cashAmt   = matchAssets(['現金','預金','銀行','口座']);
  const investAmt = matchAssets(['NISA','投資','株','信託','iDeCo','積立']);
  const bizAmt    = matchAssets(['事業','法人','ビジネス']);
  const otherAmt  = Math.max(0, totalAssets - cashAmt - investAmt - bizAmt);

  const recentTxns = allTxns.slice(0, 5);
  const monthLabel = `${today.getMonth()+1}月`;
  const dateLabel = `${today.getFullYear()}年${today.getMonth()+1}月 · ${today.getDate()}日現在`;

  const spendPct = lifeBizBudget > 0 ? Math.round(lifeBizSpent/lifeBizBudget*100) : 0;
  const advisoryBad = spendPct >= 90 || taxShortfall > 0;
  let advisory = '';
  if (totalSpent === 0) advisory = 'まだ今月の記録がありません。入力してみましょう。';
  else if (spendPct >= 90) advisory = `消費枠の${spendPct}%を使用。残り${daysLeft}日で¥${fmt(lifeBizLeft)}です。`;
  else if (taxShortfall > 0 && taxGoal > 0) advisory = `税金積立が¥${fmt(taxShortfall)}不足。月内に積立を。`;
  else if (spendPct <= 60 && daysLeft < 15) advisory = `消費ペースは良好（${spendPct}%）。このペースをキープ！`;
  else advisory = `${monthLabel}は順調です。このペースをキープしましょう。`;

  return (
    <Screen>
      <div style={{ flex:1, overflowY:'auto', paddingTop:48 }}>

        <div style={{ padding:'14px 20px 10px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <div style={{ fontSize:20, fontWeight:700, color:C.text, letterSpacing:'-0.5px' }}>{monthLabel}の家計</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:1 }}>{dateLabel}</div>
          </div>
        </div>

        {/* ── ① 結論 ── */}
        <div style={{ margin:'0 16px 16px', background:'linear-gradient(135deg, #1D2A22 0%, #0B1F17 100%)', borderRadius:24, padding:'22px 22px 18px', position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', right:-44, top:-44, width:160, height:160, background:'rgba(9,125,96,0.14)', borderRadius:'50%', pointerEvents:'none' }} />
          <div style={{ fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.48)', marginBottom:3, letterSpacing:'0.02em' }}>今日から使っていい金額</div>
          <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:15 }}>
            <span style={{ fontSize:52, fontWeight:700, color:'white', letterSpacing:'-2.5px', fontFeatureSettings:"'tnum'", lineHeight:1 }}>¥{fmt(dailyBudget)}</span>
            <span style={{ fontSize:17, color:'rgba(255,255,255,0.5)', fontWeight:500 }}>/日</span>
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <div style={{ flex:1, background:'rgba(255,255,255,0.08)', borderRadius:12, padding:'10px 12px' }}>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.42)', marginBottom:3 }}>月末残り予測</div>
              <div style={{ fontSize:17, fontWeight:700, fontFeatureSettings:"'tnum'", color: monthEndBalance >= 0 ? '#4ade80' : '#f87171' }}>
                {monthEndBalance >= 0 ? '+' : '-'}¥{fmt(Math.abs(monthEndBalance))}
              </div>
            </div>
            <div style={{ flex:1, background: taxShortfall > 0 ? 'rgba(200,116,142,0.18)' : 'rgba(255,255,255,0.08)', borderRadius:12, padding:'10px 12px', border: taxShortfall > 0 ? '1px solid rgba(200,116,142,0.32)' : 'none' }}>
              <div style={{ fontSize:10, color: taxShortfall > 0 ? 'rgba(249,168,174,0.72)' : 'rgba(255,255,255,0.42)', marginBottom:3 }}>税金積立</div>
              <div style={{ fontSize:17, fontWeight:700, fontFeatureSettings:"'tnum'", color: taxShortfall > 0 ? '#f9a8ae' : '#4ade80' }}>
                {taxGoal === 0 ? '未設定' : taxShortfall > 0 ? `-¥${fmt(taxShortfall)}不足` : `+¥${fmt(taxSurplus)}余剰`}
              </div>
            </div>
          </div>
          {(settingsIncome > 0 || confirmedIncome > 0) && (
            <div style={{ marginTop:12, paddingTop:12, borderTop:'1px solid rgba(255,255,255,0.07)', display:'flex', gap:3, fontSize:11, flexWrap:'wrap' }}>
              <span style={{ color:'rgba(255,255,255,0.32)' }}>確定収入</span>
              <span style={{ color:'rgba(255,255,255,0.72)', fontFeatureSettings:"'tnum'", fontWeight:600, marginLeft:4 }}>¥{fmt(confirmedIncome)}</span>
              {settingsIncome > 0 && settingsIncome !== confirmedIncome && (
                <>
                  <span style={{ color:'rgba(255,255,255,0.2)', margin:'0 6px' }}>|</span>
                  <span style={{ color:'rgba(255,255,255,0.32)' }}>見込み</span>
                  <span style={{ color:'rgba(255,255,255,0.5)', fontFeatureSettings:"'tnum'", marginLeft:4 }}>¥{fmt(settingsIncome)}</span>
                </>
              )}
            </div>
          )}
        </div>

        {/* ── ② 統合サマリー ── */}
        <Card style={{ margin:'0 16px 14px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
            <div>
              <div style={{ fontSize:14, fontWeight:700, color:C.text }}>今月の消費</div>
              <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>生活 + 事業 の合算</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:20, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(totalSpent)}</div>
              {totalBudget > 0 && <div style={{ fontSize:10, color:C.textMuted, fontFeatureSettings:"'tnum'" }}>予算 ¥{fmt(totalBudget)}</div>}
            </div>
          </div>

          {totalBudget > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ background:C.bgCard, borderRadius:5, height:8, overflow:'hidden', display:'flex', marginBottom:5 }}>
                {[{a:lifeSpent,c:C.info},{a:bizSpent,c:C.primary},{a:taxSaved,c:C.warning},{a:investSaved,c:C.invest}].map((seg,i) => {
                  const w = Math.min(98, Math.round(seg.a/totalBudget*100));
                  return w > 0 ? <div key={i} style={{ width:`${w}%`, background:seg.c, height:'100%' }} /> : null;
                })}
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:C.textFaint }}>
                <span>{Math.min(100, Math.round(totalSpent/totalBudget*100))}%消費</span>
                <span style={{ fontFeatureSettings:"'tnum'" }}>残 ¥{fmt(Math.max(0, totalBudget - totalSpent))}</span>
              </div>
            </div>
          )}

          <div style={{ display:'flex', flexDirection:'column', gap:11 }}>
            {[
              { label:'🏠 生活費',  color:C.info,    spent:lifeSpent,   budget:lifeBudget },
              { label:'💼 事業費',  color:C.primary, spent:bizSpent,    budget:bizBudget },
              { label:'📊 税金積立', color:C.warning, spent:taxSaved,    budget:taxGoal },
              { label:'📈 投資',    color:C.invest,  spent:investSaved, budget:investGoal },
            ].map(item => {
              const pct = item.budget > 0 ? Math.min(100, Math.round(item.spent/item.budget*100)) : 0;
              const over = item.spent > item.budget && item.budget > 0;
              return (
                <div key={item.label}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                    <span style={{ fontSize:12, fontWeight:600, color:C.textMed }}>{item.label}</span>
                    <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:over?C.warning:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(item.spent)}</span>
                      {item.budget > 0 ? <span style={{ fontSize:10, color:C.textFaint, fontFeatureSettings:"'tnum'" }}>/ ¥{fmt(item.budget)}</span>
                                       : <span style={{ fontSize:10, color:C.textFaint, background:'#f3f4f6', padding:'0 5px', borderRadius:3 }}>未設定</span>}
                    </div>
                  </div>
                  <Bar pct={item.budget > 0 ? pct : 0} color={over ? C.warning : item.color} />
                </div>
              );
            })}
          </div>

          {totalBudget === 0 && (
            <button onClick={() => go('budget')} style={{ width:'100%', marginTop:14, padding:'11px', background:C.primaryLight, color:C.primary, border:'none', borderRadius:12, fontSize:13, fontWeight:700, cursor:'pointer' }}>
              予算を設定する →
            </button>
          )}
        </Card>

        {/* ── 税金アクション ── */}
        {taxShortfall > 0 && taxGoal > 0 && (
          <div style={{ margin:'0 16px 14px', background:C.warningBg, borderRadius:16, padding:'14px 16px', borderLeft:`3px solid ${C.warning}`, display:'flex', justifyContent:'space-between', alignItems:'center', gap:12 }}>
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:C.warning, marginBottom:2 }}>税金が¥{fmt(taxShortfall)}不足しています</div>
              <div style={{ fontSize:11, color:C.textMed }}>目安{taxRate}%（¥{fmt(taxGoal)}）· 積立済 ¥{fmt(taxSaved)}</div>
            </div>
            <button onClick={() => go('tax')} style={{ background:C.warning, color:'white', border:'none', borderRadius:10, padding:'9px 14px', fontSize:12, fontWeight:700, cursor:'pointer', whiteSpace:'nowrap', flexShrink:0 }}>今すぐ →</button>
          </div>
        )}

        {/* ── アドバイス ── */}
        <div style={{ margin:'0 16px 14px', background:advisoryBad?C.warningBg:C.primaryLight, borderRadius:13, padding:'11px 15px', borderLeft:`3px solid ${advisoryBad?C.warning:C.primary}` }}>
          <div style={{ fontSize:11, fontWeight:700, color:advisoryBad?C.warning:C.primary, marginBottom:2 }}>{advisoryBad ? '⚠ 注意' : '✓ 状況'}</div>
          <div style={{ fontSize:12, color:C.textMed, lineHeight:1.7 }}>{advisory}</div>
        </div>

        {/* ── 最近の記録 ── */}
        <div style={{ padding:'0 16px 14px' }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textMuted, letterSpacing:'0.04em', marginBottom:10 }}>最近の記録</div>
          {recentTxns.length === 0 ? (
            <div style={{ textAlign:'center', padding:'24px 0', color:C.textFaint, fontSize:13 }}>まだ記録がありません</div>
          ) : recentTxns.map(r => (
            <div key={r.id} style={{ background:'white', borderRadius:13, padding:'11px 14px', display:'flex', alignItems:'center', gap:10, marginBottom:8, boxShadow:'0 1px 4px rgba(0,0,0,0.04)' }}>
              <span style={{ fontSize:18 }}>{r.type==='income'?'💰':(CAT_EMOJI[r.category]||'📋')}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:600, color:C.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.memo||r.source||r.category}</div>
                <div style={{ fontSize:10, color:C.textMuted, marginTop:1 }}>{r.division||r.category} · {r.date}</div>
                {r.payment && <div style={{ marginTop:3 }}><CardBadge name={r.payment} /></div>}
              </div>
              <div style={{ fontSize:13, fontWeight:700, color:r.type==='income'?C.primary:C.text, fontFeatureSettings:"'tnum'", flexShrink:0 }}>
                {r.type==='income'?'+':'-'}¥{fmt(r.amount)}
              </div>
            </div>
          ))}
        </div>

        {/* ── ③ 資産 ── */}
        <div style={{ padding:'0 16px 24px' }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textMuted, letterSpacing:'0.04em', marginBottom:10 }}>資産の状況</div>
          {totalAssets > 0 ? (
            <Card>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
                <div>
                  <div style={{ fontSize:11, color:C.textMuted, marginBottom:2 }}>総資産</div>
                  <div style={{ fontSize:24, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'", letterSpacing:'-0.8px' }}>¥{fmt(totalAssets)}</div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:11, color:C.textMuted, marginBottom:2 }}>純資産</div>
                  <div style={{ fontSize:18, fontWeight:700, color:C.primary, fontFeatureSettings:"'tnum'" }}>¥{fmt(netWorth)}</div>
                </div>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                {[
                  { label:'現金・預金', amt:cashAmt,   icon:'💴' },
                  { label:'NISA・投資', amt:investAmt, icon:'📈' },
                  { label:'事業資金',   amt:bizAmt,    icon:'💼' },
                  { label:'その他',     amt:otherAmt,  icon:'🏦' },
                ].filter(i=>i.amt>0).map(item => (
                  <div key={item.label} style={{ background:C.bg, borderRadius:10, padding:'10px 12px' }}>
                    <div style={{ fontSize:10, color:C.textMuted, marginBottom:4 }}>{item.icon} {item.label}</div>
                    <div style={{ fontSize:14, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(item.amt)}</div>
                  </div>
                ))}
              </div>
              <button onClick={() => go('networth')} style={{ width:'100%', marginTop:12, padding:'8px', background:'transparent', color:C.textMuted, border:'none', fontSize:11, cursor:'pointer' }}>詳細を見る →</button>
            </Card>
          ) : (
            <button onClick={() => go('networth')} style={{ width:'100%', background:'white', borderRadius:16, padding:'16px', display:'flex', alignItems:'center', gap:12, boxShadow:'0 1px 6px rgba(0,0,0,0.06)', border:`1.5px dashed ${C.border}`, cursor:'pointer' }}>
              <span style={{ fontSize:22 }}>🏦</span>
              <div style={{ textAlign:'left' }}>
                <div style={{ fontSize:13, fontWeight:700, color:C.text }}>資産を登録する</div>
                <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>純資産・NISA・事業資金を可視化</div>
              </div>
            </button>
          )}
        </div>

      </div>
      <BottomNav active="home" go={go} />
    </Screen>
  );
}

// ── 06 Expense Input ───────────────────────────────────────────────────────
function ExpenseInput({ onBack, onDone }) {

    Store.set('transactions', [txn, ...Store.get('transactions', [])]);
    onDone();
  };

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 16px' }}>

          <button onClick={onBack} style={{ width: 32, height: 32, background: 'white', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 6px rgba(0,0,0,0.08)' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke={C.textMed} strokeWidth="1.8" strokeLinecap="round"/></svg>

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4 }}>
            <span style={{ fontSize: 36, fontWeight: 700, color: C.text }}>¥</span>

          </div>
          <div style={{ width: '60%', height: 2, background: C.primary, borderRadius: 1, margin: '12px auto 0' }} />
        </Card>

        {/* Date */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          {['今日','昨日','日付選択'].map(d => (
            <button key={d} onClick={() => setDate(d)} style={{ background: date === d ? C.primary : 'white', color: date === d ? 'white' : C.textMed, borderRadius: 999, padding: '10px 18px', fontSize: 13, fontWeight: date === d ? 600 : 500, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
              {d}

        {/* Category */}

          <div style={{ fontSize: 10, color: C.textFaint, fontWeight: 600, marginBottom: 6 }}>生活費</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginBottom: 12 }}>
            {EXPENSE_CATS.filter(c => c.group === 'life').map(c => {

              return (

                <button key={c.name} onClick={() => { setCat(c.name); if (c.group === 'biz' && div === '生活費') setDiv('事業費'); }} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>

                  <span style={{ fontSize: 9, fontWeight: active ? 600 : 500, color: active ? '#4A6898' : C.textMed, lineHeight: 1.2, textAlign: 'center' }}>{c.name}</span>

                {d}
              </button>
            ))}
          </div>
          {div === '投資' && (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 8 }}>投資の種類</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {INVEST_TYPES.map(t => (
                  <button key={t} onClick={() => setInvestType(t)} style={{ background: investType===t ? C.invest : C.bg, color: investType===t ? 'white' : C.textMuted, borderRadius: 8, padding: '6px 10px', fontSize: 11, fontWeight: investType===t ? 700 : 400, border: `1px solid ${investType===t ? C.invest : C.border}` }}>{t}</button>
                ))}
              </div>
            </div>
          )}
        </Card>

        {/* Payment + Memo */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>支払い方法</div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap' }}>
            {getCards().map(c => {
              const col = cardColor(getCards(), c.name);
              const active = pay === c.name;
              return (
                <button key={c.id} onClick={() => setPay(c.name)} style={{ background: active ? col+'18' : C.bg, color: active ? col : C.textMuted, borderRadius: 10, padding: '9px 14px', fontSize: 12, fontWeight: 600, border: `${active ? 1.5 : 1}px solid ${active ? col : C.border}` }}>
                  {c.name}{c.last4 ? ` (${c.last4})` : ''}
                </button>
              );
            })}
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 8 }}>メモ</div>
          <input value={memo} onChange={e => setMemo(e.target.value)} placeholder="メモを入力..."
            style={{ background: C.bg, borderRadius: 12, padding: '13px 16px', fontSize: 14, color: C.text, border: 'none', width: '100%', outline: 'none' }} />
        </Card>
      </div>

      <div style={{ padding: '12px 20px 24px', flexShrink: 0 }}>
        <PrimaryBtn onClick={save}>追加する</PrimaryBtn>
      </div>
    </Screen>
  );
}

// ── 09 Tax & Savings ───────────────────────────────────────────────────────
function TaxScreen({ go }) {
  const s = Store.get('settings', {});
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const goalAmt = Math.round(income * taxRate / 100);
  const txns = getThisMonthTxns();
  const savedAmt = sumDiv(txns, '税金');
  const pct = goalAmt > 0 ? Math.min(100, Math.round(savedAmt / goalAmt * 100)) : 0;
  const dashOffset = Math.round(327 * (1 - pct / 100));
  const remaining = Math.max(0, goalAmt - savedAmt);
  const today = new Date();
  const daysLeft = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate() - today.getDate();

  const allTxns = Store.get('transactions', []);
  const history = Array.from({length: 4}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const ym = d.toISOString().slice(0,7);
    const label = `${d.getMonth()+1}月`;
    const mSaved = allTxns.filter(t => t.date && t.date.startsWith(ym) && t.type==='expense' && t.division==='税金').reduce((s,t)=>s+t.amount,0);
    const mPct = goalAmt > 0 ? Math.min(100, Math.round(mSaved/goalAmt*100)) : 0;
    return { m: label, pct: mPct, amt: `¥${fmt(mSaved)}`, color: mPct >= 100 ? C.primary : C.warning };
  }).reverse();

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>
        {/* Sub-tab */}
        <div style={{ display: 'flex', background: C.primaryLight, borderRadius: 14, padding: 3, gap: 2, marginBottom: 20 }}>
          <button onClick={() => go('budget')} style={{ flex: 1, color: C.textMuted, padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 500, borderRadius: 12 }}>予算</button>
          <button style={{ flex: 1, background: C.primary, color: 'white', padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 700, borderRadius: 12, boxShadow: '0 3px 10px rgba(9,125,96,0.3)' }}>税金・積立</button>
        </div>

        <div style={{ fontSize: 21, fontWeight: 700, color: C.text, marginBottom: 4 }}>税金・積立</div>
        <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 24 }}>{today.getMonth()+1}月 — 目標達成まで頑張ろう</div>

        {/* Progress card */}
        <Card style={{ marginBottom: 16, padding: '28px 24px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
            <div style={{ flexShrink: 0, position: 'relative', width: 128, height: 128 }}>
              <svg width="128" height="128" viewBox="0 0 128 128" style={{ position: 'absolute', top: 0, left: 0 }}>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.bgCard} strokeWidth="11"/>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.warning} strokeWidth="11" strokeDasharray="327" strokeDashoffset={dashOffset} strokeLinecap="round" transform="rotate(-90 64 64)"/>
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: C.warning, lineHeight: 1, fontFeatureSettings: "'tnum'" }}>{pct}%</div>
                <div style={{ fontSize: 10, color: C.textMuted, marginTop: 4 }}>達成</div>
              </div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6 }}>積み立て済み</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: C.warning, letterSpacing: '-1px', fontFeatureSettings: "'tnum'", lineHeight: 1.1 }}>¥{fmt(savedAmt)}</div>
              <div style={{ height: 1, background: C.bgCard, margin: '12px 0' }} />
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 4 }}>今月の目標</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.text, fontFeatureSettings: "'tnum'" }}>¥{fmt(goalAmt)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>収入の{taxRate}%</div>
            </div>
          </div>
          {remaining > 0 && (
            <div style={{ marginTop: 20, background: C.warningBg, borderRadius: 14, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 10 }}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L16 14H2L9 2Z" stroke={C.warning} strokeWidth="1.4" fill="none" strokeLinejoin="round"/><path d="M9 7V10M9 12V12.5" stroke={C.warning} strokeWidth="1.4" strokeLinecap="round"/></svg>
              <div style={{ fontSize: 12, color: C.warning, lineHeight: 1.6 }}>あと <strong style={{ fontSize: 15, fontFeatureSettings: "'tnum'" }}>¥{fmt(remaining)}</strong> 積み立てが必要です。月末まであと{daysLeft}日。</div>
            </div>
          )}
          {remaining === 0 && goalAmt > 0 && (
            <div style={{ marginTop: 20, background: C.primaryLight, borderRadius: 14, padding: '14px 16px', fontSize: 13, color: C.primary, fontWeight: 700 }}>今月の目標達成！ 🎉</div>
          )}
        </Card>

        {/* History */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>月別積立状況</div>
          {history.map(row => (
            <div key={row.m} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: C.textMuted, width: 28, flexShrink: 0 }}>{row.m}</div>
              <div style={{ flex: 1, background: C.bgCard, borderRadius: 4, height: 8, overflow: 'hidden' }}>
                <div style={{ background: row.color, width: `${row.pct}%`, height: '100%', borderRadius: 4 }} />
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, color: row.color, width: 60, textAlign: 'right', fontFeatureSettings: "'tnum'" }}>{row.amt}</div>
            </div>
          ))}
        </Card>

        {/* Tips */}
        <div style={{ background: C.primaryLight, borderRadius: 18, padding: 18, marginBottom: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.primary, marginBottom: 8 }}>税金ガイド</div>
          <div style={{ fontSize: 12, color: C.textMed, lineHeight: 1.8 }}>年間所得400万円の場合、所得税+住民税の目安は約25〜30%です。消費税の納付義務がある場合はさらに10%の積み立てが必要です。</div>
        </div>

        {/* Future simulation */}
        {(() => {
          const s = Store.get('settings', {});
          const budgets = Store.get('budgets', {});
          const monthlyInvest = budgets['投資'] || s.savingsGoal || 0;
          if (!monthlyInvest) return null;
          const fv = (pmt, rate, yrs) => Math.round(pmt * ((Math.pow(1 + rate/12, yrs*12) - 1) / (rate/12)));
          return (
            <Card style={{ background: 'linear-gradient(135deg, #EDE8F8 0%, #E8F5F0 100%)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 4 }}>将来の資産シミュレーション 📈</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 14 }}>毎月 ¥{fmt(monthlyInvest)} × 年利5%複利</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                {[{l:'10年後',y:10},{l:'20年後',y:20},{l:'30年後',y:30}].map(r => (
                  <div key={r.l} style={{ background: 'white', borderRadius: 12, padding: '12px 8px', textAlign: 'center' }}>
                    <div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, marginBottom: 4 }}>{r.l}</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.invest, fontFeatureSettings: "'tnum'" }}>¥{fmt(fv(monthlyInvest, 0.05, r.y))}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 10, color: C.textFaint, marginTop: 10, lineHeight: 1.5 }}>※ 参考値。NISA・iDeCoでは利益が非課税。</div>
            </Card>
          );
        })()}
      </div>

      <BottomNav active="budget" go={go} />
    </Screen>
  );
}

// ── 10 Budget ──────────────────────────────────────────────────────────────
function BudgetScreen({ go }) {
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const defaultTax = Math.round(income * taxRate / 100);
  const [budgets, setBudgets] = useState(() => ({
    '生活費': 0, '事業費': 0, '税金積立': defaultTax, '投資': s.savingsGoal || 0,
    ...Store.get('budgets', {}),
  }));
  const [editKey, setEditKey] = useState(null);
  const [editVal, setEditVal] = useState('');

  const txns = getThisMonthTxns();
  const usedMap = {
    '生活費':  sumDiv(txns, '生活費'),
    '事業費':  sumDiv(txns, '事業費'),
    '税金積立': sumDiv(txns, '税金'),
    '投資':    sumDiv(txns, '投資'),
  };

  const cats = [
    { key:'生活費',  name:'生活費',  color:C.info,    icon:'🏠', desc:'食費・交通費など日々の出費' },
    { key:'事業費',  name:userType==='employee'?'特別支出':'事業費', color:C.primary, icon:'💼', desc:'材料費・機材・経費' },
    { key:'税金積立', name:'税金積立', color:C.warning, icon:'📊', desc:`${taxRate}% 積立目標` },
    { key:'投資',    name:userType==='freelance'?'投資':'貯蓄', color:C.invest, icon:'📈', desc:'将来への積立' },
  ];

  const totalBudget = cats.reduce((s,c)=>s+(budgets[c.key]||0), 0);
  const totalUsed   = cats.reduce((s,c)=>s+(usedMap[c.key]||0), 0);
  const unallocated = income - totalBudget;

  const commitEdit = (key) => {
    const next = { ...budgets, [key]: parseInt(editVal)||0 };
    setBudgets(next); Store.set('budgets', next); setEditKey(null);
  };

  const applyPreset = (name) => {
    if (!income) return;
    const tax = taxRate / 100;
    const presets = {
      'バランス型': [0.40, 0.20, tax, 0.10],
      '節税重視':   [0.35, 0.15, tax, 0.20],
      '事業優先':   [0.25, 0.35, tax, 0.10],
    };
    const [r0,r1,r2,r3] = presets[name];
    const next = { '生活費': Math.round(income*r0), '事業費': Math.round(income*r1), '税金積立': Math.round(income*r2), '投資': Math.round(income*r3) };
    setBudgets(next); Store.set('budgets', next);
  };

  return (
    <Screen>
      <div style={{ flex:1, overflowY:'auto', padding:'56px 20px 20px' }}>
        <div style={{ display:'flex', background:C.primaryLight, borderRadius:14, padding:3, gap:2, marginBottom:20 }}>
          <button style={{ flex:1, background:C.primary, color:'white', padding:'10px', fontSize:13, fontWeight:700, borderRadius:12, boxShadow:'0 3px 10px rgba(9,125,96,0.3)' }}>予算</button>
          <button onClick={() => go('tax')} style={{ flex:1, color:C.textMuted, padding:'10px', fontSize:13, fontWeight:500, borderRadius:12 }}>税金・積立</button>
        </div>

        <div style={{ fontSize:21, fontWeight:700, color:C.text, marginBottom:20 }}>月の予算設定</div>

        {/* Income + Unallocated */}
        <Card style={{ marginBottom:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, marginBottom:4 }}>今月の収入</div>
              <div style={{ fontSize:26, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(income)}</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:11, fontWeight:600, color:unallocated>=0?C.primary:C.warning, marginBottom:4 }}>{unallocated>=0?'未配分':'配分超過'}</div>
              <div style={{ fontSize:22, fontWeight:700, color:unallocated>=0?C.primary:C.warning, fontFeatureSettings:"'tnum'" }}>
                {unallocated<0&&'-'}¥{fmt(Math.abs(unallocated))}
              </div>
            </div>
          </div>

          {/* Allocation stacked bar */}
          <div style={{ background:C.bgCard, borderRadius:6, height:10, overflow:'hidden', display:'flex', marginBottom:10 }}>
            {cats.map(c => {
              const w = income > 0 ? Math.min(99, Math.round((budgets[c.key]||0)/income*100)) : 0;
              return w > 0 ? <div key={c.key} style={{ width:`${w}%`, background:c.color, height:'100%' }} /> : null;
            })}
          </div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:'6px 14px' }}>
            {cats.map(c => income>0 && (budgets[c.key]||0)>0 ? (
              <div key={c.key} style={{ display:'flex', alignItems:'center', gap:4 }}>
                <div style={{ width:7, height:7, borderRadius:2, background:c.color }} />
                <span style={{ fontSize:10, color:C.textMuted }}>{c.key} {Math.round((budgets[c.key]||0)/income*100)}%</span>
              </div>
            ) : null)}
          </div>

          {/* Quick presets */}
          {income > 0 && (
            <div style={{ marginTop:16, paddingTop:14, borderTop:`1px solid ${C.bgCard}` }}>
              <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, marginBottom:10 }}>クイック配分</div>
              <div style={{ display:'flex', gap:8 }}>
                {['バランス型','節税重視','事業優先'].map(p => (
                  <button key={p} onClick={() => applyPreset(p)} style={{ flex:1, background:C.bg, borderRadius:10, padding:'9px 6px', fontSize:11, fontWeight:600, color:C.primary, border:`1.5px solid ${C.primary}33`, cursor:'pointer' }}>{p}</button>
                ))}
              </div>
            </div>
          )}
        </Card>

        {/* Per-category cards */}
        {cats.map(item => {
          const budget = budgets[item.key] || 0;
          const used = usedMap[item.key] || 0;
          const pct = budget > 0 ? Math.min(100, Math.round(used/budget*100)) : 0;
          const remaining = Math.max(0, budget - used);
          const over = used > budget && budget > 0;
          const incPct = income > 0 && budget > 0 ? Math.round(budget/income*100) : 0;

          return (
            <Card key={item.key} style={{ marginBottom:12 }}>
              <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
                <div style={{ width:42, height:42, background:item.color+'18', borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', fontSize:19, flexShrink:0 }}>{item.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:C.text }}>{item.name}</div>
                  <div style={{ fontSize:11, color:C.textMuted }}>{item.desc}</div>
                </div>
                {editKey === item.key ? (
                  <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                    <span style={{ fontSize:14, color:C.textMuted }}>¥</span>
                    <input autoFocus type="number" value={editVal}
                      onChange={e => setEditVal(e.target.value)}
                      onBlur={() => commitEdit(item.key)}
                      onKeyDown={e => e.key==='Enter' && commitEdit(item.key)}
                      style={{ width:96, fontSize:16, fontWeight:700, padding:'8px 10px', border:`2px solid ${item.color}`, borderRadius:10, outline:'none', textAlign:'right' }}
                    />
                  </div>
                ) : (
                  <button onClick={() => { setEditKey(item.key); setEditVal(String(budget)); }}
                    style={{ background:C.bg, borderRadius:12, padding:'8px 14px', border:`1.5px solid ${C.border}`, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
                    <span style={{ fontSize:15, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(budget)}</span>
                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L3.5 10.5H1.5V8.5L8.5 1.5Z" stroke={C.textMuted} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </button>
                )}
              </div>

              <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:8 }}>
                <span style={{ color:C.textMuted }}>使用 <strong style={{ color:over?C.warning:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(used)}</strong></span>
                <div style={{ display:'flex', gap:12, alignItems:'center' }}>
                  {budget > 0 && <span style={{ color:over?C.warning:C.primary }}>残 <strong style={{ fontFeatureSettings:"'tnum'" }}>¥{fmt(remaining)}</strong></span>}
                  {incPct > 0 && <span style={{ color:C.textFaint }}>収入の{incPct}%</span>}
                </div>
              </div>

              {budget > 0 ? (
                <>
                  <div style={{ background:C.bgCard, borderRadius:4, height:7, overflow:'hidden' }}>
                    <div style={{ background:over?C.warning:item.color, width:`${pct}%`, height:'100%', borderRadius:4, transition:'width .3s' }} />
                  </div>
                  <div style={{ textAlign:'right', fontSize:10, color:over?C.warning:C.textMuted, marginTop:3 }}>{pct}%{over&&' 超過'}</div>
                </>
              ) : (
                <div style={{ fontSize:12, color:C.textFaint, fontStyle:'italic', paddingBottom:2 }}>タップして予算を設定 →</div>
              )}
            </Card>
          );
        })}
      </div>
      <BottomNav active="budget" go={go} />
    </Screen>
  );
}

// ── 11 Monthly Report ──────────────────────────────────────────────────────
function ReportScreen({ go }) {
  const allTxns = Store.get('transactions', []);
  const today = new Date();
  const currYm = TODAY.slice(0,7);
  const currT = allTxns.filter(t=>t.date&&t.date.startsWith(currYm));
  const thisInc = currT.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const thisExp = currT.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const thisBalance = thisInc - thisExp;
  const savingsRate = thisInc > 0 ? ((thisInc-thisExp)/thisInc*100).toFixed(1) : '0.0';

  // 6-month trend
  const months = Array.from({length:6}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth()-5+i, 1);
    const ym = d.toISOString().slice(0,7);
    const mT = allTxns.filter(t=>t.date&&t.date.startsWith(ym));
    const inc = mT.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = mT.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return { label:`${d.getMonth()+1}月`, inc, exp, isCurrent:i===5 };
  });
  const maxVal = Math.max(...months.map(m=>Math.max(m.inc,m.exp)), 1);
  const scale = v => Math.round(v/maxVal*100);

  // Category breakdown by division
  const byDiv = { '生活費':{}, '事業費':{}, '税金':{}, '投資':{} };
  currT.filter(t=>t.type==='expense').forEach(t=>{
    const d = t.division||'生活費';
    if (byDiv[d]) byDiv[d][t.category] = (byDiv[d][t.category]||0)+t.amount;
  });
  const lifeExp   = Object.values(byDiv['生活費']).reduce((s,v)=>s+v,0);
  const bizExp    = Object.values(byDiv['事業費']).reduce((s,v)=>s+v,0);
  const topCats = Object.entries(
    currT.filter(t=>t.type==='expense').reduce((acc,t)=>({...acc,[t.category]:(acc[t.category]||0)+t.amount}),{})
  ).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const monthLabel = `${today.getMonth()+1}月`;

  return (
    <Screen>
      <div style={{ flex:1, overflowY:'auto', padding:'56px 16px 20px' }}>
        <div style={{ fontSize:20, fontWeight:700, color:C.text, marginBottom:18 }}>{monthLabel}のレポート</div>

        {/* ① キャッシュフロー */}
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:14 }}>キャッシュフロー</div>
          <div style={{ display:'flex', gap:10, marginBottom:16 }}>
            {[
              { label:'収入', val:thisInc, color:C.primary },
              { label:'支出', val:thisExp, color:C.info },
              { label:'収支', val:thisBalance, color:thisBalance>=0?C.primary:C.warning },
            ].map(s => (
              <div key={s.label} style={{ flex:1, background:C.bg, borderRadius:12, padding:'12px 14px' }}>
                <div style={{ fontSize:10, fontWeight:600, color:C.textMuted, marginBottom:5 }}>{s.label}</div>
                <div style={{ fontSize:18, fontWeight:700, color:s.color, fontFeatureSettings:"'tnum'", letterSpacing:'-0.5px' }}>
                  {s.label==='収支'&&s.val>=0?'+':''}{s.val < 0?'-':''}{s.val < 0 ? '' : ''}¥{fmt(Math.abs(s.val))}
                </div>
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {[['生活費', lifeExp, C.info], ['事業費', bizExp, C.primary]].map(([l,v,c]) => (
              <div key={l} style={{ flex:1, display:'flex', justifyContent:'space-between', alignItems:'center', background:c+'12', borderRadius:10, padding:'10px 14px' }}>
                <span style={{ fontSize:12, fontWeight:600, color:c }}>{l}</span>
                <span style={{ fontSize:13, fontWeight:700, color:c, fontFeatureSettings:"'tnum'" }}>¥{fmt(v)}</span>
              </div>
            ))}
          </div>
        </Card>

        {/* ② 6ヶ月の収支推移 */}
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:4 }}>6ヶ月の収支推移</div>
          <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:14 }}>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}><div style={{ width:9,height:9,borderRadius:2,background:C.primary }}/><span style={{ fontSize:10,color:C.textMuted }}>収入</span></div>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}><div style={{ width:9,height:9,borderRadius:2,background:C.info }}/><span style={{ fontSize:10,color:C.textMuted }}>支出</span></div>
          </div>
          <svg viewBox="0 0 348 130" style={{ width:'100%', overflow:'visible' }}>
            <line x1="0" y1="100" x2="348" y2="100" stroke={C.border} strokeWidth="1.2"/>
            <line x1="0" y1="50" x2="348" y2="50" stroke={C.bgCard} strokeWidth="1"/>
            {months.map((d, i) => {
              const ih = scale(d.inc), eh = scale(d.exp);
              return (
                <g key={d.label}>
                  <rect x={i*58+6}  y={100-ih} width="20" height={ih} rx="3" fill={C.primary} opacity={d.isCurrent?1:0.6}/>
                  <rect x={i*58+28} y={100-eh} width="20" height={eh} rx="3" fill={C.info}    opacity={d.isCurrent?1:0.6}/>
                  <text x={i*58+24} y="118" textAnchor="middle" fontSize="10" fill={d.isCurrent?C.text:C.textFaint} fontWeight={d.isCurrent?'700':'400'} fontFamily="sans-serif">{d.label}</text>
                </g>
              );
            })}
          </svg>
        </Card>

        {/* ③ カテゴリ別支出 */}
        <Card>
          <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:14 }}>支出カテゴリ（{monthLabel}）</div>
          {topCats.length === 0 ? (
            <div style={{ textAlign:'center', padding:'16px 0', color:C.textFaint, fontSize:13 }}>まだ支出がありません</div>
          ) : topCats.map(([cat,amt], i) => (
            <div key={cat} style={{ marginBottom: i<topCats.length-1?12:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                  <span style={{ fontSize:13 }}>{CAT_EMOJI[cat]||'📋'}</span>
                  <span style={{ fontSize:12, fontWeight:600, color:C.textMed }}>{cat}</span>
                </div>
                <span style={{ fontSize:13, fontWeight:700, color:C.text, fontFeatureSettings:"'tnum'" }}>¥{fmt(amt)}</span>
              </div>
              <Bar pct={thisExp>0?Math.round(amt/thisExp*100):0} color={[C.info,C.primary,C.warning,C.invest,'#06b6d4'][i%5]} />
            </div>
          ))}
          {thisInc > 0 && (
            <div style={{ marginTop:16, paddingTop:14, borderTop:`1px solid ${C.bgCard}`, display:'flex', justifyContent:'space-between', fontSize:12 }}>
              <span style={{ color:C.textMuted }}>貯蓄率（税引き前）</span>
              <span style={{ fontWeight:700, color:parseFloat(savingsRate)>=20?C.primary:C.warning }}>{savingsRate}%</span>
            </div>
          )}
        </Card>
      </div>
      <BottomNav active="report" go={go} />
    </Screen>
  );
}

function NetWorthScreen({ go }) {
  const [data, setData] = useState(() => Store.get('networth', { assets: [], liabilities: [] }));

    if (!form.name || !form.amount) return;
    const item = { id: Date.now(), name: form.name, institution: form.institution, amount: Number(form.amount), cat: form.cat };
    const next = { ...data, [formTab]: [...data[formTab], item], updatedAt: TODAY };
    setData(next); Store.set('networth', next);
    setForm({ name: '', institution: '', amount: '', cat: formTab === 'assets' ? 'savings' : 'mortgage' });
    setShowForm(false);
  };
  const remove = (type, id) => {
    const next = { ...data, [type]: data[type].filter(i => i.id !== id), updatedAt: TODAY };
    setData(next); Store.set('networth', next);
  };

  const totalAssets = data.assets.reduce((s,i) => s+i.amount, 0);
  const totalLiab   = data.liabilities.reduce((s,i) => s+i.amount, 0);
  const netWorth    = totalAssets - totalLiab;
  const nwPos       = netWorth >= 0;
  const viewItems   = data[viewTab];
  const viewCats    = viewTab === 'assets' ? NW_ASSET_CATS : NW_LIAB_CATS;
  const inputStyle  = { background: C.bg, borderRadius: 10, padding: '11px 14px', fontSize: 14, color: C.text, border: `1.5px solid ${C.border}`, width: '100%', outline: 'none' };

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>

  { id: 'rent',    name: '住居',    emoji: '🏠', color: '#4A6898' },
  { id: 'utility', name: '光熱費',  emoji: '💡', color: '#E8935F' },
  { id: 'comms',   name: '通信費',  emoji: '📱', color: '#6A5E9C' },
  { id: 'sub',     name: 'サブスク',emoji: '📺', color: '#C8748E' },
  { id: 'insure',  name: '保険',    emoji: '🛡️', color: '#5B7B6F' },
  { id: 'other',   name: 'その他',  emoji: '📋', color: '#9CA3AF' },
];

function FixedExpensesScreen({ go }) {
  const [items, setItems] = useState(() => Store.get('fixedExpenses', []));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name: '', amount: '', cat: 'rent', payment: 'カード', day: '毎月1日' });
  const [regSet, setRegSet] = useState(() => new Set(
    Store.get('transactions',[]).filter(t=>t.source==='fixed'&&t.date&&t.date.startsWith(thisMonthStr())).map(t=>t.fixedId)
  ));

  const save = () => {
    if (!form.name || !form.amount) return;
    const next = [...items, { id: Date.now(), ...form, amount: Number(form.amount), active: true }];
    setItems(next); Store.set('fixedExpenses', next);
    setForm({ name: '', amount: '', cat: 'rent', payment: 'カード', day: '毎月1日' });
    setShowForm(false);
  };
  const toggle = id => { const n = items.map(i => i.id === id ? {...i, active: !i.active} : i); setItems(n); Store.set('fixedExpenses', n); };
  const remove = id => { const n = items.filter(i => i.id !== id); setItems(n); Store.set('fixedExpenses', n); };

  const registerAll = () => {
    const toReg = items.filter(i => i.active && !regSet.has(i.id));
    if (!toReg.length) return;
    const existing = Store.get('transactions', []);
    const newTxns = toReg.map((item, idx) => ({
      id: Date.now() + idx, type: 'expense', amount: item.amount, category: 'その他',
      division: '生活費', payment: item.payment, memo: item.name,
      date: TODAY, source: 'fixed', fixedId: item.id,
    }));
    Store.set('transactions', [...existing, ...newTxns]);
    setRegSet(new Set([...regSet, ...toReg.map(i => i.id)]));
  };

  const activeTotal = items.filter(i => i.active).reduce((s,i) => s + i.amount, 0);
  const unregistered = items.filter(i => i.active && !regSet.has(i.id));
  const catGroups = FIXED_CATS.map(c => ({ ...c, items: items.filter(i => i.cat === c.id) })).filter(c => c.items.length > 0);
  const inputStyle = { background: C.bg, borderRadius: 10, padding: '11px 14px', fontSize: 14, color: C.text, border: `1.5px solid ${C.border}`, width: '100%', outline: 'none' };

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
          <button onClick={() => go('settings')} style={{ width: 36, height: 36, borderRadius: 10, background: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 6px rgba(0,0,0,0.08)', flexShrink: 0 }}>
            <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke={C.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: C.text }}>固定費の管理</div>
            <div style={{ fontSize: 12, color: C.textMuted }}>毎月かかる固定の支出を登録</div>
          </div>
        </div>

        {/* Summary card */}
        <Card style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 600, marginBottom: 4 }}>毎月の固定費合計</div>
          <div style={{ fontSize: 36, fontWeight: 700, color: C.text, letterSpacing: '-1.5px', fontFeatureSettings: "'tnum'" }}>¥{fmt(activeTotal)}</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>{items.filter(i=>i.active).length}件が有効 / 全{items.length}件</div>
        </Card>

        {/* Bulk register button */}
        {items.filter(i=>i.active).length > 0 && (
          <button onClick={registerAll} disabled={unregistered.length===0} style={{ width: '100%', background: unregistered.length>0 ? '#4A6898' : C.primaryLight, color: unregistered.length>0 ? 'white' : C.primary, borderRadius: 14, padding: '14px', fontSize: 13, fontWeight: 700, marginBottom: 10, boxShadow: unregistered.length>0 ? '0 6px 18px rgba(74,104,152,0.28)' : 'none', cursor: unregistered.length>0 ? 'pointer' : 'default' }}>
            {unregistered.length>0 ? `今月の支出に一括登録（${unregistered.length}件）` : '✓ 今月はすべて登録済み'}
          </button>
        )}

        {/* Add button */}
        <button onClick={() => setShowForm(v => !v)} style={{ width: '100%', background: C.primary, color: 'white', borderRadius: 14, padding: '14px', fontSize: 14, fontWeight: 700, marginBottom: 14, boxShadow: '0 6px 18px rgba(9,125,96,0.28)' }}>
          {showForm ? '× 閉じる' : '+ 固定費を追加'}
        </button>

        {/* Add form */}
        {showForm && (
          <Card style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 14 }}>固定費を入力</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 5, fontWeight: 600 }}>名称</div>
                <input value={form.name} onChange={e => setForm(f=>({...f, name: e.target.value}))} placeholder="例：家賃、Netflix" style={inputStyle} />
              </div>
              <div>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 5, fontWeight: 600 }}>金額（円）</div>
                <input type="number" value={form.amount} onChange={e => setForm(f=>({...f, amount: e.target.value}))} placeholder="0" style={{ ...inputStyle, fontSize: 22, fontWeight: 700 }} />
              </div>
              <div>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 5, fontWeight: 600 }}>カテゴリ</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6 }}>
                  {FIXED_CATS.map(c => (
                    <button key={c.id} onClick={() => setForm(f=>({...f, cat: c.id}))} style={{ background: form.cat === c.id ? c.color : C.bg, color: form.cat === c.id ? 'white' : C.text, borderRadius: 10, padding: '8px 6px', fontSize: 11, fontWeight: form.cat === c.id ? 700 : 400, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                      <span style={{ fontSize: 18 }}>{c.emoji}</span>{c.name}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 5, fontWeight: 600 }}>引き落とし日</div>
                  <select value={form.day} onChange={e => setForm(f=>({...f, day: e.target.value}))} style={{ ...inputStyle, fontSize: 12 }}>
                    {['毎月1日','毎月5日','毎月10日','毎月15日','毎月20日','毎月25日','毎月末日'].map(d => <option key={d}>{d}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 5, fontWeight: 600 }}>支払い</div>
                  <select value={form.payment} onChange={e => setForm(f=>({...f, payment: e.target.value}))} style={{ ...inputStyle, fontSize: 12 }}>
                    {getCards().map(c => <option key={c.id} value={c.name}>{c.name}{c.last4 ? ` (${c.last4})` : ''}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
                <button onClick={save} style={{ flex: 1, background: C.primary, color: 'white', borderRadius: 10, padding: '12px', fontSize: 13, fontWeight: 700 }}>保存</button>
                <button onClick={() => setShowForm(false)} style={{ flex: 1, background: C.bg, color: C.textMuted, borderRadius: 10, padding: '12px', fontSize: 13 }}>キャンセル</button>
              </div>
            </div>
          </Card>
        )}

        {/* Category breakdown */}
        {catGroups.length > 0 && (
          <Card style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.textMuted, marginBottom: 12 }}>カテゴリ別</div>
            {catGroups.map(c => {
              const amt = c.items.filter(i=>i.active).reduce((s,i)=>s+i.amount, 0);
              return (
                <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
                  <span style={{ fontSize: 18 }}>{c.emoji}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{c.name}</div>
                    <div style={{ fontSize: 11, color: C.textMuted }}>{c.items.filter(i=>i.active).length}件</div>

                  <div style={{ fontSize: 13, fontWeight: 700, color: C.text, fontFeatureSettings: "'tnum'" }}>¥{fmt(amt)}</div>

        <Card style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 14 }}>固定費一覧</div>
          {items.length === 0 ? (

              {items.map(item => {
                const cat = FIXED_CATS.find(c => c.id === item.cat) || FIXED_CATS[5];
                const registered = regSet.has(item.id);
                return (
                  <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', background: item.active ? C.bg : '#F5F5F5', borderRadius: 14, opacity: item.active ? 1 : 0.6 }}>
                    <div style={{ width: 36, height: 36, background: item.active ? cat.color : '#CCC', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, flexShrink: 0 }}>{cat.emoji}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{item.name}</div>
                      <div style={{ fontSize: 11, color: C.textMuted, marginTop: 1 }}>{cat.name} · {item.day}</div>
