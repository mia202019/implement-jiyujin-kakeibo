<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>自由人家計簿</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script>if (window.innerWidth >= 768 && !/Mobi|Android/i.test(navigator.userAgent)) { location.replace('desktop.html'); }</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #B2CEC8; }
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #root {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
    }
    @media (min-width: 431px) {
      #root {
        box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 30px 80px rgba(0,0,0,0.3);
      }
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input { font-family: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 7px; border-radius: 4px; background: #E0F0EC; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
    input[type=range]::-moz-range-thumb { width: 30px; height: 30px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const CLIENT_ID = '954710101476-go30mqdlnjbu24qji456qkjhe318bf9q.apps.googleusercontent.com';
function parseJwt(t) { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
const Store = {
  get: (key, def={}) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
};

// ── Design tokens ──────────────────────────────────────────────────────────
const C = {
  primary:     '#097D60',
  primaryDark: '#054D3C',
  primaryLight:'#D4E8E3',
  bg:          '#EFF8F5',
  bgCard:      '#E0F0EC',
  border:      '#C0DED6',
  warning:     '#C8748E',
  warningBg:   '#FAE8F0',
  info:        '#4A6898',
  infoBg:      '#E6EDF8',
  infoBorder:  '#A4B8D8',
  invest:      '#6A5E9C',
  text:        '#1A1917',
  textMed:     '#5A5652',
  textMuted:   '#9E9994',
  textFaint:   '#C0BAB2',
};

const fmt = n => n.toLocaleString('ja-JP');
const TODAY = new Date().toISOString().slice(0,10);
const YESTERDAY = new Date(Date.now()-86400000).toISOString().slice(0,10);
function resolveDate(d) { if (d==='今日') return TODAY; if (d==='昨日') return YESTERDAY; return d; }
function getThisMonthTxns() { const ym=TODAY.slice(0,7); return Store.get('transactions',[]).filter(t=>t.date&&t.date.startsWith(ym)); }
function sumDiv(txns, div) { return txns.filter(t=>t.type==='expense'&&t.division===div).reduce((s,t)=>s+t.amount,0); }
const CAT_EMOJI = {'食費':'🛒','交通費':'🚌','日用品':'🧴','材料費':'🎨','機材・ソフト':'💻','外食':'🍜','美容・衣服':'👗','その他':'📋','売上':'💰'};

// ── Shared components ──────────────────────────────────────────────────────
function Card({ children, style = {} }) {
  return (
    <div style={{ background: 'white', borderRadius: 20, padding: 20, boxShadow: '0 2px 10px rgba(0,0,0,0.05)', ...style }}>
      {children}
    </div>
  );
}

function PrimaryBtn({ children, onClick, style = {} }) {
  return (
    <button onClick={onClick} style={{
      background: C.primary, color: 'white', borderRadius: 18,
      padding: 18, textAlign: 'center', fontSize: 16, fontWeight: 700,
      boxShadow: '0 8px 24px rgba(9,125,96,0.32)', width: '100%',
      display: 'block', ...style
    }}>
      {children}
    </button>
  );
}

function Bar({ pct, color, bg = C.bgCard }) {
  return (
    <div style={{ background: bg, borderRadius: 4, height: 8, overflow: 'hidden' }}>
      <div style={{ background: color, width: `${Math.min(100, pct)}%`, height: '100%', borderRadius: 4, transition: 'width 0.3s' }} />
    </div>
  );
}

// ── Bottom navigation ──────────────────────────────────────────────────────
function BottomNav({ active, go }) {
  const items = [
    { key: 'home',     label: 'ホーム',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M2 9.5L11 2L20 9.5V20C20 20.55 19.55 21 19 21H14V15.5H8V21H3C2.45 21 2 20.55 2 20V9.5Z" fill={a ? C.primary : 'none'} stroke={a ? 'none' : C.textFaint} strokeWidth="1.5"/></svg> },
    { key: 'input',    label: '入力',
      icon: a => <div style={{ width: 22, height: 22, borderRadius: '50%', border: `1.5px solid ${a ? C.primary : C.textFaint}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 1V9M1 5H9" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg></div> },
    { key: 'budget',   label: '予算',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="4" width="18" height="14" rx="3" fill={a ? C.primary : 'none'} stroke={a ? 'none' : C.textFaint} strokeWidth="1.5"/><path d="M7 9H15M7 13H11" stroke={a ? 'white' : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg> },
    { key: 'report',   label: 'レポート',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="12" width="4" height="8" rx="1.5" fill={a ? C.primary : C.textFaint}/><rect x="9" y="7" width="4" height="13" rx="1.5" fill={a ? C.primary : C.textFaint}/><rect x="16" y="3" width="4" height="17" rx="1.5" fill={a ? C.primary : C.textFaint}/></svg> },
    { key: 'settings', label: '設定',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5"/><path d="M11 2V4M11 18V20M2 11H4M18 11H20M4.22 4.22L5.64 5.64M16.36 16.36L17.78 17.78M4.22 17.78L5.64 16.36M16.36 5.64L17.78 4.22" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg> },
  ];
  return (
    <div style={{ background: 'rgba(255,255,255,0.97)', borderTop: `1px solid ${C.bgCard}`, display: 'flex', flexShrink: 0, paddingBottom: 'env(safe-area-inset-bottom, 8px)' }}>
      {items.map(({ key, label, icon }) => {
        const a = active === key;
        return (
          <button key={key} onClick={() => go(key)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '10px 0 8px' }}>
            {icon(a)}
            <span style={{ fontSize: 10, fontWeight: a ? 700 : 500, color: a ? C.primary : C.textMuted }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── Screen wrapper (adds safe status bar space) ────────────────────────────
function Screen({ children, bg = C.bg }) {
  return (
    <div style={{ height: '100vh', background: bg, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {children}
    </div>
  );
}

// ── 01 Login ───────────────────────────────────────────────────────────────
function LoginScreen({ onLogin, onSkip }) {
  useEffect(() => {
    const init = () => {
      if (!window.google) { setTimeout(init, 200); return; }
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: ({ credential }) => {
          const p = parseJwt(credential);
          onLogin({ name: p.name, email: p.email, picture: p.picture });
        }
      });
      google.accounts.id.renderButton(document.getElementById('g-btn-mobile'), {
        theme: 'outline', size: 'large', width: 300, locale: 'ja'
      });
    };
    init();
  }, []);

  return (
    <Screen bg="linear-gradient(160deg, #EFF8F5 0%, #D4E8E3 55%, #D4E8E3 100%)">
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 40px' }}>
        <div style={{ width: 80, height: 80, borderRadius: 20, overflow: 'hidden', marginBottom: 28, boxShadow: '0 8px 24px rgba(9,125,96,0.15)' }}>
          <img src="logo.png" alt="logo" style={{ width: '115%', height: '115%', margin: '-7.5%', display: 'block' }} />
        </div>
        <div style={{ fontSize: 28, fontWeight: 700, color: C.text, letterSpacing: '-0.6px', marginBottom: 10, textAlign: 'center' }}>自由人家計簿</div>
        <div style={{ fontSize: 15, color: C.textMed, textAlign: 'center', lineHeight: 1.75, marginBottom: 6 }}>自由になるために、</div>
        <div style={{ fontSize: 15, color: C.textMed, textAlign: 'center', lineHeight: 1.75 }}>まず家計管理から。</div>
      </div>

      <div style={{ padding: '0 28px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
        <div id="g-btn-mobile" />
        <button onClick={onSkip} style={{ fontSize: 13, color: C.textMuted }}>アカウントなしでお試し →</button>
      </div>
      <div style={{ textAlign: 'center', padding: '0 28px 36px' }}>
        <span style={{ fontSize: 11, color: C.textFaint }}>プライバシーポリシー　·　利用規約</span>
      </div>
    </Screen>
  );
}

// ── 01b User Type Selection ────────────────────────────────────────────────
function UserTypeScreen({ onSelect }) {
  const [sel, setSel] = useState(null);
  const types = [
    { id: 'freelance', emoji: '💼', title: 'フリーランス',     desc: '個人事業主・フリーランスとして活動中' },
    { id: 'employee',  emoji: '🏢', title: '会社員',           desc: '会社に勤めて給与をもらっている' },
    { id: 'hybrid',    emoji: '⚡', title: '会社員 + 副業',    desc: '給与と副収入の両方がある' },
  ];
  return (
    <Screen bg="linear-gradient(160deg, #EFF8F5 0%, #D4E8E3 100%)">
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 0 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>あなたの<br/>働き方は？</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 32 }}>あなたに合った設定でスタートします</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {types.map(t => {
            const active = sel === t.id;
            return (
              <button key={t.id} onClick={() => setSel(t.id)} style={{ background: active ? C.primaryLight : 'white', border: `${active ? 2 : 1.5}px solid ${active ? C.primary : C.border}`, borderRadius: 20, padding: '20px 20px', display: 'flex', alignItems: 'center', gap: 16, boxShadow: active ? '0 4px 16px rgba(9,125,96,0.15)' : 'none', width: '100%', textAlign: 'left' }}>
                <div style={{ width: 48, height: 48, background: active ? C.primary : C.bg, borderRadius: 14, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>{t.emoji}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 3 }}>{t.title}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{t.desc}</div>
                </div>
                {active && <div style={{ width: 24, height: 24, background: C.primary, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></div>}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}>
        <PrimaryBtn onClick={() => sel && onSelect(sel)} style={{ opacity: sel ? 1 : 0.5 }}>次へ →</PrimaryBtn>
      </div>
    </Screen>
  );
}

// ── 02 Onboarding 1/3 — Income type ───────────────────────────────────────
function Onboarding1({ onNext }) {
  const [sel, setSel] = useState(0);
  const opts = [
    { title: '案件ごとに変動する', desc: '月によって収入が大きく変わる' },
    { title: '固定 + 変動の組み合わせ', desc: '基本報酬 + 追加案件がある' },
    { title: 'ほぼ毎月同じくらい', desc: '収入が比較的安定している' },
  ];
  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i === 0 ? C.primary : C.border }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 1 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>収入のスタイルを<br/>教えてください</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 32, lineHeight: 1.7 }}>より正確な月末予測のために使います</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {opts.map((opt, i) => {
            const active = sel === i;
            return (
              <button key={i} onClick={() => setSel(i)} style={{ background: 'white', border: `${active ? 2 : 1.5}px solid ${active ? C.primary : C.border}`, borderRadius: 20, padding: 20, display: 'flex', alignItems: 'center', gap: 16, boxShadow: active ? '0 4px 16px rgba(9,125,96,0.15)' : 'none', width: '100%', textAlign: 'left' }}>
                <div style={{ width: 48, height: 48, background: active ? C.primaryLight : C.bg, borderRadius: 14, flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 3 }}>{opt.title}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{opt.desc}</div>
                </div>
                {active && (
                  <div style={{ width: 24, height: 24, background: C.primary, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={onNext}>次へ →</PrimaryBtn></div>
    </Screen>
  );
}

// ── 03 Onboarding 2/3 — Tax rate ──────────────────────────────────────────
function Onboarding2({ onNext }) {
  const [rate, setRate] = useState(20);
  const income = 380000;
  const tax = Math.round(income * rate / 100);
  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= 1 ? C.primary : C.border }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 2 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>税金の積み立て率を<br/>設定しましょう</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 28, lineHeight: 1.7 }}>収入の何%を税金用に確保しますか？<br/>あとから変更できます。</div>

        <Card style={{ marginBottom: 16 }}>
          <div style={{ textAlign: 'center', marginBottom: 28 }}>
            <div style={{ fontSize: 60, fontWeight: 700, color: C.warning, letterSpacing: '-3px', lineHeight: 1 }}>{rate}%</div>
            <div style={{ fontSize: 12, color: C.textMuted, marginTop: 8 }}>おすすめ：フリーランスは20〜30%</div>
          </div>
          <input type="range" min={10} max={40} value={rate} onChange={e => setRate(+e.target.value)}
            style={{ width: '100%', marginBottom: 8 }} />
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 11, color: C.textFaint }}>10%</span>
            <span style={{ fontSize: 11, color: C.textFaint }}>25%</span>
            <span style={{ fontSize: 11, color: C.textFaint }}>40%</span>
          </div>
        </Card>

        <div style={{ background: C.warningBg, borderRadius: 18, padding: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: C.warning, marginBottom: 14 }}>月収 ¥{fmt(income)} の場合</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.warning, fontFeatureSettings: "'tnum'", letterSpacing: '-0.5px' }}>¥{fmt(tax)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>税金積立（{rate}%）</div>
            </div>
            <svg width="20" height="16" viewBox="0 0 20 16" fill="none"><path d="M1 8H18M13 3L18 8L13 13" stroke={C.border} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.primary, fontFeatureSettings: "'tnum'", letterSpacing: '-0.5px' }}>¥{fmt(income - tax)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>使えるお金</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={() => { Store.set('settings', { ...Store.get('settings'), taxRate: rate }); onNext(); }}>次へ →</PrimaryBtn></div>
    </Screen>
  );
}

// ── 04 Onboarding 3/3 — Category selection ────────────────────────────────
function Onboarding3({ onNext }) {
  const lifeCats = ['食費', '交通費', '日用品', '美容・衣服', '外食', '娯楽', '医療'];
  const bizCats  = ['材料費', '機材・ソフト', '外注費', '交通費（事業）', '広告宣伝', 'イベント出店'];
  const [life, setLife] = useState(new Set(['食費', '交通費', '日用品', '外食']));
  const [biz,  setBiz]  = useState(new Set(['材料費', '機材・ソフト', '交通費（事業）']));

  const toggle = (set, setFn, cat) => {
    const n = new Set(set);
    n.has(cat) ? n.delete(cat) : n.add(cat);
    setFn(n);
  };

  const Pill = ({ cat, sel, color, bg, border, onToggle }) => (
    <button onClick={onToggle} style={{ background: sel ? color : bg, color: sel ? 'white' : color, borderRadius: 999, padding: '8px 16px', fontSize: 12, fontWeight: sel ? 600 : 500, border: `1px solid ${sel ? 'transparent' : border}` }}>
      {cat}
    </button>
  );

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: C.primary }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 3 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>カテゴリを選んで<br/>ください</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 28 }}>あとから追加・変更できます</div>

        <div style={{ fontSize: 11, fontWeight: 700, color: C.info, letterSpacing: '0.06em', marginBottom: 10 }}>生活費カテゴリ</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 24 }}>
          {lifeCats.map(c => <Pill key={c} cat={c} sel={life.has(c)} color={C.info} bg={C.infoBg} border={C.infoBorder} onToggle={() => toggle(life, setLife, c)} />)}
        </div>

        <div style={{ fontSize: 11, fontWeight: 700, color: C.primary, letterSpacing: '0.06em', marginBottom: 10 }}>事業費カテゴリ</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {bizCats.map(c => <Pill key={c} cat={c} sel={biz.has(c)} color={C.primary} bg={C.primaryLight} border="#68B09A" onToggle={() => toggle(biz, setBiz, c)} />)}
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={() => { Store.set('settings', { ...Store.get('settings'), categories: [...life, ...biz], onboardingDone: true }); onNext(); }}>はじめる</PrimaryBtn></div>
    </Screen>
  );
}

            }
            if (lifeBudget > 0) {
              const p = Math.round(lifeUsed/lifeBudget*100);
              if (p >= 90) tips.push(`生活費が予算の${p}%に達しています。残り¥${fmt(Math.max(0,lifeBudget-lifeUsed))}で過ごしましょう。`);
              else if (p <= 60) tips.push(`生活費は予算の${p}%と安全圏です。このペースをキープ！`);

            if (taxGoal > 0) {
              const p = Math.round(taxSaved/taxGoal*100);
              if (p >= 100) tips.push('今月の税金積立目標を達成しました！');
              else if (p < 50 && daysLeft <= 15) tips.push(`税金積立が目標の${p}%です。月末まで¥${fmt(taxGoal-taxSaved)}が必要です。`);
            }
            if (income > 0 && usable > 0) {
              const sp = Math.round(totalExp/usable*100);
              if (sp > 85 && daysLeft > 5) tips.push(`使用可能額の${sp}%を消費。残り${daysLeft}日は支出を抑えましょう。`);
            }
            if (tips.length === 0) {
              tips.push('家計は順調です！このペースをキープしましょう。');
              if (daysLeft <= 7) tips.push(`月末まであと${daysLeft}日。最後まで記録していきましょう。`);
            }
          }
          const isGood = tips.every(t => !t.includes('達しています') && !t.includes('必要'));
          const accentColor = isGood ? C.primary : C.warning;
          const bg = isGood ? C.primaryLight : C.warningBg;
          return (
            <div style={{ margin: '0 16px 20px', background: bg, borderRadius: 18, padding: 18, borderLeft: `3px solid ${accentColor}` }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: accentColor, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L13 12H1L7 1Z" stroke={accentColor} strokeWidth="1.4" fill="none" strokeLinejoin="round"/><path d="M7 5V8M7 10V10.5" stroke={accentColor} strokeWidth="1.4" strokeLinecap="round"/></svg>
                今月のポイント
              </div>
              <div style={{ fontSize: 12, color: C.textMed, lineHeight: 1.85 }}>
                {tips.map((t, i) => <div key={i} style={{ marginBottom: i < tips.length-1 ? 6 : 0 }}>{t}</div>)}
              </div>
            </div>
          );
        })()}
      </div>

      <BottomNav active="home" go={go} />
    </Screen>
  );
}

// ── 09 Tax & Savings ───────────────────────────────────────────────────────
function TaxScreen({ go }) {
  const s = Store.get('settings', {});
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const goalAmt = Math.round(income * taxRate / 100);
  const txns = getThisMonthTxns();
  const savedAmt = sumDiv(txns, '税金');
  const pct = goalAmt > 0 ? Math.min(100, Math.round(savedAmt / goalAmt * 100)) : 0;
  const dashOffset = Math.round(327 * (1 - pct / 100));
  const remaining = Math.max(0, goalAmt - savedAmt);
  const today = new Date();
  const daysLeft = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate() - today.getDate();

  const allTxns = Store.get('transactions', []);
  const history = Array.from({length: 4}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const ym = d.toISOString().slice(0,7);
    const label = `${d.getMonth()+1}月`;
    const mSaved = allTxns.filter(t => t.date && t.date.startsWith(ym) && t.type==='expense' && t.division==='税金').reduce((s,t)=>s+t.amount,0);
    const mPct = goalAmt > 0 ? Math.min(100, Math.round(mSaved/goalAmt*100)) : 0;
    return { m: label, pct: mPct, amt: `¥${fmt(mSaved)}`, color: mPct >= 100 ? C.primary : C.warning };
  }).reverse();

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>
        {/* Sub-tab */}
        <div style={{ display: 'flex', background: C.primaryLight, borderRadius: 14, padding: 3, gap: 2, marginBottom: 20 }}>
          <button onClick={() => go('budget')} style={{ flex: 1, color: C.textMuted, padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 500, borderRadius: 12 }}>予算</button>
          <button style={{ flex: 1, background: C.primary, color: 'white', padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 700, borderRadius: 12, boxShadow: '0 3px 10px rgba(9,125,96,0.3)' }}>税金・積立</button>
        </div>

        <div style={{ fontSize: 21, fontWeight: 700, color: C.text, marginBottom: 4 }}>税金・積立</div>
        <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 24 }}>{today.getMonth()+1}月 — 目標達成まで頑張ろう</div>

        {/* Progress card */}
        <Card style={{ marginBottom: 16, padding: '28px 24px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
            <div style={{ flexShrink: 0, position: 'relative', width: 128, height: 128 }}>
              <svg width="128" height="128" viewBox="0 0 128 128" style={{ position: 'absolute', top: 0, left: 0 }}>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.bgCard} strokeWidth="11"/>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.warning} strokeWidth="11" strokeDasharray="327" strokeDashoffset={dashOffset} strokeLinecap="round" transform="rotate(-90 64 64)"/>
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: C.warning, lineHeight: 1, fontFeatureSettings: "'tnum'" }}>{pct}%</div>
                <div style={{ fontSize: 10, color: C.textMuted, marginTop: 4 }}>達成</div>
              </div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6 }}>積み立て済み</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: C.warning, letterSpacing: '-1px', fontFeatureSettings: "'tnum'", lineHeight: 1.1 }}>¥{fmt(savedAmt)}</div>
              <div style={{ height: 1, background: C.bgCard, margin: '12px 0' }} />
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 4 }}>今月の目標</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.text, fontFeatureSettings: "'tnum'" }}>¥{fmt(goalAmt)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>収入の{taxRate}%</div>
            </div>
          </div>
          {remaining > 0 && (
            <div style={{ marginTop: 20, background: C.warningBg, borderRadius: 14, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 10 }}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L16 14H2L9 2Z" stroke={C.warning} strokeWidth="1.4" fill="none" strokeLinejoin="round"/><path d="M9 7V10M9 12V12.5" stroke={C.warning} strokeWidth="1.4" strokeLinecap="round"/></svg>
              <div style={{ fontSize: 12, color: C.warning, lineHeight: 1.6 }}>あと <strong style={{ fontSize: 15, fontFeatureSettings: "'tnum'" }}>¥{fmt(remaining)}</strong> 積み立てが必要です。月末まであと{daysLeft}日。</div>
            </div>
          )}
          {remaining === 0 && goalAmt > 0 && (
            <div style={{ marginTop: 20, background: C.primaryLight, borderRadius: 14, padding: '14px 16px', fontSize: 13, color: C.primary, fontWeight: 700 }}>今月の目標達成！ 🎉</div>
          )}
        </Card>

        {/* History */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>月別積立状況</div>
          {history.map(row => (
            <div key={row.m} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: C.textMuted, width: 28, flexShrink: 0 }}>{row.m}</div>
              <div style={{ flex: 1, background: C.bgCard, borderRadius: 4, height: 8, overflow: 'hidden' }}>
                <div style={{ background: row.color, width: `${row.pct}%`, height: '100%', borderRadius: 4 }} />
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, color: row.color, width: 60, textAlign: 'right', fontFeatureSettings: "'tnum'" }}>{row.amt}</div>
            </div>
          ))}
        </Card>

        {/* Tips */}
        <div style={{ background: C.primaryLight, borderRadius: 18, padding: 18 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.primary, marginBottom: 8 }}>フリーランスの税金ガイド</div>
          <div style={{ fontSize: 12, color: C.textMed, lineHeight: 1.8 }}>年間所得400万円の場合、所得税+住民税の目安は約25〜30%です。消費税の納付義務がある場合はさらに10%の積み立てが必要です。</div>
        </div>
      </div>

      <BottomNav active="budget" go={go} />
    </Screen>
  );
}

// ── 10 Budget ──────────────────────────────────────────────────────────────
function BudgetScreen({ go }) {
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const [budgets, setBudgets] = useState(() => ({ '生活費': 0, '事業費': 0, '税金積立': Math.round(income * taxRate / 100), '投資': s.savingsGoal || 0, ...Store.get('budgets', {}) }));
  const [editKey, setEditKey] = useState(null);
  const [editVal, setEditVal] = useState('');

  const txns = getThisMonthTxns();
  const lifeUsed = sumDiv(txns, '生活費');
  const bizUsed  = sumDiv(txns, '事業費');
  const taxUsed  = sumDiv(txns, '税金');
  const invUsed  = sumDiv(txns, '投資');

  const cats = [
    { key:'生活費', name:'生活費', used:lifeUsed, budget:budgets['生活費']||0, color:C.info },
    { key:'事業費', name:userType==='employee'?'特別支出':'事業費', used:bizUsed, budget:budgets['事業費']||0, color:C.primary },
    { key:'税金積立', name:'税金積立', used:taxUsed, budget:budgets['税金積立']||0, color:C.warning },
    { key:'投資', name:userType==='freelance'?'投資':'貯蓄', used:invUsed, budget:budgets['投資']||0, color:C.invest },
  ].map(c => {
    const pct = c.budget > 0 ? Math.min(100, Math.round(c.used/c.budget*100)) : 0;
    const warn = pct >= 80;
    return { ...c, pct, warn, note: c.budget > 0 ? `${pct}%` : '予算未設定', noteColor: warn ? C.warning : C.textMuted };
  });

  const totalUsed = cats.reduce((s,c)=>s+c.used, 0);
  const totalBudget = cats.reduce((s,c)=>s+c.budget, 0);
  const totalPct = totalBudget > 0 ? Math.min(100, Math.round(totalUsed/totalBudget*100)) : 0;
  const today = new Date();

  const commitEdit = (key) => {
    const next = { ...budgets, [key]: parseInt(editVal)||0 };
    setBudgets(next); Store.set('budgets', next); setEditKey(null);
  };

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>
        {/* Sub-tab */}
        <div style={{ display: 'flex', background: C.primaryLight, borderRadius: 14, padding: 3, gap: 2, marginBottom: 20 }}>
          <button style={{ flex: 1, background: C.primary, color: 'white', padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 700, borderRadius: 12, boxShadow: '0 3px 10px rgba(9,125,96,0.3)' }}>予算</button>
          <button onClick={() => go('tax')} style={{ flex: 1, color: C.textMuted, padding: '10px', textAlign: 'center', fontSize: 13, fontWeight: 500, borderRadius: 12 }}>税金・積立</button>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
          <div style={{ fontSize: 21, fontWeight: 700, color: C.text }}>予算管理</div>
          <div style={{ fontSize: 13, fontWeight: 500, color: C.primary }}>{today.getMonth()+1}月</div>
        </div>
        <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 20 }}>総予算 ¥{fmt(totalBudget)} · 使用済み ¥{fmt(totalUsed)}</div>

        {/* Overall */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>全体予算</div>
            <div style={{ fontSize: 12, color: C.textMuted, fontFeatureSettings: "'tnum'" }}>¥{fmt(totalUsed)} / ¥{fmt(totalBudget)}</div>
          </div>
          <div style={{ background: C.bgCard, borderRadius: 6, height: 10, marginBottom: 6, overflow: 'hidden' }}>
            <div style={{ background: `linear-gradient(90deg, ${C.info} 40%, ${C.primary} 40% 75%, ${C.warning} 75% 90%, ${C.invest} 90%)`, width: `${totalPct}%`, height: '100%', borderRadius: 6, transition: 'width .3s' }} />
          </div>
          <div style={{ fontSize: 11, color: C.textMuted }}>予算の{totalPct}%を使用中</div>
        </Card>

        {/* Categories */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 18 }}>カテゴリ別</div>
          {cats.map((item, i) => (
            <div key={item.key} style={{ marginBottom: i < cats.length - 1 ? 18 : 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: item.color, flexShrink: 0 }} />
                  <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{item.name}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: item.warn ? C.warning : C.text, fontFeatureSettings: "'tnum'" }}>¥{fmt(item.used)}</span>
                  {editKey === item.key ? (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <span style={{ fontSize: 11, color: C.textMuted }}>/</span>
                      <input autoFocus type="number" value={editVal} onChange={e => setEditVal(e.target.value)} onBlur={() => commitEdit(item.key)} onKeyDown={e => e.key==='Enter' && commitEdit(item.key)} style={{ width: 84, fontSize: 12, padding: '5px 8px', border: `2px solid ${C.primary}`, borderRadius: 9, outline: 'none' }} />
                    </div>
                  ) : (
                    <button onClick={() => { setEditKey(item.key); setEditVal(String(item.budget)); }} style={{ display: 'flex', alignItems: 'center', gap: 4, background: C.bg, borderRadius: 8, padding: '4px 8px', border: `1px solid ${C.border}` }}>
                      <span style={{ fontSize: 11, color: C.textMuted, fontFeatureSettings: "'tnum'" }}>/ ¥{fmt(item.budget)}</span>
                      <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L3.5 10.5H1.5V8.5L8.5 1.5Z" stroke={C.textMuted} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </button>
                  )}
                </div>
              </div>
              <Bar pct={item.pct} color={item.color} />
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 4, marginTop: 3 }}>
                {item.warn && <svg width="11" height="10" viewBox="0 0 11 10" fill="none"><path d="M5.5 1L10 9H1L5.5 1Z" stroke={C.warning} strokeWidth="1.2" fill="none"/><path d="M5.5 4V6.5M5.5 7.5V8" stroke={C.warning} strokeWidth="1.2" strokeLinecap="round"/></svg>}
                <span style={{ fontSize: 10, color: item.noteColor }}>{item.note}</span>
              </div>
            </div>
          ))}
        </Card>
      </div>

      <BottomNav active="budget" go={go} />
    </Screen>
  );
}

// ── 11 Monthly Report ──────────────────────────────────────────────────────
function ReportScreen({ go }) {
  const allTxns = Store.get('transactions', []);
  const today = new Date();
  const months = Array.from({length: 6}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - 5 + i, 1);
    const ym = d.toISOString().slice(0,7);
    const mT = allTxns.filter(t => t.date && t.date.startsWith(ym));
    const inc = mT.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = mT.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return { label:`${d.getMonth()+1}月`, rawInc:inc, rawExp:exp, isCurrent:i===5 };
  });
  const maxVal = Math.max(...months.map(m=>Math.max(m.rawInc,m.rawExp)), 1);
  const scale = v => Math.round(v/maxVal*100);

  const currYm = TODAY.slice(0,7);
  const currT = allTxns.filter(t=>t.date&&t.date.startsWith(currYm));
  const thisInc = currT.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const thisExp = currT.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const savingsRate = thisInc > 0 ? ((thisInc-thisExp)/thisInc*100).toFixed(1) : '0.0';

  const prevYm = new Date(today.getFullYear(),today.getMonth()-1,1).toISOString().slice(0,7);
  const prevT = allTxns.filter(t=>t.date&&t.date.startsWith(prevYm));
  const prevInc = prevT.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const prevExp = prevT.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const byCat = {};
  currT.filter(t=>t.type==='expense').forEach(t=>{ byCat[t.category]=(byCat[t.category]||0)+t.amount; });
  const ranking = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([name,amt],i)=>({rank:i+1,name,amt}));

  const mom = [
    { label:'収入', prevAmt:prevInc, currAmt:thisInc },
    { label:'支出', prevAmt:prevExp, currAmt:thisExp },
  ].map(r => {
    const diff = r.currAmt - r.prevAmt;
    const positive = r.label==='収入' ? diff>=0 : diff<=0;
    return { ...r, positive, diffStr:(diff>=0?'+':'')+`¥${fmt(Math.abs(diff))}` };
  });

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <div style={{ fontSize: 21, fontWeight: 700, color: C.text }}>月次レポート</div>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{today.getMonth()+1}月</span>
        </div>

        {/* Summary */}
        <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
          {[
            { label:'収入',   value:fmt(thisInc), color:C.primary, sub:'円' },
            { label:'支出',   value:fmt(thisExp), color:C.text,    sub:'円' },
            { label:'貯蓄率', value:`${savingsRate}%`, color:C.invest, sub:'税引き前' },
          ].map(s => (
            <Card key={s.label} style={{ flex: 1, padding: 16 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.textMuted, marginBottom: 6 }}>{s.label}</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: s.color, letterSpacing: '-0.8px', fontFeatureSettings: "'tnum'" }}>{s.value}</div>
              <div style={{ fontSize: 10, color: C.textMuted, marginTop: 2 }}>{s.sub}</div>
            </Card>
          ))}
        </div>

        {/* Bar chart */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 4 }}>6ヶ月の収支推移</div>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 3, background: C.primary }} /><span style={{ fontSize: 11, color: C.textMuted }}>収入</span></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 3, background: C.info }} /><span style={{ fontSize: 11, color: C.textMuted }}>支出</span></div>
          </div>
          <svg viewBox="0 0 348 140" style={{ width: '100%', overflow: 'visible' }}>
            <line x1="0" y1="10" x2="348" y2="10" stroke={C.bgCard} strokeWidth="1"/>
            <line x1="0" y1="43" x2="348" y2="43" stroke={C.bgCard} strokeWidth="1"/>
            <line x1="0" y1="77" x2="348" y2="77" stroke={C.bgCard} strokeWidth="1"/>
            <line x1="0" y1="110" x2="348" y2="110" stroke={C.border} strokeWidth="1.2"/>
            {months.map((d, i) => {
              const ih = scale(d.rawInc), eh = scale(d.rawExp);
              return (
                <g key={d.label}>
                  <rect x={i*58+6}  y={110-ih} width="20" height={ih} rx="4" fill={C.primary} opacity={d.isCurrent?1:0.7}/>
                  <rect x={i*58+29} y={110-eh} width="20" height={eh} rx="4" fill={C.info}    opacity={d.isCurrent?1:0.7}/>
                  <text x={i*58+24} y="128" textAnchor="middle" fontSize="10" fill={d.isCurrent?C.text:C.textFaint} fontWeight={d.isCurrent?'700':'400'} fontFamily="sans-serif">{d.label}</text>
                </g>
              );
            })}
          </svg>
        </Card>

        {/* Category ranking */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>支出カテゴリTop4</div>
          {ranking.length === 0 ? (
            <div style={{ textAlign:'center', padding:'16px 0', color:C.textFaint, fontSize:13 }}>まだ支出がありません</div>
          ) : ranking.map(r => (
            <div key={r.rank} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.textMuted, width: 18 }}>{r.rank}</div>
              <div style={{ width: 9, height: 9, borderRadius: 3, background: C.info, flexShrink: 0 }} />
              <div style={{ flex: 1, fontSize: 13, color: C.text, fontWeight: 500 }}>{r.name}</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.text, fontFeatureSettings: "'tnum'" }}>¥{fmt(r.amt)}</div>
            </div>
          ))}
        </Card>

        {/* MoM */}
        <Card>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>前月比較</div>
          {mom.map((r, i) => (
            <div key={r.label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingBottom: i < 1 ? 10 : 0, borderBottom: i < 1 ? `1px solid ${C.bgCard}` : 'none', marginBottom: i < 1 ? 10 : 0 }}>
              <span style={{ fontSize: 13, color: C.textMed }}>{r.label}</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 11, color: C.textMuted, fontFeatureSettings: "'tnum'" }}>前月 ¥{fmt(r.prevAmt)}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: r.positive?C.primary:C.warning, fontFeatureSettings: "'tnum'" }}>{r.diffStr}</span>
              </div>
            </div>
          ))}
        </Card>
      </div>

      <BottomNav active="report" go={go} />
    </Screen>
  );
}

// ── App (router) ───────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('gUser') || 'null'));
  const [screen, setScreen] = useState(() => localStorage.getItem('gUser') ? 'home' : 'login');
  const [prev,   setPrev]   = useState('home');

  const go = useCallback((s) => {
    setPrev(screen);
    setScreen(s);
  }, [screen]);

  const nav = useCallback((key) => {
    const map = { home: 'home', input: 'input', budget: 'budget', report: 'report', settings: 'settings' };
    go(map[key] || key);
  }, [go]);

  const onLogin = (u) => {
    localStorage.setItem('gUser', JSON.stringify(u));
    setUser(u);
    const prefs = Store.get('settings', {});
    setScreen(prefs.onboardingDone ? 'home' : 'usertype');
  };
  const onLogout = () => {
    localStorage.removeItem('gUser');
    Store.set('settings', {});
    if (window.google) google.accounts.id.disableAutoSelect();
    setUser(null);
    setScreen('login');
  };
  const onSelectType = (type) => {
    Store.set('settings', { ...Store.get('settings'), userType: type });
    go(type === 'freelance' ? 'fl-ob1' : type === 'employee' ? 'emp-ob1' : 'hyb-ob1');
  };

  const render = () => {
    switch (screen) {
      case 'login':         return <LoginScreen    onLogin={onLogin} onSkip={() => go('usertype')} />;
      case 'usertype':      return <UserTypeScreen onSelect={onSelectType} />;
      case 'fl-ob1':        return <Onboarding1    onNext={() => go('fl-ob2')} />;
      case 'fl-ob2':        return <Onboarding2    onNext={() => go('fl-ob3')} />;
      case 'fl-ob3':        return <Onboarding3    onNext={() => go('home')} />;
      case 'emp-ob1':       return <EmpOnboarding1 onNext={() => go('emp-ob2')} />;
      case 'emp-ob2':       return <EmpOnboarding2 onNext={() => go('home')} />;
      case 'hyb-ob1':       return <HybOnboarding1 onNext={() => go('hyb-ob2')} />;
      case 'hyb-ob2':       return <HybOnboarding2 onNext={() => go('hyb-ob3')} />;
      case 'hyb-ob3':       return <HybOnboarding3 onNext={() => go('home')} />;
      case 'home':          return <HomeScreen      go={nav} />;
      case 'input':         return <InputSelector   go={nav} />;
      case 'expense-input': return <ExpenseInput    onBack={() => go(prev)} onDone={() => go('home')} />;
      case 'income-input':  return <IncomeInput     onBack={() => go(prev)} onDone={() => go('home')} />;
      case 'tax':           return <TaxScreen       go={nav} />;
      case 'budget':        return <BudgetScreen    go={nav} />;
      case 'report':        return <ReportScreen    go={nav} />;
      case 'settings':      return <SettingsScreen  go={nav} user={user} onLogout={onLogout} />;
      default:              return <HomeScreen      go={nav} />;
    }
  };

  return <div style={{ minHeight: '100vh', background: C.bg }}>{render()}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
