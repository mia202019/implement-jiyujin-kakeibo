<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>自由人家計簿</title>
  <script>if (window.innerWidth >= 768 && !/Mobi|Android/i.test(navigator.userAgent)) { location.replace('desktop.html'); }</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #B2CEC8; }
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #root {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
    }
    @media (min-width: 431px) {
      #root {
        box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 30px 80px rgba(0,0,0,0.3);
      }
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input { font-family: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 7px; border-radius: 4px; background: #E0F0EC; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
    input[type=range]::-moz-range-thumb { width: 30px; height: 30px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// ── Design tokens ──────────────────────────────────────────────────────────
const C = {
  primary:     '#097D60',
  primaryDark: '#054D3C',
  primaryLight:'#D4E8E3',
  bg:          '#EFF8F5',
  bgCard:      '#E0F0EC',
  border:      '#C0DED6',
  warning:     '#C8748E',
  warningBg:   '#FAE8F0',
  info:        '#4A6898',
  infoBg:      '#E6EDF8',
  infoBorder:  '#A4B8D8',
  invest:      '#6A5E9C',
  text:        '#1A1917',
  textMed:     '#5A5652',
  textMuted:   '#9E9994',
  textFaint:   '#C0BAB2',
};

const fmt = n => n.toLocaleString('ja-JP');

// ── Shared components ──────────────────────────────────────────────────────
function Card({ children, style = {} }) {
  return (
    <div style={{ background: 'white', borderRadius: 20, padding: 20, boxShadow: '0 2px 10px rgba(0,0,0,0.05)', ...style }}>
      {children}
    </div>
  );
}

function PrimaryBtn({ children, onClick, style = {} }) {
  return (
    <button onClick={onClick} style={{
      background: C.primary, color: 'white', borderRadius: 18,
      padding: 18, textAlign: 'center', fontSize: 16, fontWeight: 700,
      boxShadow: '0 8px 24px rgba(9,125,96,0.32)', width: '100%',
      display: 'block', ...style
    }}>
      {children}
    </button>
  );
}

function Bar({ pct, color, bg = C.bgCard }) {
  return (
    <div style={{ background: bg, borderRadius: 4, height: 8, overflow: 'hidden' }}>
      <div style={{ background: color, width: `${Math.min(100, pct)}%`, height: '100%', borderRadius: 4, transition: 'width 0.3s' }} />
    </div>
  );
}

// ── Bottom navigation ──────────────────────────────────────────────────────
function BottomNav({ active, go }) {
  const items = [
    { key: 'home',     label: 'ホーム',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M2 9.5L11 2L20 9.5V20C20 20.55 19.55 21 19 21H14V15.5H8V21H3C2.45 21 2 20.55 2 20V9.5Z" fill={a ? C.primary : 'none'} stroke={a ? 'none' : C.textFaint} strokeWidth="1.5"/></svg> },
    { key: 'input',    label: '入力',
      icon: a => <div style={{ width: 22, height: 22, borderRadius: '50%', border: `1.5px solid ${a ? C.primary : C.textFaint}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 1V9M1 5H9" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg></div> },
    { key: 'budget',   label: '予算',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="4" width="18" height="14" rx="3" fill={a ? C.primary : 'none'} stroke={a ? 'none' : C.textFaint} strokeWidth="1.5"/><path d="M7 9H15M7 13H11" stroke={a ? 'white' : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg> },
    { key: 'report',   label: 'レポート',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="12" width="4" height="8" rx="1.5" fill={a ? C.primary : C.textFaint}/><rect x="9" y="7" width="4" height="13" rx="1.5" fill={a ? C.primary : C.textFaint}/><rect x="16" y="3" width="4" height="17" rx="1.5" fill={a ? C.primary : C.textFaint}/></svg> },
    { key: 'settings', label: '設定',
      icon: a => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5"/><path d="M11 2V4M11 18V20M2 11H4M18 11H20M4.22 4.22L5.64 5.64M16.36 16.36L17.78 17.78M4.22 17.78L5.64 16.36M16.36 5.64L17.78 4.22" stroke={a ? C.primary : C.textFaint} strokeWidth="1.5" strokeLinecap="round"/></svg> },
  ];
  return (
    <div style={{ background: 'rgba(255,255,255,0.97)', borderTop: `1px solid ${C.bgCard}`, display: 'flex', flexShrink: 0, paddingBottom: 'env(safe-area-inset-bottom, 8px)' }}>
      {items.map(({ key, label, icon }) => {
        const a = active === key;
        return (
          <button key={key} onClick={() => go(key)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '10px 0 8px' }}>
            {icon(a)}
            <span style={{ fontSize: 10, fontWeight: a ? 700 : 500, color: a ? C.primary : C.textMuted }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── Screen wrapper (adds safe status bar space) ────────────────────────────
function Screen({ children, bg = C.bg }) {
  return (
    <div style={{ height: '100vh', background: bg, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {children}
    </div>
  );
}

// ── 01 Login ───────────────────────────────────────────────────────────────
function LoginScreen({ onNext }) {
  return (
    <Screen bg="linear-gradient(160deg, #EFF8F5 0%, #D4E8E3 55%, #D4E8E3 100%)">
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 40px' }}>
        <div style={{ width: 84, height: 84, background: 'linear-gradient(145deg,#097D60,#054D3C)', borderRadius: 26, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 28, boxShadow: '0 14px 36px rgba(31,29,56,0.38), 0 4px 12px rgba(31,29,56,0.2)' }}>
          <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
            <path d="M23 5C14 5 8 12 8 20C8 29.5 13 37 23 42C33 37 38 29.5 38 20C38 12 32 5 23 5Z" fill="white" opacity="0.95"/>
            <path d="M23 10V36" stroke="#1F1D38" strokeWidth="2.5" strokeLinecap="round"/>
            <path d="M17 19L23 13L29 19" stroke="#1F1D38" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M17 25L23 31L29 25" stroke="#1F1D38" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.4"/>
          </svg>
        </div>
        <div style={{ fontSize: 28, fontWeight: 700, color: C.text, letterSpacing: '-0.6px', marginBottom: 10, textAlign: 'center' }}>自由人家計簿</div>
        <div style={{ fontSize: 15, color: C.textMed, textAlign: 'center', lineHeight: 1.75, marginBottom: 6 }}>お金の判断を、もっとシンプルに。</div>
        <div style={{ fontSize: 12, color: C.textMuted, textAlign: 'center', lineHeight: 1.7 }}>フリーランス・個人事業主のための<br/>家計管理アプリ</div>
      </div>

      <div style={{ padding: '0 28px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <button onClick={onNext} style={{ background: 'white', border: `1.5px solid ${C.border}`, borderRadius: 20, padding: '18px 22px', display: 'flex', alignItems: 'center', gap: 14, boxShadow: '0 4px 20px rgba(0,0,0,0.08)', width: '100%', cursor: 'pointer' }}>
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M21.2 11.22c0-.74-.07-1.46-.19-2.14H11v4.05h5.72c-.25 1.36-1 2.52-2.14 3.3v2.73h3.46c2.02-1.86 3.16-4.62 3.16-7.94z" fill="#4285F4"/>
            <path d="M11 22c2.86 0 5.26-.95 7.01-2.56l-3.46-2.73c-.96.64-2.18 1.02-3.55 1.02-2.72 0-5.04-1.84-5.87-4.32H1.54v2.8C3.28 19.57 6.94 22 11 22z" fill="#34A853"/>
            <path d="M5.13 13.41A6.04 6.04 0 014.8 11c0-.84.15-1.65.43-2.41V5.79H1.54A10.98 10.98 0 000 11c0 1.78.42 3.46 1.54 4.8l3.59-2.39z" fill="#FBBC05"/>
            <path d="M11 4.27c1.49 0 2.81.5 3.86 1.5l2.9-2.9C15.78.99 13.6 0 11 0 6.94 0 3.28 2.43 1.54 5.79l3.59 2.8c.83-2.47 3.15-4.32 5.87-4.32z" fill="#EA4335"/>
          </svg>
          <span style={{ fontSize: 15, fontWeight: 600, color: C.text, flex: 1, textAlign: 'left' }}>Googleでログイン</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3L11 8L6 13" stroke={C.textFaint} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div style={{ textAlign: 'center', padding: 8 }}>
          <button onClick={onNext} style={{ fontSize: 13, color: C.textMuted }}>アカウントなしでお試し →</button>
        </div>
      </div>
      <div style={{ textAlign: 'center', padding: '0 28px 36px' }}>
        <span style={{ fontSize: 11, color: C.textFaint }}>プライバシーポリシー　·　利用規約</span>
      </div>
    </Screen>
  );
}

// ── 02 Onboarding 1/3 — Income type ───────────────────────────────────────
function Onboarding1({ onNext }) {
  const [sel, setSel] = useState(0);
  const opts = [
    { title: '案件ごとに変動する', desc: '月によって収入が大きく変わる' },
    { title: '固定 + 変動の組み合わせ', desc: '基本報酬 + 追加案件がある' },
    { title: 'ほぼ毎月同じくらい', desc: '収入が比較的安定している' },
  ];
  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i === 0 ? C.primary : C.border }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 1 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>収入のスタイルを<br/>教えてください</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 32, lineHeight: 1.7 }}>より正確な月末予測のために使います</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {opts.map((opt, i) => {
            const active = sel === i;
            return (
              <button key={i} onClick={() => setSel(i)} style={{ background: 'white', border: `${active ? 2 : 1.5}px solid ${active ? C.primary : C.border}`, borderRadius: 20, padding: 20, display: 'flex', alignItems: 'center', gap: 16, boxShadow: active ? '0 4px 16px rgba(9,125,96,0.15)' : 'none', width: '100%', textAlign: 'left' }}>
                <div style={{ width: 48, height: 48, background: active ? C.primaryLight : C.bg, borderRadius: 14, flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 3 }}>{opt.title}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{opt.desc}</div>
                </div>
                {active && (
                  <div style={{ width: 24, height: 24, background: C.primary, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={onNext}>次へ →</PrimaryBtn></div>
    </Screen>
  );
}

// ── 03 Onboarding 2/3 — Tax rate ──────────────────────────────────────────
function Onboarding2({ onNext }) {
  const [rate, setRate] = useState(20);
  const income = 380000;
  const tax = Math.round(income * rate / 100);
  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= 1 ? C.primary : C.border }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 2 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>税金の積み立て率を<br/>設定しましょう</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 28, lineHeight: 1.7 }}>収入の何%を税金用に確保しますか？<br/>あとから変更できます。</div>

        <Card style={{ marginBottom: 16 }}>
          <div style={{ textAlign: 'center', marginBottom: 28 }}>
            <div style={{ fontSize: 60, fontWeight: 700, color: C.warning, letterSpacing: '-3px', lineHeight: 1 }}>{rate}%</div>
            <div style={{ fontSize: 12, color: C.textMuted, marginTop: 8 }}>おすすめ：フリーランスは20〜30%</div>
          </div>
          <input type="range" min={10} max={40} value={rate} onChange={e => setRate(+e.target.value)}
            style={{ width: '100%', marginBottom: 8 }} />
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 11, color: C.textFaint }}>10%</span>
            <span style={{ fontSize: 11, color: C.textFaint }}>25%</span>
            <span style={{ fontSize: 11, color: C.textFaint }}>40%</span>
          </div>
        </Card>

        <div style={{ background: C.warningBg, borderRadius: 18, padding: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: C.warning, marginBottom: 14 }}>月収 ¥{fmt(income)} の場合</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.warning, fontFeatureSettings: "'tnum'", letterSpacing: '-0.5px' }}>¥{fmt(tax)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>税金積立（{rate}%）</div>
            </div>
            <svg width="20" height="16" viewBox="0 0 20 16" fill="none"><path d="M1 8H18M13 3L18 8L13 13" stroke={C.border} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.primary, fontFeatureSettings: "'tnum'", letterSpacing: '-0.5px' }}>¥{fmt(income - tax)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>使えるお金</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={onNext}>次へ →</PrimaryBtn></div>
    </Screen>
  );
}

// ── 04 Onboarding 3/3 — Category selection ────────────────────────────────
function Onboarding3({ onNext }) {
  const lifeCats = ['食費', '交通費', '日用品', '美容・衣服', '外食', '娯楽', '医療'];
  const bizCats  = ['材料費', '機材・ソフト', '外注費', '交通費（事業）', '広告宣伝', 'イベント出店'];
  const [life, setLife] = useState(new Set(['食費', '交通費', '日用品', '外食']));
  const [biz,  setBiz]  = useState(new Set(['材料費', '機材・ソフト', '交通費（事業）']));

  const toggle = (set, setFn, cat) => {
    const n = new Set(set);
    n.has(cat) ? n.delete(cat) : n.add(cat);
    setFn(n);
  };

  const Pill = ({ cat, sel, color, bg, border, onToggle }) => (
    <button onClick={onToggle} style={{ background: sel ? color : bg, color: sel ? 'white' : color, borderRadius: 999, padding: '8px 16px', fontSize: 12, fontWeight: sel ? 600 : 500, border: `1px solid ${sel ? 'transparent' : border}` }}>
      {cat}
    </button>
  );

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 24px 24px' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[0,1,2].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: C.primary }} />)}
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, letterSpacing: '0.06em', marginBottom: 12 }}>STEP 3 / 3</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 10 }}>カテゴリを選んで<br/>ください</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 28 }}>あとから追加・変更できます</div>

        <div style={{ fontSize: 11, fontWeight: 700, color: C.info, letterSpacing: '0.06em', marginBottom: 10 }}>生活費カテゴリ</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 24 }}>
          {lifeCats.map(c => <Pill key={c} cat={c} sel={life.has(c)} color={C.info} bg={C.infoBg} border={C.infoBorder} onToggle={() => toggle(life, setLife, c)} />)}
        </div>

        <div style={{ fontSize: 11, fontWeight: 700, color: C.primary, letterSpacing: '0.06em', marginBottom: 10 }}>事業費カテゴリ</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {bizCats.map(c => <Pill key={c} cat={c} sel={biz.has(c)} color={C.primary} bg={C.primaryLight} border="#68B09A" onToggle={() => toggle(biz, setBiz, c)} />)}
        </div>
      </div>
      <div style={{ padding: '16px 24px 32px', flexShrink: 0 }}><PrimaryBtn onClick={onNext}>はじめる</PrimaryBtn></div>
    </Screen>
  );
}

// ── 05 Home ────────────────────────────────────────────────────────────────
function HomeScreen({ go }) {
  const breakdown = [
    { name: '生活費',  amt: 98000,  pct: 65, color: C.info,    note: '予算の65%',        noteColor: C.textMuted },
    { name: '事業費',  amt: 43000,  pct: 86, color: C.primary, note: '予算の86% ⚠',     noteColor: C.warning  },
    { name: '税金積立', amt: 45000, pct: 59, color: C.warning, note: '目標¥76,000の59%', noteColor: C.textMuted },
    { name: '投資',    amt: 6000,   pct: 30, color: C.invest,  note: '',                  noteColor: C.textMuted },
  ];

  return (
    <Screen>
      <div style={{ flex: 1, overflowY: 'auto', paddingTop: 52 }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 22px 12px' }}>
          <div>
            <div style={{ fontSize: 21, fontWeight: 700, color: C.text, letterSpacing: '-0.4px' }}>6月の家計</div>
            <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>2026年6月 · 23日現在</div>
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[
              <path d="M9 3L4 7L9 11" stroke={C.textMed} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>,
              <path d="M5 3L10 7L5 11" stroke={C.textMed} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>,
            ].map((p, i) => (
              <div key={i} style={{ width: 34, height: 34, background: 'white', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 6px rgba(0,0,0,0.08)', cursor: 'pointer' }}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">{p}</svg>
              </div>
            ))}
          </div>
        </div>

        {/* Hero card */}
        <div style={{ margin: '0 16px 14px', background: 'linear-gradient(135deg, #333149 0%, #1D1C2E 100%)', borderRadius: 22, padding: 24, position: 'relative', overflow: 'hidden' }}>

// ── App (router) ───────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('login');
  const [prev,   setPrev]   = useState('home');

  const go = useCallback((s) => {
    setPrev(screen);
    setScreen(s);
  }, [screen]);

  const nav = useCallback((key) => {
    const map = { home: 'home', input: 'input', budget: 'budget', report: 'report', settings: 'settings' };
    go(map[key] || key);
  }, [go]);

  const render = () => {
    switch (screen) {
      case 'login':         return <LoginScreen    onNext={() => go('onboarding1')} />;
      case 'onboarding1':   return <Onboarding1    onNext={() => go('onboarding2')} />;
      case 'onboarding2':   return <Onboarding2    onNext={() => go('onboarding3')} />;
      case 'onboarding3':   return <Onboarding3    onNext={() => go('home')} />;
      case 'home':          return <HomeScreen      go={nav} />;
      case 'input':         return <InputSelector   go={nav} />;
      case 'expense-input': return <ExpenseInput    onBack={() => go(prev)} onDone={() => go('home')} />;
      case 'income-input':  return <IncomeInput     onBack={() => go(prev)} onDone={() => go('home')} />;
      case 'tax':           return <TaxScreen       go={nav} />;
      case 'budget':        return <BudgetScreen    go={nav} />;
      case 'report':        return <ReportScreen    go={nav} />;
      case 'settings':      return <SettingsScreen  go={nav} />;
      default:              return <HomeScreen      go={nav} />;
    }
  };

  return <div style={{ minHeight: '100vh', background: C.bg }}>{render()}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
