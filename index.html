function CardsScreen({ go }) {
  const [cards, setCards] = useState(() => Store.get('cards', []));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name: '', last4: '' });
  const [toast, setToast] = useState('');

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''), 2000); };

  const save = () => {
    if (!form.name.trim()) return;
    if (form.last4 && !/^\d+$/.test(form.last4)) { showToast('末尾4桁は数字で入力してください'); return; }
    const next = [...cards, { id: Date.now(), name: form.name.trim(), last4: form.last4.trim() }];
    setCards(next); Store.set('cards', next);
    setForm({ name: '', last4: '' }); setShowForm(false);
    showToast('追加しました');
  };

  const remove = id => {
    const next = cards.filter(c => c.id !== id);
    setCards(next); Store.set('cards', next);
  };

  const inputStyle = { background: C.bg, borderRadius: 12, padding: '12px 16px', fontSize: 14, color: C.text, border: 'none', width: '100%', outline: 'none' };

  return (
    <Screen>
      {toast && (
        <div style={{ position:'fixed', top:64, left:'50%', transform:'translateX(-50%)', background:'#1a1a2e', color:'white', borderRadius:12, padding:'10px 20px', fontSize:13, fontWeight:600, zIndex:999, whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.25)', pointerEvents:'none' }}>
          {toast}
        </div>
      )}
      <div style={{ display:'flex', alignItems:'center', gap:16, padding:'56px 20px 16px' }}>
        <button onClick={() => go('settings')} style={{ background:'none', border:'none', fontSize:14, color:C.primary, fontWeight:600, cursor:'pointer', padding:0 }}>← 戻る</button>
        <div style={{ fontSize:19, fontWeight:700, color:C.text }}>カード・支払い管理</div>
      </div>
      <div style={{ padding:'0 20px 20px', overflowY:'auto', flex:1 }}>
        <div style={{ fontSize:12, color:C.textMuted, marginBottom:16, lineHeight:1.7 }}>
          登録したカードは支出入力・固定費の支払い方法として使えます
        </div>

        {cards.length === 0 && !showForm && (
          <div style={{ textAlign:'center', color:C.textFaint, fontSize:13, padding:'32px 0' }}>カードを追加してください</div>
        )}

        {cards.map((card, i) => (
          <div key={card.id} style={{ background:'white', borderRadius:16, padding:'14px 18px', marginBottom:10, display:'flex', alignItems:'center', gap:14, boxShadow:'0 1px 6px rgba(0,0,0,0.05)' }}>
            <div style={{ width:40, height:40, background:CARD_PALETTE[i%CARD_PALETTE.length], borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontWeight:800, fontSize:16, flexShrink:0 }}>
              {card.name.slice(0,1)}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:15, fontWeight:600, color:C.text }}>{card.name}</div>
              {card.last4 && <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>**** {card.last4}</div>}
            </div>
            <button onClick={() => remove(card.id)} style={{ background:'#FEE2E2', border:'none', color:'#DC2626', borderRadius:8, width:32, height:32, fontSize:16, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
          </div>
        ))}

        {showForm ? (
          <div style={{ background:'white', borderRadius:16, padding:'20px', marginTop:8, boxShadow:'0 1px 6px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:16 }}>カードを追加</div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, color:C.textMuted, fontWeight:600, marginBottom:6 }}>カード名 *</div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="例：楽天カード、三井住友カード" style={inputStyle} autoFocus />
            </div>
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:11, color:C.textMuted, fontWeight:600, marginBottom:6 }}>末尾4桁（任意）</div>
              <input value={form.last4} onChange={e=>setForm(f=>({...f,last4:e.target.value.replace(/\D/g,'')}))} placeholder="例：1234" maxLength={4} type="tel" style={inputStyle} />
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>setShowForm(false)} style={{ flex:1, background:C.bg, borderRadius:12, padding:'12px', fontSize:13, fontWeight:600, color:C.textMuted, border:'none', cursor:'pointer' }}>キャンセル</button>
              <button onClick={save} style={{ flex:2, background:C.primary, borderRadius:12, padding:'12px', fontSize:13, fontWeight:700, color:'white', border:'none', cursor:'pointer' }}>追加する</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setShowForm(true)} style={{ width:'100%', background:C.primaryLight, color:C.primary, borderRadius:14, padding:'14px', fontSize:14, fontWeight:700, border:`1.5px dashed ${C.primary}`, cursor:'pointer', marginTop:cards.length?8:0 }}>
            ＋ カード・支払い方法を追加
          </button>
        )}
      </div>
    </Screen>
  );
}

// ── 13 Settings ────────────────────────────────────────────────────────────
function SettingsScreen({ go, user, onLogout }) {
  const fixedCount = Store.get('fixedExpenses', []).length;
  const nwData = Store.get('networth', { assets: [], liabilities: [] });
  const nwTotal = nwData.assets.reduce((s,i)=>s+i.amount,0) - nwData.liabilities.reduce((s,i)=>s+i.amount,0);
  const [taxRate, setTaxRate] = useState(() => Store.get('settings', {}).taxRate || 20);
  const [notify, setNotify] = useState(() => Store.get('settings', {}).notify !== false);
  const [modal, setModal] = useState(null);
  const [taxInput, setTaxInput] = useState('');
  const [toast, setToast] = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const saveTaxRate = () => {
    const val = parseInt(taxInput);
    if (isNaN(val) || val < 0 || val > 99) { showToast('0〜99の数字を入力してください'); return; }
    Store.set('settings', { ...Store.get('settings', {}), taxRate: val });
    setTaxRate(val);
    setModal(null);
    showToast('税率を保存しました');
  };

  const toggleNotify = () => {
    const next = !notify;
    setNotify(next);
    Store.set('settings', { ...Store.get('settings', {}), notify: next });
    showToast(next ? '通知をオンにしました' : '通知をオフにしました');
  };

  const exportData = () => {
    const data = {};
    ['transactions','fixedExpenses','budgets','networth','settings'].forEach(k => {
      try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
    });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `jiyujin-${TODAY}.json`; a.click();
    URL.revokeObjectURL(url);
    showToast('データをエクスポートしました');
  };

  const cardCount = Store.get('cards', []).length;
  const rows = [
    { label: 'プロフィール',        detail: 'Googleアカウント連携', emoji: '👤', action: () => showToast('Googleアカウントで管理されています') },
    { label: '税率の設定',          detail: `現在 ${taxRate}%`,     emoji: '📊', action: () => { setTaxInput(String(taxRate)); setModal('tax'); } },
    { label: '固定費の管理',        detail: `${fixedCount}件登録済み`, emoji: '📋', action: () => go('fixed') },
    { label: 'カード・支払い管理',  detail: cardCount > 0 ? `${cardCount}枚登録済み` : '未登録', emoji: '💳', action: () => go('cards') },
    { label: '財産目録',            detail: nwData.assets.length > 0 ? `純資産 ¥${fmt(nwTotal)}` : '未設定', emoji: '📒', action: () => go('networth') },
    { label: '通知設定',            detail: notify ? 'オン' : 'オフ', emoji: '🔔', action: toggleNotify },
    { label: 'データの書き出し',    detail: 'JSONで保存',           emoji: '☁️', action: exportData },
  ];

  return (
    <Screen>
      {toast && (
        <div style={{ position: 'fixed', top: 64, left: '50%', transform: 'translateX(-50%)', background: '#1a1a2e', color: 'white', borderRadius: 12, padding: '10px 20px', fontSize: 13, fontWeight: 600, zIndex: 999, whiteSpace: 'nowrap', boxShadow: '0 4px 20px rgba(0,0,0,0.25)', pointerEvents: 'none' }}>
          {toast}
        </div>
      )}

      {modal === 'tax' && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 900, display: 'flex', alignItems: 'flex-end' }} onClick={() => setModal(null)}>
          <div style={{ background: 'white', borderRadius: '24px 24px 0 0', padding: '28px 24px 44px', width: '100%' }} onClick={e => e.stopPropagation()}>
            <div style={{ width: 40, height: 4, background: C.border, borderRadius: 2, margin: '0 auto 20px' }} />
            <div style={{ fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 6 }}>税率の設定</div>
            <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 20 }}>副業・フリーランス収入に対する税積立率</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
              <input
                type="number" min="0" max="99" value={taxInput}
                onChange={e => setTaxInput(e.target.value)}
                style={{ flex: 1, background: C.bg, border: `2px solid ${C.primary}`, borderRadius: 14, padding: '14px 18px', fontSize: 28, fontWeight: 700, color: C.text, textAlign: 'center', outline: 'none', fontFeatureSettings: tnum }}
                autoFocus
              />
              <span style={{ fontSize: 22, fontWeight: 700, color: C.textMuted }}>%</span>
            </div>
            <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
              {[10, 15, 20, 30].map(v => (
                <button key={v} onClick={() => setTaxInput(String(v))} style={{ flex: 1, background: String(v) === taxInput ? C.primary : C.bg, color: String(v) === taxInput ? 'white' : C.text, borderRadius: 10, padding: '10px', fontSize: 14, fontWeight: 600, border: 'none', cursor: 'pointer' }}>{v}%</button>
              ))}
            </div>
            <button onClick={saveTaxRate} style={{ width: '100%', background: C.primary, color: 'white', borderRadius: 16, padding: '15px', fontSize: 15, fontWeight: 700, border: 'none', cursor: 'pointer' }}>保存する</button>
          </div>
        </div>
      )}

      <div style={{ flex: 1, overflowY: 'auto', padding: '56px 20px 20px' }}>
        <div style={{ fontSize: 21, fontWeight: 700, color: C.text, marginBottom: 24 }}>設定</div>

        <Card style={{ marginBottom: 24, padding: '20px 20px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            {user?.picture
              ? <img src={user.picture} alt="" style={{ width: 56, height: 56, borderRadius: '50%', flexShrink: 0 }} />
              : <div style={{ width: 56, height: 56, background: C.primaryLight, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, flexShrink: 0 }}>🙂</div>}
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{user?.name || 'ゲストユーザー'}</div>
              <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>{user?.email}</div>
            </div>
          </div>
          <button onClick={onLogout} style={{ marginTop: 14, width: '100%', background: '#FEE2E2', borderRadius: 12, padding: '12px', fontSize: 13, fontWeight: 600, color: '#DC2626', border: 'none', cursor: 'pointer' }}>
            ログアウト
          </button>
        </Card>

        {rows.map(row => (
          <button key={row.label} onClick={row.action} style={{ background: 'white', borderRadius: 16, padding: '16px 18px', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 14, boxShadow: '0 1px 6px rgba(0,0,0,0.04)', cursor: 'pointer', width: '100%', textAlign: 'left', border: 'none' }}>
            <span style={{ fontSize: 18, width: 28, textAlign: 'center' }}>{row.emoji}</span>
            <div style={{ flex: 1, fontSize: 14, fontWeight: 500, color: C.text }}>{row.label}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ fontSize: 13, color: C.textMuted }}>{row.detail}</div>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke={C.textFaint} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </button>
        ))}

        <div style={{ marginTop: 24, textAlign: 'center' }}>
          <span style={{ fontSize: 11, color: C.textFaint }}>自由人家計簿 v1.0.0　·　プライバシーポリシー</span>
        </div>
      </div>

      <BottomNav active="settings" go={go} />
    </Screen>
  );
}

// ── App (router) ───────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('gUser') || 'null'));
  const [screen, setScreen] = useState(() => localStorage.getItem('gUser') ? 'home' : 'login');
  const [prev,   setPrev]   = useState('home');

  const go = useCallback((s) => {
    setPrev(screen);
    setScreen(s);
  }, [screen]);

  const nav = useCallback((key) => {
    const map = { home: 'home', input: 'input', budget: 'budget', report: 'report', settings: 'settings' };
    go(map[key] || key);
  }, [go]);

  const onLogin = (u) => {
    localStorage.setItem('gUser', JSON.stringify(u));
    setUser(u);
    const prefs = Store.get('settings', {});
    setScreen(prefs.onboardingDone ? 'home' : 'usertype');
  };
  const onLogout = () => {
    localStorage.removeItem('gUser');
    Store.set('settings', {});
    if (window.google) google.accounts.id.disableAutoSelect();
    setUser(null);
    setScreen('login');
  };
  const onSelectType = (type) => {
    Store.set('settings', { ...Store.get('settings'), userType: type });
    go(type === 'freelance' ? 'fl-ob1' : type === 'employee' ? 'emp-ob1' : 'hyb-ob1');
  };

  const render = () => {
    switch (screen) {
      case 'login':         return <LoginScreen    onLogin={onLogin} onSkip={() => go('usertype')} />;
      case 'usertype':      return <UserTypeScreen onSelect={onSelectType} />;
      case 'fl-ob1':        return <Onboarding1    onNext={() => go('fl-ob2')} />;
      case 'fl-ob2':        return <Onboarding2    onNext={() => go('fl-ob3')} />;
      case 'fl-ob3':        return <Onboarding3    onNext={() => go('home')} />;
      case 'emp-ob1':       return <EmpOnboarding1 onNext={() => go('emp-ob2')} />;
      case 'emp-ob2':       return <EmpOnboarding2 onNext={() => go('home')} />;
      case 'hyb-ob1':       return <HybOnboarding1 onNext={() => go('hyb-ob2')} />;
      case 'hyb-ob2':       return <HybOnboarding2 onNext={() => go('hyb-ob3')} />;
      case 'hyb-ob3':       return <HybOnboarding3 onNext={() => go('home')} />;
      case 'home':          return <HomeScreen      go={nav} />;
      case 'input':         return <InputSelector   go={nav} />;
      case 'expense-input': return <ExpenseInput    onBack={() => go(prev)} onDone={() => go('home')} />;
      case 'income-input':  return <IncomeInput     onBack={() => go(prev)} onDone={() => go('home')} />;
      case 'tax':           return <TaxScreen       go={nav} />;
      case 'budget':        return <BudgetScreen    go={nav} />;
      case 'biz':           return <BizScreen       go={nav} />;
      case 'report':        return <ReportScreen    go={nav} />;
      case 'networth':      return <NetWorthScreen      go={nav} />;
      case 'fixed':         return <FixedExpensesScreen go={nav} />;
      case 'cards':         return <CardsScreen         go={nav} />;
      case 'settings':      return <SettingsScreen  go={nav} user={user} onLogout={onLogout} />;
      default:              return <HomeScreen      go={nav} />;
    }
  };

  return <div style={{ minHeight: '100vh', background: C.bg }}>{render()}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
