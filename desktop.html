<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自由人家計簿 — デスクトップ</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #EFF8F5;
      color: #1A1917;
    }
    #root { min-height: 100vh; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input { font-family: inherit; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.14); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.24); background-clip: padding-box; border: 3px solid transparent; }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 7px; border-radius: 4px; background: #E0F0EC; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
    input[type=range]::-moz-range-thumb { width: 28px; height: 28px; border-radius: 50%; background: white; border: 2.5px solid #C8748E; box-shadow: 0 3px 10px rgba(200,116,142,0.3); cursor: pointer; }
    .navbtn:hover { background: #EFF8F5 !important; }
    .navbtn.active:hover { background: #097D60 !important; }
    .lift { transition: transform .15s ease, box-shadow .15s ease; }
    .lift:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.10); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const CLIENT_ID = '954710101476-go30mqdlnjbu24qji456qkjhe318bf9q.apps.googleusercontent.com';
function parseJwt(t) { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
const Store = {
  get: (key, def={}) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
};

// ── Design tokens (shared with the mobile build) ───────────────────────────
const C = {
  primary:     '#097D60',
  primaryDark: '#054D3C',
  primaryLight:'#D4E8E3',
  bg:          '#EFF8F5',
  bgCard:      '#E0F0EC',
  border:      '#C0DED6',
  warning:     '#C8748E',
  warningBg:   '#FAE8F0',
  info:        '#4A6898',
  infoBg:      '#E6EDF8',
  infoBorder:  '#A4B8D8',
  invest:      '#6A5E9C',
  text:        '#1A1917',
  textMed:     '#5A5652',
  textMuted:   '#9E9994',
  textFaint:   '#C0BAB2',
};
const fmt = n => n.toLocaleString('ja-JP');
const tnum = "'tnum'";
const TODAY = new Date().toISOString().slice(0,10);
const YESTERDAY = new Date(Date.now()-86400000).toISOString().slice(0,10);
function resolveDate(d) { if (d==='今日') return TODAY; if (d==='昨日') return YESTERDAY; return d; }
function thisMonthStr() { return TODAY.slice(0,7); }
function getThisMonthTxns() { const ym=thisMonthStr(); return Store.get('transactions',[]).filter(t=>t.date&&t.date.startsWith(ym)); }
function sumDiv(txns, div) { return txns.filter(t=>t.type==='expense'&&t.division===div).reduce((s,t)=>s+t.amount,0); }
const CAT_EMOJI = {
  '食費':'🛒', '外食':'🍜', '交通費':'🚌', '日用品':'🧴',
  '美容・衣服':'👗', '医療・健康':'💊', '通信費':'📱', '趣味・娯楽':'🎮',
  '材料費':'🎨', '機材・ソフト':'💻', '出店料':'🏪', '交際費':'🥂',
  '教育・学習':'📚', 'その他':'📋', '売上':'💰',
};

// ── Reusable pieces ─────────────────────────────────────────────────────────
function Card({ children, style = {}, hover = false }) {
  return (
    <div className={hover ? 'lift' : ''} style={{ background: 'white', borderRadius: 20, padding: 24, boxShadow: '0 2px 12px rgba(0,0,0,0.05)', ...style }}>
      {children}
    </div>
  );
}

function SectionTitle({ children, right }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{children}</div>
      {right}
    </div>
  );
}

function Bar({ pct, color, bg = C.bgCard, h = 8 }) {
  return (
    <div style={{ background: bg, borderRadius: h / 2, height: h, overflow: 'hidden' }}>
      <div style={{ background: color, width: `${Math.min(100, pct)}%`, height: '100%', borderRadius: h / 2, transition: 'width .3s' }} />
    </div>
  );
}

function PrimaryBtn({ children, onClick, style = {} }) {
  return (
    <button onClick={onClick} className="lift" style={{
      background: C.primary, color: 'white', borderRadius: 14, padding: '14px 22px',
      fontSize: 15, fontWeight: 700, boxShadow: '0 8px 24px rgba(9,125,96,0.30)', ...style
    }}>{children}</button>
  );
}

// ── Brand mark ──────────────────────────────────────────────────────────────
function Logo({ size = 40, radius = 13 }) {
  return (
    <div style={{ width: size, height: size, background: 'linear-gradient(145deg,#097D60,#054D3C)', borderRadius: radius, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: '0 6px 18px rgba(31,29,56,0.30)' }}>
      <svg width={size * 0.55} height={size * 0.55} viewBox="0 0 46 46" fill="none">
        <path d="M23 5C14 5 8 12 8 20C8 29.5 13 37 23 42C33 37 38 29.5 38 20C38 12 32 5 23 5Z" fill="white" opacity="0.95"/>
        <path d="M23 10V36" stroke="#1F1D38" strokeWidth="2.5" strokeLinecap="round"/>
        <path d="M17 19L23 13L29 19" stroke="#1F1D38" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M17 25L23 31L29 25" stroke="#1F1D38" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.4"/>
      </svg>
    </div>
  );
}

// ── Sidebar navigation ──────────────────────────────────────────────────────
const NAV = [
  { key: 'home',     label: 'ホーム',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M2 9.5L11 2L20 9.5V20C20 20.55 19.55 21 19 21H14V15.5H8V21H3C2.45 21 2 20.55 2 20V9.5Z" fill={a ? 'white' : 'none'} stroke={a ? 'none' : C.textMuted} strokeWidth="1.6"/></svg> },
  { key: 'input',    label: '入力',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" fill={a ? 'white' : 'none'} stroke={a ? 'none' : C.textMuted} strokeWidth="1.6"/><path d="M11 7V15M7 11H15" stroke={a ? C.primary : C.textMuted} strokeWidth="1.8" strokeLinecap="round"/></svg> },
  { key: 'business', label: '事業管理',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect x="2" y="7" width="18" height="13" rx="2.5" fill={a ? 'white' : 'none'} stroke={a ? 'none' : C.textMuted} strokeWidth="1.6"/><path d="M7 7V5C7 3.9 7.9 3 9 3H13C14.1 3 15 3.9 15 5V7" stroke={a ? 'white' : C.textMuted} strokeWidth="1.6" strokeLinecap="round"/><path d="M11 12V16M9 14H13" stroke={a ? C.primary : C.textMuted} strokeWidth="1.6" strokeLinecap="round"/></svg> },
  { key: 'budget',   label: '予算管理',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect x="2" y="4" width="18" height="14" rx="3" fill={a ? 'white' : 'none'} stroke={a ? 'none' : C.textMuted} strokeWidth="1.6"/><path d="M6 9H16M6 13H11" stroke={a ? C.primary : C.textMuted} strokeWidth="1.6" strokeLinecap="round"/></svg> },
  { key: 'tax',      label: '税金・積立',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" fill={a ? 'white' : 'none'} stroke={a ? 'none' : C.textMuted} strokeWidth="1.6"/><path d="M11 6V11L14 13" stroke={a ? C.primary : C.textMuted} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg> },
  { key: 'report',   label: 'レポート',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect x="2" y="12" width="4" height="8" rx="1.5" fill={a ? 'white' : C.textMuted}/><rect x="9" y="7" width="4" height="13" rx="1.5" fill={a ? 'white' : C.textMuted}/><rect x="16" y="3" width="4" height="17" rx="1.5" fill={a ? 'white' : C.textMuted}/></svg> },
  { key: 'networth', label: '財産目録',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect x="3" y="2" width="16" height="18" rx="2.5" fill={a ? 'white' : 'none'} stroke={a ? 'none' : C.textMuted} strokeWidth="1.6"/><path d="M7 7H15M7 11H12M7 15H10" stroke={a ? C.primary : C.textMuted} strokeWidth="1.6" strokeLinecap="round"/><circle cx="15" cy="15" r="3.5" fill={a ? C.primary : 'none'} stroke={a ? 'none' : C.textMuted} strokeWidth="1.4"/><path d="M15 13.5V15.5M14 15H16" stroke={a ? 'white' : C.textMuted} strokeWidth="1.2" strokeLinecap="round"/></svg> },
  { key: 'settings', label: '設定',
    icon: a => <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke={a ? 'white' : C.textMuted} strokeWidth="1.6"/><path d="M11 2V4M11 18V20M2 11H4M18 11H20M4.22 4.22L5.64 5.64M16.36 16.36L17.78 17.78M4.22 17.78L5.64 16.36M16.36 5.64L17.78 4.22" stroke={a ? 'white' : C.textMuted} strokeWidth="1.6" strokeLinecap="round"/></svg> },
];

function Sidebar({ active, go }) {
  return (
    <aside style={{ width: 248, background: 'white', borderRight: `1px solid ${C.bgCard}`, display: 'flex', flexDirection: 'column', position: 'fixed', top: 0, bottom: 0, left: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '24px 22px 22px' }}>
        <Logo />
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text, letterSpacing: '-0.3px' }}>自由人家計簿</div>
          <div style={{ fontSize: 11, color: C.textMuted }}>2026年 6月</div>
        </div>
      </div>

      <nav style={{ flex: 1, padding: '6px 14px', display: 'flex', flexDirection: 'column', gap: 4 }}>
        {NAV.map(({ key, label, icon }) => {
          const a = active === key;
          return (
            <button key={key} className={`navbtn${a ? ' active' : ''}`} onClick={() => go(key)} style={{
              display: 'flex', alignItems: 'center', gap: 13, padding: '12px 14px', borderRadius: 13,
              background: a ? C.primary : 'transparent', textAlign: 'left',
              boxShadow: a ? '0 6px 18px rgba(9,125,96,0.28)' : 'none', transition: 'background .12s',
            }}>
              {icon(a)}
              <span style={{ fontSize: 14, fontWeight: a ? 700 : 500, color: a ? 'white' : C.textMed }}>{label}</span>
            </button>
          );
        })}
      </nav>

      <div style={{ padding: 14, borderTop: `1px solid ${C.bgCard}` }}>
        {(() => {
          const u = JSON.parse(localStorage.getItem('gUser') || 'null');
          return (
            <button onClick={() => go('settings')} className="navbtn" style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', borderRadius: 13, width: '100%', textAlign: 'left' }}>
              {u?.picture
                ? <img src={u.picture} alt="" style={{ width: 38, height: 38, borderRadius: '50%', flexShrink: 0 }} />
                : <div style={{ width: 38, height: 38, background: C.primaryLight, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>🙂</div>}
              <div style={{ overflow: 'hidden' }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 140 }}>{u?.name || 'ゲストユーザー'}</div>
                <div style={{ fontSize: 11, color: C.textMuted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 140 }}>{u?.email || '未ログイン'}</div>
              </div>
            </button>
          );
        })()}
      </div>
    </aside>
  );
}

// ── Page shell (sidebar + scrollable content) ──────────────────────────────
function Shell({ active, go, title, subtitle, actions, children, maxWidth = 1180 }) {
  return (
    <div style={{ minHeight: '100vh', background: C.bg }}>
      <Sidebar active={active} go={go} />
      <main style={{ marginLeft: 248, padding: '34px 40px 56px' }}>
        <div style={{ maxWidth, margin: '0 auto' }}>
          <header style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 28, flexWrap: 'wrap', gap: 16 }}>
            <div>
              <div style={{ fontSize: 26, fontWeight: 700, color: C.text, letterSpacing: '-0.6px' }}>{title}</div>
              {subtitle && <div style={{ fontSize: 13, color: C.textMuted, marginTop: 5 }}>{subtitle}</div>}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>{actions}</div>
          </header>
          {children}
        </div>
      </main>
    </div>
  );
}

function AddButton({ go }) {
  return (
    <PrimaryBtn onClick={() => go('input')} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2V14M2 8H14" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
      記録を追加
    </PrimaryBtn>
  );
}

function MonthPill() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'white', borderRadius: 12, padding: '9px 14px', boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
      <button style={{ display: 'flex' }}><svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M8 2L3 6L8 10" stroke={C.textMed} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
      <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>2026年6月</span>
      <button style={{ display: 'flex' }}><svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M4 2L9 6L4 10" stroke={C.textFaint} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
    </div>
  );
}

// ── Business (事業管理) ──────────────────────────────────────────────────────
const BIZ_CATS = [
  { id: 'materials',     name: '材料費',       color: '#097D60', emoji: '🎨' },
  { id: 'equipment',     name: '機材・ソフト', color: '#4A6898', emoji: '💻' },
  { id: 'booth',         name: '出店料',       color: '#E8935F', emoji: '🏪' },
  { id: 'entertainment', name: '交際費',       color: '#C8748E', emoji: '🥂' },
  { id: 'outsource',     name: '外注費',       color: '#6A5E9C', emoji: '👥' },
  { id: 'transport',     name: '交通費',       color: '#5B7B6F', emoji: '🚃' },
  { id: 'books',         name: '教育・学習',   color: '#8B5CF6', emoji: '📚' },
  { id: 'ad',            name: '広告宣伝',     color: '#DC6B6B', emoji: '📢' },
  { id: 'other',         name: 'その他',       color: '#9CA3AF', emoji: '📋' },
];

function BusinessScreen({ go }) {
  const [expenses, setExpenses] = useState(() => Store.get('bizExpenses', []));
  const [form, setForm] = useState({ cat: 'equipment', amount: '', memo: '', date: new Date().toISOString().slice(0,10) });
  const [showForm, setShowForm] = useState(false);
  const [filter, setFilter] = useState('all');

  const save = () => {
    if (!form.amount) return;
    const next = [{ id: Date.now(), ...form, amount: Number(form.amount) }, ...expenses];
    setExpenses(next); Store.set('bizExpenses', next);
    setForm({ cat: 'equipment', amount: '', memo: '', date: new Date().toISOString().slice(0,10) });
    setShowForm(false);
  };
  const remove = (id) => { const next = expenses.filter(e => e.id !== id); setExpenses(next); Store.set('bizExpenses', next); };

  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const catTotals = BIZ_CATS.map(c => ({ ...c, amt: expenses.filter(e => e.cat === c.id).reduce((s,e) => s+e.amount, 0) })).filter(c => c.amt > 0).sort((a,b) => b.amt - a.amt);
  const filtered = filter === 'all' ? expenses : expenses.filter(e => e.cat === filter);

  return (
    <Shell active="business" go={go} title="事業管理" subtitle="経費・事業収支の管理">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.4fr', gap: 20, alignItems: 'start' }}>

        {/* Left: Summary + Form + Category */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Card>
            <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6, fontWeight: 600 }}>今月の経費合計</div>
            <div style={{ fontSize: 40, fontWeight: 700, color: C.text, letterSpacing: '-2px', fontFeatureSettings: tnum }}>¥{fmt(total)}</div>
            <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>全額が経費控除の対象</div>
            <div style={{ height: 1, background: C.border, margin: '16px 0' }} />
            <button onClick={() => setShowForm(v => !v)} className="lift" style={{ width: '100%', background: C.primary, color: 'white', borderRadius: 12, padding: '12px', fontSize: 14, fontWeight: 700, boxShadow: '0 6px 18px rgba(9,125,96,0.28)' }}>
              {showForm ? '× 閉じる' : '+ 経費を追加'}
            </button>
          </Card>

          {showForm && (
            <Card>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 14 }}>経費を入力</div>
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6, fontWeight: 600 }}>カテゴリ</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                  {BIZ_CATS.map(c => (
                    <button key={c.id} onClick={() => setForm(f => ({...f, cat: c.id}))} style={{ background: form.cat === c.id ? c.color : C.bg, color: form.cat === c.id ? 'white' : C.text, borderRadius: 10, padding: '8px 10px', fontSize: 12, fontWeight: form.cat === c.id ? 700 : 400, display: 'flex', alignItems: 'center', gap: 6, border: 'none', cursor: 'pointer' }}>
                      <span>{c.emoji}</span>{c.name}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6, fontWeight: 600 }}>金額（円）</div>
                <input type="number" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))} placeholder="0" style={{ width: '100%', fontSize: 22, fontWeight: 700, padding: '10px 14px', border: `1.5px solid ${C.border}`, borderRadius: 10, outline: 'none', background: C.bg }} />
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6, fontWeight: 600 }}>メモ（任意）</div>
                <input value={form.memo} onChange={e => setForm(f => ({...f, memo: e.target.value}))} placeholder="例：Adobe CC 月額" style={{ width: '100%', fontSize: 13, padding: '10px 14px', border: `1.5px solid ${C.border}`, borderRadius: 10, outline: 'none', background: C.bg }} />
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={save} style={{ flex: 1, background: C.primary, color: 'white', borderRadius: 10, padding: '11px', fontSize: 13, fontWeight: 700, border: 'none', cursor: 'pointer' }}>保存</button>
                <button onClick={() => setShowForm(false)} style={{ flex: 1, background: C.bg, color: C.textMuted, borderRadius: 10, padding: '11px', fontSize: 13, border: 'none', cursor: 'pointer' }}>キャンセル</button>
              </div>
            </Card>
          )}

          {catTotals.length > 0 && (
            <Card>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.textMuted, marginBottom: 14 }}>カテゴリ別</div>
              {catTotals.map(c => (
                <div key={c.id} style={{ marginBottom: 12 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                    <span style={{ fontSize: 13, color: C.text }}>{c.emoji} {c.name}</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: C.text, fontFeatureSettings: tnum }}>¥{fmt(c.amt)}</span>
                  </div>
                  <div style={{ height: 6, background: C.bg, borderRadius: 3 }}>
                    <div style={{ height: '100%', background: c.color, borderRadius: 3, width: `${total > 0 ? Math.round(c.amt/total*100) : 0}%` }} />
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>

        {/* Right: Expense list */}
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>経費一覧</div>
            <select value={filter} onChange={e => setFilter(e.target.value)} style={{ fontSize: 12, padding: '6px 10px', border: `1.5px solid ${C.border}`, borderRadius: 8, background: 'white', color: C.text }}>
              <option value="all">すべて</option>

          <div style={{ position: 'absolute', right: 40, bottom: -28, width: 110, height: 110, background: 'rgba(255,255,255,0.04)', borderRadius: '50%' }} />
          <div style={{ fontSize: 13, fontWeight: 500, color: 'rgba(255,255,255,0.72)', marginBottom: 6 }}>今日から使えるお金</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8 }}>
            <span style={{ fontSize: 64, fontWeight: 700, color: 'white', letterSpacing: '-3px', fontFeatureSettings: tnum, lineHeight: 1 }}>¥{fmt(dailyBudget)}</span>
            <span style={{ fontSize: 20, color: 'rgba(255,255,255,0.72)', fontWeight: 500 }}>/日</span>

          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'rgba(255,255,255,0.5)' }}>

            <div key={item.name} style={{ marginBottom: i < breakdown.length - 1 ? 18 : 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>

                  <div style={{ width: 10, height: 10, borderRadius: 3, background: item.color }} />
                  <span style={{ fontSize: 14, color: C.textMed, fontWeight: 500 }}>{item.name}</span>
                </div>
                <span style={{ fontSize: 14, fontWeight: 600, color: C.text, fontFeatureSettings: tnum }}>¥{fmt(item.amt)}</span>
              </div>
              <Bar pct={item.pct} color={item.color} />
              {item.note && <div style={{ textAlign: 'right', fontSize: 11, color: item.noteColor, marginTop: 4 }}>{item.note}</div>}
            </div>
          ))}
        </Card>
        {/* Alert — dynamic */}
        {(() => {
          const mTxns = getThisMonthTxns();
          const bdg = Store.get('budgets', {});
          const today = new Date();
          const daysLeft = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate() - today.getDate();
          const lifeUsed = sumDiv(mTxns, '生活費');
          const bizUsed  = sumDiv(mTxns, '事業費');
          const taxSaved = sumDiv(mTxns, '税金');
          const lifeBudget = bdg['生活費'] || 0;
          const bizBudget  = bdg['事業費'] || 0;
          const taxGoal = Math.round(income * taxRate / 100);
          const totalExp = mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount, 0);
          const tips = [];
          if (mTxns.length === 0) {
            tips.push('まだ今月の記録がありません。支出・収入を入力して家計を管理しましょう。');
          } else {
            if (bizBudget > 0) {
              const p = Math.round(bizUsed/bizBudget*100);
              if (p >= 90) tips.push(`${bizLabel}が予算の${p}%に達しています。残り¥${fmt(Math.max(0,bizBudget-bizUsed))}で月末まで乗り越えましょう。`);
              else if (p >= 75) tips.push(`${bizLabel}が予算の${p}%を使用中。あと¥${fmt(bizBudget-bizUsed)}残っています。`);
              else tips.push(`${bizLabel}は予算の${p}%と良いペースです。`);
            }
            if (lifeBudget > 0) {
              const p = Math.round(lifeUsed/lifeBudget*100);
              if (p >= 90) tips.push(`生活費が予算の${p}%に達しています。残り¥${fmt(Math.max(0,lifeBudget-lifeUsed))}で過ごしましょう。`);
              else if (p <= 60) tips.push(`生活費は予算の${p}%と安全圏です。このペースをキープしましょう！`);
            }
            if (taxGoal > 0) {
              const p = Math.round(taxSaved/taxGoal*100);
              if (p >= 100) tips.push('今月の税金積立目標を達成しました！');
              else if (p < 50 && daysLeft <= 15) tips.push(`税金積立が目標の${p}%です。月末まで¥${fmt(taxGoal-taxSaved)}の積立が必要です。`);
            }
            if (income > 0 && usable > 0) {
              const sp = Math.round(totalExp/usable*100);
              if (sp > 85 && daysLeft > 5) tips.push(`使用可能額の${sp}%を消費しました。残り${daysLeft}日間は支出を抑えましょう。`);
            }
            if (tips.length === 0) {
              tips.push('家計は順調です！このペースをキープしましょう。');
              if (daysLeft <= 7) tips.push(`月末まであと${daysLeft}日。最後まで丁寧に記録していきましょう。`);
            }
          }
          const isGood = tips.every(t => !t.includes('達しています') && !t.includes('必要'));
          const accentColor = isGood ? C.primary : C.warning;
          const bg = isGood ? C.primaryLight : C.warningBg;
          return (
            <div style={{ background: bg, borderRadius: 20, padding: 24, borderLeft: `4px solid ${accentColor}` }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: accentColor, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 7 }}>
                <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M7 1L13 12H1L7 1Z" stroke={accentColor} strokeWidth="1.4" fill="none" strokeLinejoin="round"/><path d="M7 5V8M7 10V10.5" stroke={accentColor} strokeWidth="1.4" strokeLinecap="round"/></svg>
                今月のポイント
              </div>
              <div style={{ fontSize: 13, color: C.textMed, lineHeight: 2 }}>
                {tips.map((t, i) => <div key={i}>{t}</div>)}
              </div>
            </div>
          );
        })()}
      </div>
    </Shell>
  );
}

// ── BUDGET ──────────────────────────────────────────────────────────────────
function BudgetScreen({ go }) {
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const defaultBudgets = { '生活費': 0, '事業費': 0, '税金積立': Math.round(income * taxRate / 100), '投資': s.savingsGoal || 0 };
  const [budgets, setBudgets] = useState(() => ({ ...defaultBudgets, ...Store.get('budgets', {}) }));
  const [editKey, setEditKey] = useState(null);
  const [editVal, setEditVal] = useState('');

  const txns = getThisMonthTxns();
  const lifeUsed = sumDiv(txns, '生活費');
  const bizUsed = sumDiv(txns, '事業費');
  const taxUsed = sumDiv(txns, '税金');
  const investUsed = sumDiv(txns, '投資');

  const bizLabel = userType === 'employee' ? '特別支出' : '事業費';
  const investLabel = userType === 'freelance' ? '投資' : '貯蓄';
  const cats = [
    { key: '生活費', name: '生活費', used: lifeUsed, budget: budgets['生活費'] || 0, color: C.info },
    { key: '事業費', name: bizLabel, used: bizUsed, budget: budgets['事業費'] || 0, color: C.primary },
    { key: '税金積立', name: '税金積立', used: taxUsed, budget: budgets['税金積立'] || 0, color: C.warning },
    { key: '投資', name: investLabel, used: investUsed, budget: budgets['投資'] || 0, color: C.invest },
  ].map(c => {
    const pct = c.budget > 0 ? Math.min(100, Math.round(c.used / c.budget * 100)) : 0;
    const warn = pct >= 80;
    return { ...c, pct, warn, note: c.budget > 0 ? `${pct}%` : '予算未設定', noteColor: warn ? C.warning : C.textMuted };
  });

  const totalUsed = cats.reduce((s, c) => s + c.used, 0);
  const totalBudget = cats.reduce((s, c) => s + c.budget, 0);
  const totalPct = totalBudget > 0 ? Math.min(100, Math.round(totalUsed / totalBudget * 100)) : 0;

  const startEdit = (key, val) => { setEditKey(key); setEditVal(String(val)); };
  const commitEdit = () => {
    if (editKey) {
      const next = { ...budgets, [editKey]: parseInt(editVal) || 0 };
      setBudgets(next); Store.set('budgets', next);
    }
    setEditKey(null);
  };

  return (
    <Shell active="budget" go={go} title="予算管理" subtitle={`総予算 ¥${fmt(totalBudget)} · 使用済み ¥${fmt(totalUsed)}`} actions={<MonthPill />}>
      <Card style={{ marginBottom: 20 }}>
        <SectionTitle right={<span style={{ fontSize: 13, color: C.textMuted, fontFeatureSettings: tnum }}>¥{fmt(totalUsed)} / ¥{fmt(totalBudget)}</span>}>全体予算</SectionTitle>
        <div style={{ background: C.bgCard, borderRadius: 6, height: 12, marginBottom: 8, overflow: 'hidden' }}>
          <div style={{ background: `linear-gradient(90deg, ${C.info} 40%, ${C.primary} 40% 75%, ${C.warning} 75% 90%, ${C.invest} 90%)`, width: `${totalPct}%`, height: '100%', borderRadius: 6, transition: 'width .3s' }} />
        </div>
        <div style={{ fontSize: 12, color: C.textMuted }}>予算の{totalPct}%を使用中</div>
      </Card>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        {cats.map(item => (
          <Card key={item.key} hover>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                <div style={{ width: 11, height: 11, borderRadius: 3, background: item.color }} />
                <span style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{item.name}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 15, fontWeight: 700, color: item.warn ? C.warning : C.text, fontFeatureSettings: tnum }}>¥{fmt(item.used)}</span>
                {editKey === item.key ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                    <span style={{ fontSize: 12, color: C.textMuted }}>/</span>
                    <input autoFocus type="number" value={editVal} onChange={e => setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={e => e.key === 'Enter' && commitEdit()} style={{ width: 96, fontSize: 13, padding: '5px 8px', border: `2px solid ${C.primary}`, borderRadius: 9, outline: 'none', background: 'white' }} />
                  </div>
                ) : (
                  <button onClick={() => startEdit(item.key, item.budget)} style={{ display: 'flex', alignItems: 'center', gap: 5, background: C.bg, borderRadius: 8, padding: '5px 9px', border: `1px solid ${C.border}` }}>
                    <span style={{ fontSize: 12, color: C.textMuted, fontFeatureSettings: tnum }}>/ ¥{fmt(item.budget)}</span>
                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L3.5 10.5H1.5V8.5L8.5 1.5Z" stroke={C.textMuted} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </button>
                )}
              </div>
            </div>
            <Bar pct={item.pct} color={item.color} h={10} />
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 5, marginTop: 8 }}>
              {item.warn && <svg width="11" height="10" viewBox="0 0 11 10" fill="none"><path d="M5.5 1L10 9H1L5.5 1Z" stroke={C.warning} strokeWidth="1.2" fill="none"/><path d="M5.5 4V6.5M5.5 7.5V8" stroke={C.warning} strokeWidth="1.2" strokeLinecap="round"/></svg>}
              <span style={{ fontSize: 11, color: item.noteColor }}>{item.note}</span>
            </div>
          </Card>
        ))}
      </div>
    </Shell>
  );
}

// ── TAX & SAVINGS ─────────────────────────────────────────────────────────
function TaxScreen({ go }) {
  const s = Store.get('settings', {});
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const goalAmt = Math.round(income * taxRate / 100);
  const txns = getThisMonthTxns();
  const savedAmt = sumDiv(txns, '税金');
  const pct = goalAmt > 0 ? Math.min(100, Math.round(savedAmt / goalAmt * 100)) : 0;
  const dashOffset = Math.round(327 * (1 - pct / 100));
  const remaining = Math.max(0, goalAmt - savedAmt);
  const today = new Date();
  const daysLeft = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate() - today.getDate();

  const allTxns = Store.get('transactions', []);
  const history = Array.from({length: 4}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const ym = d.toISOString().slice(0,7);
    const label = `${d.getMonth()+1}月`;
    const mSaved = allTxns.filter(t => t.date && t.date.startsWith(ym) && t.type === 'expense' && t.division === '税金').reduce((s,t) => s+t.amount, 0);
    const mPct = goalAmt > 0 ? Math.min(100, Math.round(mSaved/goalAmt*100)) : 0;
    return { m: label, pct: mPct, amt: `¥${fmt(mSaved)}`, color: mPct >= 100 ? C.primary : C.warning };
  }).reverse();

  return (
    <Shell active="tax" go={go} title="税金・積立" subtitle={`${today.getMonth()+1}月 — 目標達成まで頑張ろう`} actions={<MonthPill />}>
      <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 20, alignItems: 'start' }}>
        <Card style={{ padding: 30 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
            <div style={{ position: 'relative', width: 156, height: 156, flexShrink: 0 }}>
              <svg width="156" height="156" viewBox="0 0 128 128" style={{ position: 'absolute', inset: 0 }}>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.bgCard} strokeWidth="11"/>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.warning} strokeWidth="11" strokeDasharray="327" strokeDashoffset={dashOffset} strokeLinecap="round" transform="rotate(-90 64 64)"/>
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ fontSize: 30, fontWeight: 700, color: C.warning, lineHeight: 1, fontFeatureSettings: tnum }}>{pct}%</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 5 }}>達成</div>
              </div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6 }}>積み立て済み</div>
              <div style={{ fontSize: 34, fontWeight: 700, color: C.warning, letterSpacing: '-1.2px', fontFeatureSettings: tnum, lineHeight: 1.1 }}>¥{fmt(savedAmt)}</div>
              <div style={{ height: 1, background: C.bgCard, margin: '16px 0' }} />
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 4 }}>今月の目標</div>
              <div style={{ fontSize: 24, fontWeight: 700, color: C.text, fontFeatureSettings: tnum }}>¥{fmt(goalAmt)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>収入の{taxRate}%</div>
            </div>
          </div>
          {remaining > 0 && (
            <div style={{ marginTop: 24, background: C.warningBg, borderRadius: 14, padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 12 }}>
              <svg width="20" height="20" viewBox="0 0 18 18" fill="none"><path d="M9 2L16 14H2L9 2Z" stroke={C.warning} strokeWidth="1.4" fill="none" strokeLinejoin="round"/><path d="M9 7V10M9 12V12.5" stroke={C.warning} strokeWidth="1.4" strokeLinecap="round"/></svg>
              <div style={{ fontSize: 13, color: C.warning, lineHeight: 1.6 }}>あと <strong style={{ fontSize: 16, fontFeatureSettings: tnum }}>¥{fmt(remaining)}</strong> 積み立てが必要です。月末まであと{daysLeft}日。</div>
            </div>
          )}
          {remaining === 0 && goalAmt > 0 && (
            <div style={{ marginTop: 24, background: C.primaryLight, borderRadius: 14, padding: '16px 18px', fontSize: 13, color: C.primary, fontWeight: 700 }}>今月の目標達成！ お疲れ様です 🎉</div>
          )}
        </Card>

        <div style={{ background: C.primaryLight, borderRadius: 20, padding: 26 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.primary, marginBottom: 12 }}>税金ガイド</div>
          <div style={{ fontSize: 13, color: C.textMed, lineHeight: 2 }}>年間所得400万円の場合、所得税+住民税の目安は約25〜30%です。<br/><br/>消費税の納付義務がある場合はさらに10%の積み立てが必要です。早めの確保で年度末の負担を減らせます。</div>
        </div>
      </div>

      <Card style={{ marginTop: 20 }}>
        <SectionTitle>月別積立状況</SectionTitle>
        {history.map(row => (
          <div key={row.m} style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 14 }}>
            <div style={{ fontSize: 13, color: C.textMuted, width: 32, flexShrink: 0 }}>{row.m}</div>
            <div style={{ flex: 1 }}><Bar pct={row.pct} color={row.color} h={10} /></div>
            <div style={{ fontSize: 13, fontWeight: 700, color: row.color, width: 72, textAlign: 'right', fontFeatureSettings: tnum }}>{row.amt}</div>
          </div>
        ))}
      </Card>

      {(() => {
        const monthlyInvest = (() => {
          const s = Store.get('settings', {});
          const budgets = Store.get('budgets', {});
          return budgets['投資'] || s.savingsGoal || 0;
        })();
        if (monthlyInvest <= 0) return null;
        const fv = (pmt, rate, years) => Math.round(pmt * ((Math.pow(1 + rate/12, years*12) - 1) / (rate/12)));
        const r5 = 0.05;
        const rows = [
          { label: '10年後', val: fv(monthlyInvest, r5, 10) },
          { label: '20年後', val: fv(monthlyInvest, r5, 20) },
          { label: '30年後', val: fv(monthlyInvest, r5, 30) },
        ];
        return (
          <Card style={{ marginTop: 20, background: 'linear-gradient(135deg, #EDE8F8 0%, #E8F5F0 100%)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>将来の資産シミュレーション</div>
                <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>毎月 ¥{fmt(monthlyInvest)} 積立 × 年利5%（複利）</div>
              </div>
              <span style={{ fontSize: 18 }}>📈</span>
            </div>
            <div style={{ display: 'flex', gap: 16 }}>
              {rows.map(r => (
                <div key={r.label} style={{ flex: 1, background: 'white', borderRadius: 14, padding: '16px 14px', textAlign: 'center' }}>
                  <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>{r.label}</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: C.invest, fontFeatureSettings: tnum, letterSpacing: '-0.5px' }}>¥{fmt(r.val)}</div>
                  <div style={{ fontSize: 10, color: C.textFaint, marginTop: 3 }}>元本 ¥{fmt(monthlyInvest * (r.label==='10年後'?120:r.label==='20年後'?240:360))}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 12, fontSize: 11, color: C.textFaint, lineHeight: 1.6 }}>※ 参考値。実際の運用利回りは変動します。NISA・iDeCo口座では利益が非課税になります。</div>
          </Card>
        );
      })()}
    </Shell>
  );
}

// ── REPORT ────────────────────────────────────────────────────────────────
function ReportScreen({ go }) {
  const allTxns = Store.get('transactions', []);
  const today = new Date();
  const months = Array.from({length: 6}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - 5 + i, 1);
    const ym = d.toISOString().slice(0,7);
    const mTxns = allTxns.filter(t => t.date && t.date.startsWith(ym));
    const inc = mTxns.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
    const exp = mTxns.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
    return { label: `${d.getMonth()+1}月`, rawInc: inc, rawExp: exp, isCurrent: i === 5 };
  });
  const maxVal = Math.max(...months.map(m => Math.max(m.rawInc, m.rawExp)), 1);
  const chartH = 100;
  const scale = v => Math.round(v / maxVal * chartH);

  const currYm = TODAY.slice(0,7);
  const currTxns = allTxns.filter(t => t.date && t.date.startsWith(currYm));
  const thisInc = currTxns.filter(t => t.type==='income').reduce((s,t)=>s+t.amount, 0);
  const thisExp = currTxns.filter(t => t.type==='expense').reduce((s,t)=>s+t.amount, 0);
  const savingsRate = thisInc > 0 ? ((thisInc - thisExp) / thisInc * 100).toFixed(1) : '0.0';

  const prevYm = new Date(today.getFullYear(), today.getMonth()-1, 1).toISOString().slice(0,7);
  const prevTxns = allTxns.filter(t => t.date && t.date.startsWith(prevYm));
  const prevInc = prevTxns.filter(t => t.type==='income').reduce((s,t)=>s+t.amount, 0);
  const prevExp = prevTxns.filter(t => t.type==='expense').reduce((s,t)=>s+t.amount, 0);

  const byCat = {};
  currTxns.filter(t => t.type==='expense').forEach(t => { byCat[t.category] = (byCat[t.category]||0) + t.amount; });
  const ranking = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([name,amt],i) => ({ rank:i+1, name, amt }));

  const mom = [
    { label:'収入',    prevAmt: prevInc, currAmt: thisInc },
    { label:'支出',    prevAmt: prevExp, currAmt: thisExp },
  ].map(r => {
    const diff = r.currAmt - r.prevAmt;
    const positive = r.label === '収入' ? diff >= 0 : diff <= 0;
    return { ...r, diff, positive, diffStr: (diff >= 0 ? '+' : '') + `¥${fmt(Math.abs(diff))}` };
  });

  const summary = [
    { label:'収入',   value:`¥${fmt(thisInc)}`, color: C.primary, sub:'今月確定' },
    { label:'支出',   value:`¥${fmt(thisExp)}`, color: C.text,    sub:'今月合計' },
    { label:'貯蓄率', value:`${savingsRate}%`,  color: C.invest,  sub:'税引き前' },
  ];

  return (
    <Shell active="report" go={go} title="月次レポート" subtitle={`${today.getMonth()+1}月の収支サマリー`} actions={<MonthPill />}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 20 }}>
        {summary.map(s => (
          <Card key={s.label} hover>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 8 }}>{s.label}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: s.color, letterSpacing: '-1px', fontFeatureSettings: tnum }}>{s.value}</div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>{s.sub}</div>
          </Card>
        ))}
      </div>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>6ヶ月の収支推移</div>
          <div style={{ display: 'flex', gap: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}><div style={{ width: 11, height: 11, borderRadius: 3, background: C.primary }} /><span style={{ fontSize: 12, color: C.textMuted }}>収入</span></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}><div style={{ width: 11, height: 11, borderRadius: 3, background: C.info }} /><span style={{ fontSize: 12, color: C.textMuted }}>支出</span></div>
          </div>
        </div>
        <svg viewBox="0 0 348 150" style={{ width: '100%', maxHeight: 260, overflow: 'visible' }}>
          {[10, 43, 77].map(y => <line key={y} x1="0" y1={y} x2="348" y2={y} stroke={C.bgCard} strokeWidth="1"/>)}
          <line x1="0" y1="110" x2="348" y2="110" stroke={C.border} strokeWidth="1.2"/>
          {months.map((d, i) => {
            const ih = scale(d.rawInc), eh = scale(d.rawExp);
            return (
              <g key={d.label}>
                <rect x={i*58+6}  y={110-ih} width="20" height={ih} rx="4" fill={C.primary} opacity={d.isCurrent ? 1 : 0.7}/>
                <rect x={i*58+29} y={110-eh} width="20" height={eh} rx="4" fill={C.info}    opacity={d.isCurrent ? 1 : 0.7}/>
                <text x={i*58+24} y="128" textAnchor="middle" fontSize="10" fill={d.isCurrent ? C.text : C.textFaint} fontWeight={d.isCurrent ? '700' : '400'} fontFamily="sans-serif">{d.label}</text>
              </g>
            );
          })}
        </svg>
      </Card>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, alignItems: 'start' }}>
        <Card>
          <SectionTitle>支出カテゴリ Top4</SectionTitle>
          {ranking.length === 0 ? (
            <div style={{ textAlign:'center', padding:'24px 0', color:C.textFaint, fontSize:13 }}>まだ支出がありません</div>
          ) : ranking.map(r => (
            <div key={r.rank} style={{ display: 'flex', alignItems: 'center', gap: 13, marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.textMuted, width: 18 }}>{r.rank}</div>
              <div style={{ width: 10, height: 10, borderRadius: 3, background: C.info }} />
              <div style={{ flex: 1, fontSize: 14, color: C.text, fontWeight: 500 }}>{r.name}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.text, fontFeatureSettings: tnum }}>¥{fmt(r.amt)}</div>
            </div>
          ))}
        </Card>
        <Card>
          <SectionTitle>前月比較</SectionTitle>
          {mom.map((r, i) => (
            <div key={r.label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingBottom: i < 1 ? 13 : 0, borderBottom: i < 1 ? `1px solid ${C.bgCard}` : 'none', marginBottom: i < 1 ? 13 : 0 }}>
              <span style={{ fontSize: 14, color: C.textMed }}>{r.label}</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 12, color: C.textMuted, fontFeatureSettings: tnum }}>前月 ¥{fmt(r.prevAmt)}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: r.positive ? C.primary : C.warning, fontFeatureSettings: tnum }}>{r.diffStr}</span>
              </div>
            </div>
          ))}
        </Card>
      </div>
    </Shell>
  );
}

    Store.get('transactions',[]).filter(t=>t.source==='fixed'&&t.date&&t.date.startsWith(thisMonthStr())).map(t=>t.fixedId)
  ));

  const save = () => {
    if (!form.name || !form.amount) return;
    const next = [...items, { id: Date.now(), ...form, amount: Number(form.amount), active: true }];
    setItems(next); Store.set('fixedExpenses', next);
    setForm({ name: '', amount: '', cat: 'rent', payment: 'カード', day: '毎月1日' });
    setShowForm(false);
  };
  const toggle = id => { const n = items.map(i => i.id === id ? {...i, active: !i.active} : i); setItems(n); Store.set('fixedExpenses', n); };
  const remove = id => { const n = items.filter(i => i.id !== id); setItems(n); Store.set('fixedExpenses', n); };

    const toReg = items.filter(i => i.active && !regSet.has(i.id));

      id: Date.now() + idx, type: 'expense', amount: item.amount, category: 'その他',
      division: '生活費', payment: item.payment, memo: item.name,
      date: TODAY, source: 'fixed', fixedId: item.id,

    Store.set('transactions', [...existing, ...newTxns]);
    setRegSet(new Set([...regSet, ...toReg.map(i => i.id)]));
  };

                <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
                  <button onClick={save} style={{ flex: 1, background: C.primary, color: 'white', borderRadius: 10, padding: '11px', fontSize: 13, fontWeight: 700, border: 'none', cursor: 'pointer' }}>保存</button>
                  <button onClick={() => setShowForm(false)} style={{ flex: 1, background: C.bg, color: C.textMuted, borderRadius: 10, padding: '11px', fontSize: 13, border: 'none', cursor: 'pointer' }}>キャンセル</button>
                </div>
              </div>
            </Card>
          )}

          {catGroups.length > 0 && (
            <Card>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.textMuted, marginBottom: 14 }}>カテゴリ別</div>
              {catGroups.map(c => {
                const amt = c.items.filter(i=>i.active).reduce((s,i)=>s+i.amount,0);
                return (
                  <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
                    <span style={{ fontSize: 16 }}>{c.emoji}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, color: C.text, fontWeight: 600 }}>{c.name}</div>
                      <div style={{ fontSize: 11, color: C.textMuted }}>{c.items.filter(i=>i.active).length}件</div>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.text, fontFeatureSettings: tnum }}>¥{fmt(amt)}</div>
                  </div>
                );
              })}
            </Card>
          )}
        </div>

        {/* Right: list */}
        <Card>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>固定費一覧</div>
          {items.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '48px 0', color: C.textFaint, fontSize: 13, lineHeight: 2 }}>
              固定費がまだありません<br/>「固定費を追加」から入力してください
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {items.map(item => {
                const cat = FIXED_CATS.find(c => c.id === item.cat) || FIXED_CATS[5];
                const registered = regSet.has(item.id);
                return (
                  <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', background: item.active ? C.bg : '#F5F5F5', borderRadius: 14, opacity: item.active ? 1 : 0.6 }}>
                    <div style={{ width: 38, height: 38, background: item.active ? cat.color : '#CCC', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 17, flexShrink: 0 }}>{cat.emoji}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{item.name}</div>
                      <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{cat.name} · {item.day} · {item.payment}</div>
                    </div>
                    {item.active && registered && <span style={{ fontSize: 10, fontWeight: 700, color: C.primary, background: C.primaryLight, borderRadius: 6, padding: '2px 7px', flexShrink: 0 }}>今月登録済</span>}
                    <div style={{ fontSize: 16, fontWeight: 700, color: item.active ? C.text : C.textMuted, fontFeatureSettings: tnum, flexShrink: 0 }}>¥{fmt(item.amount)}</div>
                    <button onClick={() => toggle(item.id)} style={{ width: 42, height: 24, borderRadius: 12, background: item.active ? C.primary : C.border, position: 'relative', flexShrink: 0, border: 'none', cursor: 'pointer', transition: 'background .2s' }}>
                      <div style={{ width: 18, height: 18, background: 'white', borderRadius: '50%', position: 'absolute', top: 3, left: item.active ? 21 : 3, transition: 'left .2s', boxShadow: '0 1px 4px rgba(0,0,0,0.2)' }} />
                    </button>
                    <button onClick={() => remove(item.id)} style={{ width: 30, height: 30, borderRadius: 8, background: '#FEE2E2', color: '#DC2626', fontSize: 15, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: 'none', cursor: 'pointer' }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
          {items.length > 0 && (
            <div style={{ marginTop: 16, padding: '14px 16px', background: C.primaryLight, borderRadius: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: C.primary }}>有効な固定費の合計</span>
              <span style={{ fontSize: 18, fontWeight: 700, color: C.primary, fontFeatureSettings: tnum }}>¥{fmt(activeTotal)}</span>
            </div>
          )}
        </Card>
      </div>
    </Shell>
  );
}

// ── Login screen ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  useEffect(() => {
    const init = () => {
      if (!window.google) { setTimeout(init, 200); return; }
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: ({ credential }) => {
          const p = parseJwt(credential);
          onLogin({ name: p.name, email: p.email, picture: p.picture });
        }
      });
      google.accounts.id.renderButton(document.getElementById('g-btn'), {
        theme: 'outline', size: 'large', width: 280, locale: 'ja'
      });
    };
    init();
  }, []);

  return (
    <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ background: 'white', borderRadius: 28, padding: '56px 48px', maxWidth: 460, width: '90%', boxShadow: '0 24px 72px rgba(0,0,0,0.13)', textAlign: 'center' }}>
        <div style={{ width: 88, height: 88, borderRadius: 20, overflow: 'hidden', margin: '0 auto 28px', boxShadow: '0 8px 24px rgba(9,125,96,0.15)' }}>
          <img src="logo.png" alt="logo" style={{ width: '115%', height: '115%', margin: '-7.5%', display: 'block' }} />
        </div>
        <div style={{ fontSize: 28, fontWeight: 700, color: C.text, marginBottom: 10 }}>自由人家計簿</div>
        <div style={{ fontSize: 15, color: C.textMuted, lineHeight: 1.7, marginBottom: 44 }}>自由になるために、<br/>まず家計管理から。</div>
        <div id="g-btn" style={{ display: 'flex', justifyContent: 'center', marginBottom: 28 }} />
        <div style={{ fontSize: 12, color: C.textFaint }}>ログインすることでプライバシーポリシーと利用規約に同意します</div>
      </div>
    </div>
  );
}

// ── App router ───────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('gUser') || 'null'));
  const [screen, setScreen] = useState(new URLSearchParams(location.search).get('screen') || 'home');
  const go = useCallback(s => { setScreen(s); window.scrollTo(0, 0); }, []);

  if (!user) return <LoginScreen onLogin={u => {
    localStorage.setItem('gUser', JSON.stringify(u));
    setUser(u);
    if (!Store.get('settings').onboardingDone) setScreen('usertype');
  }} />;

  const onLogout = () => {
    localStorage.removeItem('gUser');
    Store.set('settings', {});
    if (window.google) google.accounts.id.disableAutoSelect();
    setUser(null);
  };

  if (screen === 'usertype') return <UserTypeScreen onSelect={type => {
    Store.set('settings', { ...Store.get('settings'), userType: type, onboardingDone: true });
    go('home');
  }} />;

  switch (screen) {
    case 'input':    return <InputScreen    go={go} />;
    case 'business': return <BusinessScreen go={go} />;
    case 'budget':   return <BudgetScreen   go={go} />;
    case 'tax':      return <TaxScreen      go={go} />;
    case 'report':   return <ReportScreen   go={go} />;
    case 'networth': return <NetWorthScreen    go={go} />;
    case 'fixed':    return <FixedExpensesScreen go={go} />;
    case 'settings': return <SettingsScreen go={go} user={user} onLogout={onLogout} />;
    default:         return <HomeScreen     go={go} />;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
