const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DB = {
  userId: null,
  timer: null,
  async init(userId) {
    this.userId = userId;
    try {
      const { data } = await sb.from('user_data').select('store').eq('user_id', userId).single();
      if (data?.store) {
        Object.entries(data.store).forEach(([k, v]) => { if (v != null) localStorage.setItem(k, JSON.stringify(v)); });
      }
    } catch(e) {}
  },
  schedule() {
    clearTimeout(this.timer);
    this.timer = setTimeout(() => this.flush(), 1500);
  },
  async flush() {
    if (!this.userId) return;
    const store = {};
    ['transactions','fixedExpenses','budgets','networth','settings','cards'].forEach(k => {
      try { const v = localStorage.getItem(k); if (v) store[k] = JSON.parse(v); } catch(e) {}
    });
    try { await sb.from('user_data').upsert({ user_id: this.userId, store, updated_at: new Date().toISOString() }); } catch(e) {}
  }
};

const Store = {
  get: (key, def={}) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => { localStorage.setItem(key, JSON.stringify(val)); DB.schedule(); },
};

function triggerBackupDownload() {
  const data = {};
  ['transactions','fixedExpenses','budgets','networth','settings','cards'].forEach(k => {
    try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jiyujin-auto-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('lastAutoBackup', String(Date.now()));
}

function autoBackupCheck() {
  const s = Store.get('settings', {});
  if (!s.autoBackup) return;
  const txns = Store.get('transactions', []);
  if (!txns.length) return;
  const last = parseInt(localStorage.getItem('lastAutoBackup') || '0');
  const msDay = 86400000;
  const threshold = s.autoBackupInterval === 'weekly' ? 7 * msDay : msDay;
  if (Date.now() - last >= threshold) triggerBackupDownload();
}

const MonthCtx = React.createContext({ selYm: TODAY.slice(0,7), setSelYm: ()=>{} });

function MonthPill() {
  const { selYm, setSelYm } = React.useContext(MonthCtx);
  const [y, m] = selYm.split('-').map(Number);
  const prev = () => {
    const d = new Date(y, m - 2, 1);
    setSelYm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  };
  const next = () => {
    const d = new Date(y, m, 1);
    const nxt = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (nxt <= TODAY.slice(0,7)) setSelYm(nxt);
  };
  const isLatest = selYm >= TODAY.slice(0,7);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'white', borderRadius: 12, padding: '9px 14px', boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
      <button onClick={prev} style={{ display: 'flex', background: 'none', border: 'none', cursor: 'pointer', padding: 2 }}><svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M8 2L3 6L8 10" stroke={C.textMed} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
      <span style={{ fontSize: 13, fontWeight: 700, color: C.text, minWidth: 68, textAlign: 'center' }}>{y}年{m}月</span>
      <button onClick={next} disabled={isLatest} style={{ display: 'flex', background: 'none', border: 'none', cursor: isLatest ? 'default' : 'pointer', opacity: isLatest ? 0.25 : 1, padding: 2 }}><svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M4 2L9 6L4 10" stroke={C.textFaint} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
    </div>
  );
}

function guessCategory(name) {
  if (!name) return 'その他';
  const up = name.toUpperCase();
  for (const rule of CLASSIFY_RULES) {
    if (rule.keys.some(k => up.includes(k.toUpperCase()))) return rule.cat;
  }
  return 'その他';
}
function parseCSVText(text) {
  const lines = text.replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  return lines.filter(l => l.trim()).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur=''; }
      else cur += ch;
    }
    cols.push(cur.trim()); return cols;
  });
}
function normDate(str) {
  if (!str) return '';
  const s = str.replace(/年/,'-').replace(/月/,'-').replace(/日/,'').replace(/\//g,'-').trim().slice(0,10);
  if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)) { const [y,m,d]=s.split('-'); return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  if (/^\d{1,2}-\d{1,2}$/.test(s)) { const [m,d]=s.split('-'); return `${TODAY.slice(0,4)}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  return '';
}
function normAmt(str) { const n=parseInt(String(str||'').replace(/[^0-9]/g,'')); return isNaN(n)?0:n; }
function rawAmt(str) { const s=String(str||'').trim(); const n=parseInt(s.replace(/[^0-9]/g,'')); return isNaN(n)?0:(s.startsWith('-')?-n:n); }
function detectCSVFormat(rows) {
  for (let i=0; i<Math.min(rows.length,10); i++) {
    const h = rows[i].join(',');
    if (h.includes('利用日')||h.includes('ご利用')) return { fmt:'vpass', headerIdx:i };
    if (h.includes('取引日')&&(h.includes('取引先')||h.includes('支払'))) return { fmt:'paypay', headerIdx:i };
    if (h.includes('支払金額')&&h.includes('入金額')) return { fmt:'bank-stmt', headerIdx:i };
  }
  const isDate = s => /^\d{4}\/\d{1,2}\/\d{1,2}$/.test((s||'').trim());
  const isInt  = s => /^\d+$/.test((s||'').trim());
  if (rows.length>0 && isDate(rows[0][0])) return { fmt:'vpass-noheader', headerIdx:-1 };
  if (rows.some(r => isDate(r[0]) && isInt(r[2]))) return { fmt:'vpass-monthly', headerIdx:-1 };
  return { fmt:'generic', headerIdx:0 };
}
function csvRowToTxn(row, headers, fmt, autoClassOn, idx) {
  const hi = k => (headers||[]).findIndex(h=>h.includes(k));
  let date=TODAY, desc='', amount=0, payment='カード';
  if (fmt==='bank-stmt') {
    date=normDate(`${row[0]}/${row[1]}/${row[2]}`); desc=row[7]||'';
    const pay=normAmt(row[8]); const dep=normAmt(row[9]);
    if(pay>0){amount=pay;}
    else if(dep>0){return{tempId:idx,date,memo:desc,category:autoClassOn?guessCategory(desc):'その他',amount:dep,type:'income',division:'事業収入',payment:'振込'};}
    else return null;
  } else if (fmt==='vpass-monthly') {
    if(!/^\d{4}\/\d{1,2}\/\d{1,2}$/.test((row[0]||'').trim())) return null;
    date=normDate(row[0]); desc=row[1]||'';
    const monthly=normAmt(row[5]); const total=normAmt(row[2]);
    amount=monthly>0?monthly:total;
    if(row[7]) payment=row[7];
  } else if (fmt==='vpass-noheader') {
    date=normDate(row[0]); desc=row[1]||'';
    const a=rawAmt(row[6]); if(a<=0) return null; amount=a;
  } else if (fmt==='vpass') {
    date=normDate(row[hi('利用日')]); desc=row[hi('店名')]||row[hi('商品')]||'';
    const ac=hi('今回払い')>=0?hi('今回払い'):hi('金額'); amount=normAmt(row[ac]);
  } else if (fmt==='paypay') {
    const tv=row[hi('種別')]||''; if(tv&&!tv.includes('支払')&&!tv.includes('決済')) return null;
    date=normDate((row[hi('取引日')]||'').slice(0,10));
    const dc=['取引先名','商品名','内容','摘要','備考','コメント'].map(k=>hi(k)).find(i=>i>=0)??-1;
    desc=dc>=0?row[dc]:row[1]||'';
    const pc=hi('支払金額')>=0?hi('支払金額'):hi('取引金額'); amount=normAmt(row[pc]);
  } else {
    const dc=hi('日付')>=0?hi('日付'):hi('日')>=0?hi('日'):0;
    const ac=headers.findIndex(h=>/金額|amount/i.test(h));
    const nc=headers.findIndex(h=>/店名|商品|摘要|内容|description|memo/i.test(h));
    date=normDate(row[dc]); desc=nc>=0?row[nc]:row[1]||''; amount=ac>=0?normAmt(row[ac]):0;
  }
  if (!amount||amount<=0) return null;
  if (!date) return null;
  return { tempId:idx, date, memo:desc, category:autoClassOn?guessCategory(desc):'その他', amount, type:'expense', division:(fmt==='paypay'||fmt==='bank-stmt')?'事業費':'生活費', payment };
}

function CsvImportPanel({ onImported }) {

  const cardNames = [...new Set(preview.map(r => r.payment || 'カード'))];

  const allVisible = visibleIdxs.length > 0 && visibleIdxs.every(i => selected.has(i));
  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const handleFile = e => {
    const file = e.target.files[0]; if (!file) return;
    showToast('読み込み中...');

    const tryProcess = (text) => {
      try {
        const rows = parseCSVText(text);
        if (rows.length < 1) return false;
        const { fmt: det, headerIdx } = detectCSVFormat(rows);
        const useFmt = csvFmt==='auto' ? det : csvFmt;
        const headers = headerIdx >= 0 ? rows[headerIdx] : [];
        let dataRows = headerIdx >= 0 ? rows.slice(headerIdx+1) : rows;
        if (useFmt === 'vpass-monthly') {
          let card = 'カード';
          const enriched = [];
          for (const row of dataRows) {
            if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test((row[0]||'').trim())) {
              enriched.push([...row, card]);
            } else if (row.some(Boolean)) {

              if (c) card = c;
            }
          }
          dataRows = enriched;
        }
        const txns = dataRows.map((r,i)=>csvRowToTxn(r,headers,useFmt,autoClass,i)).filter(Boolean);
        if (!txns.length) return false;
        setPreview(txns); setSelected(new Set(txns.map((_,i)=>i))); setStep('preview');
        return true;
      } catch { return false; }
    };

    const reader = new FileReader();
    reader.onload = ev => {
      const buf = ev.target.result;
      let ok = false;
      try { ok = tryProcess(new TextDecoder('UTF-8',{fatal:true}).decode(buf)); } catch {}
      if (ok) return;
      try { ok = tryProcess(new TextDecoder('Shift_JIS',{fatal:false}).decode(buf)); } catch {}
      if (ok) return;

  );

  return (

      {showCardFilter && (
        <div style={{ display:'flex', gap:6, marginBottom:10, flexWrap:'wrap' }}>
          {['all', ...cardNames].map(c => (
            <button key={c} onClick={()=>setCardFilter(c)} style={{ background:cardFilter===c?C.primary:'white', color:cardFilter===c?'white':C.textMuted, borderRadius:999, padding:'5px 12px', fontSize:11, fontWeight:cardFilter===c?700:500, border:`1.5px solid ${cardFilter===c?C.primary:C.border}`, cursor:'pointer', whiteSpace:'nowrap' }}>
              {c==='all'?`すべて（${preview.length}件）`:c}

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>

          </div>

function exportToFreee(expenses, income, ym) {
  const ACCOUNT_MAP = {
    '材料費':     '材料費',
    '機材・ソフト':'消耗品費',
    '出店料':     '地代家賃',
    '交際費':     '交際費',
    '教育・学習': '研修費',
    '交通費':     '旅費交通費',
    '通信費':     '通信費',
    '食費':       '会議費',
    '外食':       '会議費',
    '日用品':     '消耗品費',
    '美容・衣服': '消耗品費',
    '医療・健康': '福利厚生費',
    '趣味・娯楽': '雑費',
    'その他':     '雑費',
  };
  const rows = [['取引日','収支区分','勘定科目','取引先','品目','税区分','金額（税込）','備考']];
  income.forEach(t => rows.push([t.date,'収入','売上高','',t.memo||t.category||'','課税10%',t.amount,t.memo||'']));
  expenses.forEach(t => rows.push([t.date,'支出',ACCOUNT_MAP[t.category]||'雑費','',t.category||'','課税10%',t.amount,t.memo||'']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `freee_${ym}.csv`; a.click();
  URL.revokeObjectURL(url);
}

                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>

}

// ── HOME (dashboard) ────────────────────────────────────────────────────────
function HomeScreen({ go }) {
  const { selYm } = React.useContext(MonthCtx);
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const isBiz = userType !== 'employee';
  const settingsIncome = (s.salary||0) + (s.sideIncome||0) + (s.income||0);
  const taxRate = s.taxRate || (userType === 'employee' ? 0 : 20);
  const savingsGoal = s.savingsGoal || 0;
  const today = new Date();
  const [selY, selM] = selYm.split('-').map(Number);
  const isCurrentMonth = selYm === TODAY.slice(0,7);
  const daysInMonth = new Date(selY, selM, 0).getDate();
  const daysLeft = isCurrentMonth ? daysInMonth - today.getDate() : 0;
  const daysSoFar = isCurrentMonth ? today.getDate() : daysInMonth;
  const fixedTotal = Store.get('fixedExpenses',[]).filter(i=>i.active&&i.cycle!=='yearly').reduce((s,i)=>s+i.amount,0);

  const allTxns = Store.get('transactions',[]);
  const mTxns = allTxns.filter(t=>t.date&&t.date.startsWith(selYm));

  const confirmedIncome = mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const displayIncome = settingsIncome || confirmedIncome;

  const lifeSpent   = sumDiv(mTxns, '生活費');
  const bizSpent    = sumDiv(mTxns, '事業費');
  const taxSaved    = sumDiv(mTxns, '税金');
  const investSaved = sumDiv(mTxns, '投資');
  const totalSpent  = mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const bdg = Store.get('budgets', {});
  const lifeBudget  = bdg['生活費']  || 0;
  const bizBudget   = bdg['事業費']  || 0;
  const taxGoal     = bdg['税金積立'] || (displayIncome > 0 ? Math.round(displayIncome * taxRate / 100) : 0);
  const investGoal  = bdg['投資']    || savingsGoal;
  const totalBudget = lifeBudget + bizBudget + taxGoal + investGoal;

  const taxShortfall = Math.max(0, taxGoal - taxSaved);
  const taxSurplus   = Math.max(0, taxSaved - taxGoal);

  const lifeBizBudget = lifeBudget + bizBudget || Math.max(0, displayIncome - taxGoal - investGoal - fixedTotal);
  const lifeBizSpent  = lifeSpent + bizSpent;
  const lifeBizLeft   = Math.max(0, lifeBizBudget - lifeBizSpent);
  const dailyBudget   = daysLeft > 0 ? Math.round(lifeBizLeft / daysLeft) : 0;
  const lifeLeft      = Math.max(0, lifeBudget - lifeSpent);
  const bizLeft       = Math.max(0, bizBudget  - bizSpent);

  const dailyRate = daysSoFar > 0 ? lifeBizSpent / daysSoFar : 0;
  const projected = dailyRate * daysInMonth;
  const monthEndBalance = displayIncome - projected - taxGoal - investGoal - fixedTotal;

  const nwData = Store.get('networth', { assets: [], liabilities: [] });
  const totalAssets = (nwData.assets||[]).reduce((s,a)=>s+a.amount,0);
  const totalLiab = (nwData.liabilities||[]).reduce((s,l)=>s+l.amount,0);
  const netWorth = totalAssets - totalLiab;
  const matchAssets = (kw) => (nwData.assets||[]).filter(a=>kw.some(k=>(a.name||'').includes(k)||(a.category||'').includes(k))).reduce((s,a)=>s+a.amount,0);
  const cashAmt   = matchAssets(['現金','預金','銀行','口座']);
  const investAmt = matchAssets(['NISA','投資','株','信託','iDeCo','積立']);
  const bizAmt    = matchAssets(['事業','法人','ビジネス']);
  const otherAmt  = Math.max(0, totalAssets - cashAmt - investAmt - bizAmt);

  const recentTxns = allTxns.filter(t=>t.date&&t.date.startsWith(selYm)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  const monthLabel = `${selM}月`;
  const dateLabel = `${selY}年${selM}月` + (isCurrentMonth ? ` · ${today.getDate()}日現在` : '');

  const spendPct = lifeBizBudget > 0 ? Math.round(lifeBizSpent/lifeBizBudget*100) : 0;
  const advisoryBad = spendPct >= 90 || taxShortfall > 0;
  let advisory = '';
  if (totalSpent === 0) advisory = 'まだ今月の記録がありません。支出・収入を入力してみましょう。';
  else if (spendPct >= 90) advisory = `消費枠の${spendPct}%を使用。残り${daysLeft}日で¥${fmt(lifeBizLeft)}です。`;
  else if (taxShortfall > 0 && taxGoal > 0) advisory = `税金積立が¥${fmt(taxShortfall)}不足しています。今月中に積立を。`;
  else if (spendPct <= 60 && daysLeft < 15) advisory = `消費ペースは良好（${spendPct}%）。このペースをキープ！`;
  else advisory = `${monthLabel}の家計は順調です。このペースをキープしましょう。`;

  return (
    <Shell active="home" go={go} title={`${monthLabel}の家計`} subtitle={dateLabel} actions={<><MonthPill /><AddButton go={go} /></>}>

      {/* ── ① 結論バー ── */}
      <div style={{ background:'linear-gradient(135deg, #1D2A22 0%, #0B1F17 100%)', borderRadius:22, padding:'28px 32px', marginBottom:20, position:'relative', overflow:'hidden', display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr', gap:24, alignItems:'center' }}>
        <div style={{ position:'absolute', right:-60, top:-60, width:220, height:220, background:'rgba(9,125,96,0.12)', borderRadius:'50%', pointerEvents:'none' }} />
        <div>
          {isBiz ? (
            <>
              <div style={{ fontSize:12, fontWeight:600, color:'rgba(255,255,255,0.45)', marginBottom:10, letterSpacing:'0.02em' }}>今月あと使える金額</div>
              <div style={{ display:'flex', gap:10, marginBottom:8 }}>
                <div style={{ flex:1, background:'rgba(255,255,255,0.07)', borderRadius:12, padding:'12px 16px' }}>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,0.42)', marginBottom:4 }}>🏠 生活費あと</div>
                  <div style={{ fontSize:28, fontWeight:700, color: lifeLeft > 0 ? '#A8E6CF' : '#f87171', fontFeatureSettings:tnum, letterSpacing:'-1px' }}>¥{fmt(lifeLeft)}</div>
                </div>
                <div style={{ flex:1, background:'rgba(255,255,255,0.07)', borderRadius:12, padding:'12px 16px' }}>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,0.42)', marginBottom:4 }}>💼 事業費あと</div>
                  <div style={{ fontSize:28, fontWeight:700, color: bizLeft > 0 ? '#6EDBB8' : '#f87171', fontFeatureSettings:tnum, letterSpacing:'-1px' }}>¥{fmt(bizLeft)}</div>
                </div>
              </div>
              <div style={{ fontSize:12, color:'rgba(255,255,255,0.35)', marginBottom:8 }}>残り{daysLeft}日 · 1日あたり ¥{fmt(dailyBudget)} ペース</div>
            </>
          ) : (
            <>
              <div style={{ fontSize:12, fontWeight:600, color:'rgba(255,255,255,0.45)', marginBottom:4, letterSpacing:'0.02em' }}>今月あと使える金額</div>
              <div style={{ display:'flex', alignItems:'baseline', gap:7, marginBottom:6 }}>
                <span style={{ fontSize:64, fontWeight:700, color: lifeBizLeft > 0 ? 'white' : '#f87171', letterSpacing:'-3px', fontFeatureSettings:tnum, lineHeight:1 }}>¥{fmt(lifeBizLeft)}</span>
              </div>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.35)', marginBottom:8 }}>残り{daysLeft}日 · 1日あたり ¥{fmt(dailyBudget)} ペース</div>
            </>
          )}
          {(settingsIncome > 0 || confirmedIncome > 0) && (
            <div style={{ display:'flex', gap:12, fontSize:12 }}>
              <span style={{ color:'rgba(255,255,255,0.35)' }}>確定 <span style={{ color:'rgba(255,255,255,0.72)', fontFeatureSettings:tnum, fontWeight:600 }}>¥{fmt(confirmedIncome)}</span></span>
              {settingsIncome > 0 && settingsIncome !== confirmedIncome && (
                <span style={{ color:'rgba(255,255,255,0.3)' }}>見込み <span style={{ color:'rgba(255,255,255,0.5)', fontFeatureSettings:tnum }}>¥{fmt(settingsIncome)}</span></span>
              )}
            </div>
          )}
        </div>
        <div style={{ background:'rgba(255,255,255,0.08)', borderRadius:14, padding:'16px 20px' }}>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)', marginBottom:5 }}>月末残り予測</div>
          <div style={{ fontSize:28, fontWeight:700, fontFeatureSettings:tnum, color: monthEndBalance >= 0 ? '#4ade80' : '#f87171', letterSpacing:'-1px' }}>
            {monthEndBalance >= 0 ? '+' : '-'}¥{fmt(Math.abs(monthEndBalance))}
          </div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.3)', marginTop:4 }}>残り{daysLeft}日の予測</div>
        </div>
        <div style={{ background: taxShortfall > 0 ? 'rgba(200,116,142,0.18)' : 'rgba(255,255,255,0.08)', borderRadius:14, padding:'16px 20px', border: taxShortfall > 0 ? '1px solid rgba(200,116,142,0.3)' : 'none' }}>
          <div style={{ fontSize:11, color: taxShortfall > 0 ? 'rgba(249,168,174,0.65)' : 'rgba(255,255,255,0.4)', marginBottom:5 }}>税金積立</div>
          <div style={{ fontSize:28, fontWeight:700, fontFeatureSettings:tnum, color: taxShortfall > 0 ? '#f9a8ae' : '#4ade80', letterSpacing:'-1px' }}>
            {taxGoal === 0 ? '未設定' : taxShortfall > 0 ? `-¥${fmt(taxShortfall)}` : `+¥${fmt(taxSurplus)}`}
          </div>
          <div style={{ fontSize:11, color: taxShortfall > 0 ? 'rgba(249,168,174,0.5)' : 'rgba(255,255,255,0.3)', marginTop:4 }}>
            {taxGoal > 0 ? (taxShortfall > 0 ? '不足しています' : '余剰') : '予算を設定してください'}
          </div>
        </div>
      </div>

      {/* ── メイングリッド ── */}
      <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:20, alignItems:'start' }}>

        {/* ② 統合サマリー */}
        <Card>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
            <div>
              <div style={{ fontSize:16, fontWeight:700, color:C.text }}>今月の消費（生活 + 事業）</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:26, fontWeight:700, color:C.text, fontFeatureSettings:tnum, letterSpacing:'-1px' }}>¥{fmt(totalSpent)}</div>
              {totalBudget > 0 && <div style={{ fontSize:12, color:C.textMuted, fontFeatureSettings:tnum }}>予算 ¥{fmt(totalBudget)}</div>}
            </div>
          </div>

          {totalBudget > 0 && (
            <div style={{ marginBottom:20 }}>
              <div style={{ background:C.bgCard, borderRadius:5, height:10, overflow:'hidden', display:'flex', marginBottom:6 }}>
                {[{a:lifeSpent,c:C.info},{a:bizSpent,c:C.primary},{a:taxSaved,c:C.warning},{a:investSaved,c:C.invest}].map((seg,i) => {
                  const w = Math.min(98, Math.round(seg.a/totalBudget*100));
                  return w > 0 ? <div key={i} style={{ width:`${w}%`, background:seg.c, height:'100%' }} /> : null;
                })}
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:C.textFaint }}>
                <span>{Math.min(100, Math.round(totalSpent/totalBudget*100))}%消費</span>

              { label:'📈 投資',     color:C.invest,  spent:investSaved, budget:investGoal },
            ].map(item => {
              const pct = item.budget > 0 ? Math.min(100, Math.round(item.spent/item.budget*100)) : 0;

              return (
                <div key={item.label}>

                    <span style={{ fontSize:13, fontWeight:600, color:C.textMed }}>{item.label}</span>

          {totalBudget === 0 && (
            <button onClick={() => go('budget')} style={{ width:'100%', marginTop:16, padding:'13px', background:C.primaryLight, color:C.primary, border:'none', borderRadius:12, fontSize:14, fontWeight:700, cursor:'pointer' }}>

            </button>

        </Card>

        {/* 右カラム: advisory + recent + assets */}

            </div>
          )}

          {/* Advisory */}
          <div style={{ background:advisoryBad?C.warningBg:C.primaryLight, borderRadius:16, padding:'16px 20px', borderLeft:`4px solid ${advisoryBad?C.warning:C.primary}` }}>
            <div style={{ fontSize:13, fontWeight:700, color:advisoryBad?C.warning:C.primary, marginBottom:6 }}>{advisoryBad ? '⚠ 注意' : '✓ 状況'}</div>
            <div style={{ fontSize:13, color:C.textMed, lineHeight:1.8 }}>{advisory}</div>
          </div>

          {/* Recent transactions */}
          <Card>
            <SectionTitle>最近の記録</SectionTitle>
            {recentTxns.length === 0 ? (
              <div style={{ textAlign:'center', padding:'20px 0', color:C.textFaint, fontSize:13 }}>まだ記録がありません</div>
            ) : recentTxns.map(r => (
              <div key={r.id} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <span style={{ fontSize:18 }}>{r.type==='income'?'💰':(CAT_EMOJI[r.category]||'📋')}</span>
                <div style={{ flex:1, minWidth:0 }}>

                  <div style={{ fontSize:11, color:C.textMuted }}>{r.division||r.category} · {r.date}</div>
                  {r.payment && <div style={{ marginTop:2 }}><CardBadge name={r.payment} /></div>}
                </div>
                <div style={{ fontSize:13, fontWeight:700, color:r.type==='income'?C.primary:C.text, fontFeatureSettings:tnum, whiteSpace:'nowrap' }}>{r.type==='income'?'+':'-'}¥{fmt(r.amount)}</div>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* ── ③ 資産 ── */}
      <div style={{ marginTop:20 }}>
        <SectionTitle right={totalAssets > 0 ? <button onClick={() => go('networth')} style={{ fontSize:12, color:C.primary, fontWeight:600, background:'none', border:'none', cursor:'pointer' }}>詳細 →</button> : null}>資産の状況</SectionTitle>
        {totalAssets > 0 ? (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:14 }}>

              <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', marginBottom:6 }}>総資産</div>
              <div style={{ fontSize:22, fontWeight:700, color:'white', fontFeatureSettings:tnum, letterSpacing:'-0.8px' }}>¥{fmt(totalAssets)}</div>
              <div style={{ fontSize:11, color:'rgba(255,255,255,0.35)', marginTop:4 }}>純資産 ¥{fmt(netWorth)}</div>
            </Card>
            {[
              { label:'現金・預金', amt:cashAmt,   icon:'💴' },
              { label:'NISA・投資', amt:investAmt, icon:'📈' },
              { label:'事業資金',   amt:bizAmt,    icon:'💼' },
              { label:'その他',     amt:otherAmt,  icon:'🏦' },
            ].map(item => (
              <Card hover key={item.label}>
                <div style={{ fontSize:12, color:C.textMuted, marginBottom:8 }}>{item.icon} {item.label}</div>
                <div style={{ fontSize:20, fontWeight:700, color: item.amt > 0 ? C.text : C.textFaint, fontFeatureSettings:tnum, letterSpacing:'-0.5px' }}>
                  {item.amt > 0 ? `¥${fmt(item.amt)}` : '—'}
                </div>
              </Card>
            ))}

        ) : (
          <button onClick={() => go('networth')} style={{ width:'100%', background:'white', borderRadius:16, padding:'20px', display:'flex', alignItems:'center', gap:14, boxShadow:'0 1px 8px rgba(0,0,0,0.06)', border:`1.5px dashed ${C.border}`, cursor:'pointer' }}>
            <span style={{ fontSize:24 }}>🏦</span>
            <div style={{ textAlign:'left' }}>
              <div style={{ fontSize:14, fontWeight:700, color:C.text }}>資産を登録する</div>
              <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>純資産・NISA・事業資金を可視化して将来を把握する</div>

          </button>
        )}
      </div>

    </Shell>
  );
}

const INVEST_TYPES = ['積立NISA','一般NISA','iDeCo','株式・投資信託','貯蓄・その他'];
const INCOME_PRESETS = ['ハンドメイド','WEBデザイン','ライティング','ネット販売','給与','アルバイト'];
const CARD_PALETTE = ['#097D60','#6366f1','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6'];
const DEFAULT_CARDS = [
  { id: 'card-def', name: 'カード', last4: '' },
  { id: 'cash-def', name: '現金',   last4: '' },
  { id: 'pp-def',   name: 'PayPay', last4: '' },
];
function getCards() {
  const c = Store.get('cards', []);
  if (!c.length) return DEFAULT_CARDS;
  const names = new Set(c.map(x => x.name));
  const extras = [
    { id: 'cash-base', name: '現金',   last4: '' },
    { id: 'pp-base',   name: 'PayPay', last4: '' },
  ].filter(x => !names.has(x.name));
  return [...c, ...extras];
}
function cardColor(cards, name) { const i = cards.findIndex(c=>c.name===name); return i>=0 ? CARD_PALETTE[i%CARD_PALETTE.length] : '#9ca3af'; }
const EXPENSE_CATS = [
  { name:'食費',       emoji:'🛒', group:'life' },

  { name:'機材・ソフト',emoji:'💻', group:'biz'  },

];

              <div style={{ fontSize: 22, fontWeight: 700, color: C.warning, fontFeatureSettings: tnum }}>¥{fmt(tax)}</div>
            </div>
            <div>

            </div>
          </div>
        </div>
      )}

      <Field label="メモ"><input value={memo} onChange={e => setMemo(e.target.value)} placeholder="メモを入力..." style={inputStyle} /></Field>
      <PrimaryBtn onClick={save} style={{ width: '100%' }}>収入を追加する</PrimaryBtn>

  );
}

function TxnEditModal({ txn, onClose, onSaved }) {
  const [amount, setAmount] = useState(String(txn.amount));
  const [memo,   setMemo]   = useState(txn.memo || '');
  const [date,   setDate]   = useState(txn.date || TODAY);
  const [cat,    setCat]    = useState(txn.category || '');
  const [div,    setDiv]    = useState(txn.division || '生活費');
  const [pay,    setPay]    = useState(txn.payment  || getCards()[0]?.name || '');
  const inputStyle = { background: C.bg, borderRadius: 10, padding: '10px 14px', fontSize: 14, color: C.text, border: `1.5px solid ${C.border}`, width: '100%', outline: 'none', boxSizing: 'border-box' };

  const save = () => {
    const n = Number(amount); if (!n) return;
    const all = Store.get('transactions', []);
    Store.set('transactions', all.map(t => t.id === txn.id ? { ...t, amount: n, memo, date, category: cat, division: div, payment: pay } : t));
    onSaved(); onClose();

  const del = () => {
    Store.set('transactions', Store.get('transactions',[]).filter(t=>t.id!==txn.id));

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000 }}>
      <div style={{ background:'white', borderRadius:22, padding:32, width:480, maxWidth:'92vw', maxHeight:'90vh', overflowY:'auto' }}>

          <button onClick={onClose} style={{ width:32, height:32, borderRadius:8, background:C.bg, border:'none', cursor:'pointer', fontSize:18, color:C.textMuted, display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>

                  <button key={d} onClick={()=>setDiv(d)} style={{ flex:1, background:div===d?C.primary:C.bg, color:div===d?'white':C.text, borderRadius:8, padding:'9px 4px', fontSize:12, fontWeight:div===d?700:400, border:'none', cursor:'pointer' }}>{d}</button>
                ))}
              </div>

          )}
          <Field label="日付"><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inputStyle} /></Field>
          {txn.type === 'expense' && (
            <Field label="支払い">
              <select value={pay} onChange={e=>setPay(e.target.value)} style={inputStyle}>

// ── BUDGET ──────────────────────────────────────────────────────────────────
function BudgetScreen({ go }) {
  const { selYm } = React.useContext(MonthCtx);
  const s = Store.get('settings', {});
  const userType = s.userType || 'freelance';
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const defaultTax = Math.round(income * taxRate / 100);
  const [budgets, setBudgets] = useState(() => ({
    '生活費': 0, '事業費': 0, '税金積立': defaultTax, '投資': s.savingsGoal || 0,
    ...Store.get('budgets', {}),
  }));
  const [editKey, setEditKey] = useState(null);
  const [editVal, setEditVal] = useState('');

  const txns = Store.get('transactions',[]).filter(t=>t.date&&t.date.startsWith(selYm));
  const usedMap = {
    '生活費':  sumDiv(txns, '生活費'),
    '事業費':  sumDiv(txns, '事業費'),
    '税金積立': sumDiv(txns, '税金'),
    '投資':    sumDiv(txns, '投資'),
  };

  const cats = [
    { key:'生活費',  name:'生活費',  color:C.info,    icon:'🏠', desc:'食費・交通費など日々の出費' },
    { key:'事業費',  name:userType==='employee'?'特別支出':'事業費', color:C.primary, icon:'💼', desc:'材料費・機材・経費' },
    { key:'税金積立', name:'税金積立', color:C.warning, icon:'📊', desc:`${taxRate}% 積立目標` },
    { key:'投資',    name:userType==='freelance'?'投資':'貯蓄', color:C.invest, icon:'📈', desc:'将来への積立' },
  ];

  const totalBudget = cats.reduce((s,c)=>s+(budgets[c.key]||0), 0);
  const totalUsed   = cats.reduce((s,c)=>s+(usedMap[c.key]||0), 0);
  const unallocated = income - totalBudget;

  const commitEdit = (key) => {
    const next = { ...budgets, [key]: parseInt(editVal)||0 };
    setBudgets(next); Store.set('budgets', next); setEditKey(null);
  };

  const applyPreset = (name) => {
    if (!income) return;
    const tax = taxRate / 100;
    const presets = {
      'バランス型': [0.40, 0.20, tax, 0.10],
      '節税重視':   [0.35, 0.15, tax, 0.20],
      '事業優先':   [0.25, 0.35, tax, 0.10],
    };
    const [r0,r1,r2,r3] = presets[name];
    const next = { '生活費': Math.round(income*r0), '事業費': Math.round(income*r1), '税金積立': Math.round(income*r2), '投資': Math.round(income*r3) };
    setBudgets(next); Store.set('budgets', next);
  };

  return (
    <Shell active="budget" go={go} title="予算管理" subtitle={`今月の収入 ¥${fmt(income)}`} actions={<MonthPill />}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1.6fr', gap:20, alignItems:'start' }}>
        {/* Left: Income + stacked bar + presets */}
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          <Card>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
              <div>
                <div style={{ fontSize:12, fontWeight:600, color:C.textMuted, marginBottom:4 }}>今月の収入</div>
                <div style={{ fontSize:28, fontWeight:700, color:C.text, fontFeatureSettings:tnum }}>¥{fmt(income)}</div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:12, fontWeight:600, color:unallocated>=0?C.primary:C.warning, marginBottom:4 }}>{unallocated>=0?'未配分':'配分超過'}</div>
                <div style={{ fontSize:22, fontWeight:700, color:unallocated>=0?C.primary:C.warning, fontFeatureSettings:tnum }}>
                  {unallocated<0&&'-'}¥{fmt(Math.abs(unallocated))}
                </div>
              </div>
            </div>
            <div style={{ background:C.bgCard, borderRadius:6, height:12, overflow:'hidden', display:'flex', marginBottom:10 }}>
              {cats.map(c => {
                const w = income > 0 ? Math.min(99, Math.round((budgets[c.key]||0)/income*100)) : 0;
                return w > 0 ? <div key={c.key} style={{ width:`${w}%`, background:c.color, height:'100%' }} /> : null;
              })}
            </div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:'6px 14px' }}>
              {cats.map(c => income>0 && (budgets[c.key]||0)>0 ? (
                <div key={c.key} style={{ display:'flex', alignItems:'center', gap:4 }}>
                  <div style={{ width:7, height:7, borderRadius:2, background:c.color }} />
                  <span style={{ fontSize:11, color:C.textMuted }}>{c.key} {Math.round((budgets[c.key]||0)/income*100)}%</span>
                </div>
              ) : null)}
            </div>
          </Card>

          {income > 0 && (
            <Card>
              <div style={{ fontSize:12, fontWeight:700, color:C.textMuted, marginBottom:12 }}>クイック配分</div>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {['バランス型','節税重視','事業優先'].map(p => (
                  <button key={p} onClick={() => applyPreset(p)} style={{ background:C.bg, borderRadius:10, padding:'11px 14px', fontSize:13, fontWeight:600, color:C.primary, border:`1.5px solid ${C.primary}33`, cursor:'pointer', textAlign:'left' }}>{p}</button>
                ))}
              </div>
            </Card>
          )}
        </div>

        {/* Right: Per-category cards */}
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {cats.map(item => {
            const budget = budgets[item.key] || 0;
            const used = usedMap[item.key] || 0;
            const pct = budget > 0 ? Math.min(100, Math.round(used/budget*100)) : 0;
            const remaining = Math.max(0, budget - used);
            const over = used > budget && budget > 0;
            const incPct = income > 0 && budget > 0 ? Math.round(budget/income*100) : 0;

            return (
              <Card key={item.key} hover>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
                  <div style={{ width:46, height:46, background:item.color+'18', borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>{item.icon}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:C.text }}>{item.name}</div>
                    <div style={{ fontSize:12, color:C.textMuted }}>{item.desc}</div>
                  </div>
                  {editKey === item.key ? (
                    <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                      <span style={{ fontSize:14, color:C.textMuted }}>¥</span>
                      <input autoFocus type="number" value={editVal}
                        onChange={e => setEditVal(e.target.value)}
                        onBlur={() => commitEdit(item.key)}
                        onKeyDown={e => e.key==='Enter' && commitEdit(item.key)}
                        style={{ width:110, fontSize:16, fontWeight:700, padding:'8px 10px', border:`2px solid ${item.color}`, borderRadius:10, outline:'none', textAlign:'right', background:'white' }}
                      />
                    </div>
                  ) : (
                    <button onClick={() => { setEditKey(item.key); setEditVal(String(budget)); }}
                      style={{ background:C.bg, borderRadius:12, padding:'8px 14px', border:`1.5px solid ${C.border}`, cursor:'pointer', display:'flex', alignItems:'center', gap:7 }}>
                      <span style={{ fontSize:15, fontWeight:700, color:C.text, fontFeatureSettings:tnum }}>¥{fmt(budget)}</span>
                      <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L3.5 10.5H1.5V8.5L8.5 1.5Z" stroke={C.textMuted} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </button>
                  )}
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:8 }}>
                  <span style={{ color:C.textMuted }}>使用 <strong style={{ color:over?C.warning:C.text, fontFeatureSettings:tnum }}>¥{fmt(used)}</strong></span>
                  <div style={{ display:'flex', gap:14, alignItems:'center' }}>
                    {budget > 0 && <span style={{ color:over?C.warning:C.primary }}>残 <strong style={{ fontFeatureSettings:tnum }}>¥{fmt(remaining)}</strong></span>}
                    {incPct > 0 && <span style={{ color:C.textFaint }}>収入の{incPct}%</span>}
                  </div>
                </div>
                {budget > 0 ? (
                  <>
                    <Bar pct={pct} color={over?C.warning:item.color} h={8} />
                    <div style={{ textAlign:'right', fontSize:11, color:over?C.warning:C.textMuted, marginTop:4 }}>{pct}%{over&&' 超過'}</div>
                  </>
                ) : (
                  <div style={{ fontSize:12, color:C.textFaint, fontStyle:'italic' }}>クリックして予算を設定 →</div>
                )}
              </Card>
            );
          })}
        </div>
      </div>
    </Shell>
  );
}

// ── TAX & SAVINGS ─────────────────────────────────────────────────────────
function TaxScreen({ go }) {
  const { selYm } = React.useContext(MonthCtx);
  const s = Store.get('settings', {});
  const income = (s.salary || 0) + (s.sideIncome || 0) + (s.income || 0);
  const taxRate = s.taxRate || 20;
  const goalAmt = Math.round(income * taxRate / 100);
  const txns = Store.get('transactions',[]).filter(t=>t.date&&t.date.startsWith(selYm));
  const savedAmt = sumDiv(txns, '税金');
  const pct = goalAmt > 0 ? Math.min(100, Math.round(savedAmt / goalAmt * 100)) : 0;
  const dashOffset = Math.round(327 * (1 - pct / 100));
  const remaining = Math.max(0, goalAmt - savedAmt);
  const today = new Date();
  const [selY, selM] = selYm.split('-').map(Number);
  const isCurrentMonth = selYm === TODAY.slice(0,7);
  const daysLeft = isCurrentMonth ? new Date(selY, selM, 0).getDate() - today.getDate() : 0;

  const allTxns = Store.get('transactions', []);
  const history = Array.from({length: 4}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const ym = d.toISOString().slice(0,7);
    const label = `${d.getMonth()+1}月`;
    const mSaved = allTxns.filter(t => t.date && t.date.startsWith(ym) && t.type === 'expense' && t.division === '税金').reduce((s,t) => s+t.amount, 0);
    const mPct = goalAmt > 0 ? Math.min(100, Math.round(mSaved/goalAmt*100)) : 0;
    return { m: label, pct: mPct, amt: `¥${fmt(mSaved)}`, color: mPct >= 100 ? C.primary : C.warning };
  }).reverse();

  return (
    <Shell active="tax" go={go} title="税金・積立" subtitle={`${today.getMonth()+1}月 — 目標達成まで頑張ろう`} actions={<MonthPill />}>
      <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 20, alignItems: 'start' }}>
        <Card style={{ padding: 30 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
            <div style={{ position: 'relative', width: 156, height: 156, flexShrink: 0 }}>
              <svg width="156" height="156" viewBox="0 0 128 128" style={{ position: 'absolute', inset: 0 }}>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.bgCard} strokeWidth="11"/>
                <circle cx="64" cy="64" r="52" fill="none" stroke={C.warning} strokeWidth="11" strokeDasharray="327" strokeDashoffset={dashOffset} strokeLinecap="round" transform="rotate(-90 64 64)"/>
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ fontSize: 30, fontWeight: 700, color: C.warning, lineHeight: 1, fontFeatureSettings: tnum }}>{pct}%</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 5 }}>達成</div>
              </div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6 }}>積み立て済み</div>
              <div style={{ fontSize: 34, fontWeight: 700, color: C.warning, letterSpacing: '-1.2px', fontFeatureSettings: tnum, lineHeight: 1.1 }}>¥{fmt(savedAmt)}</div>
              <div style={{ height: 1, background: C.bgCard, margin: '16px 0' }} />
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 4 }}>今月の目標</div>
              <div style={{ fontSize: 24, fontWeight: 700, color: C.text, fontFeatureSettings: tnum }}>¥{fmt(goalAmt)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>収入の{taxRate}%</div>
            </div>
          </div>
          {remaining > 0 && (
            <div style={{ marginTop: 24, background: C.warningBg, borderRadius: 14, padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 12 }}>
              <svg width="20" height="20" viewBox="0 0 18 18" fill="none"><path d="M9 2L16 14H2L9 2Z" stroke={C.warning} strokeWidth="1.4" fill="none" strokeLinejoin="round"/><path d="M9 7V10M9 12V12.5" stroke={C.warning} strokeWidth="1.4" strokeLinecap="round"/></svg>
              <div style={{ fontSize: 13, color: C.warning, lineHeight: 1.6 }}>あと <strong style={{ fontSize: 16, fontFeatureSettings: tnum }}>¥{fmt(remaining)}</strong> 積み立てが必要です。月末まであと{daysLeft}日。</div>
            </div>
          )}
          {remaining === 0 && goalAmt > 0 && (
            <div style={{ marginTop: 24, background: C.primaryLight, borderRadius: 14, padding: '16px 18px', fontSize: 13, color: C.primary, fontWeight: 700 }}>今月の目標達成！ お疲れ様です 🎉</div>
          )}
        </Card>

        <div style={{ background: C.primaryLight, borderRadius: 20, padding: 26 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.primary, marginBottom: 12 }}>税金ガイド</div>
          <div style={{ fontSize: 13, color: C.textMed, lineHeight: 2 }}>年間所得400万円の場合、所得税+住民税の目安は約25〜30%です。<br/><br/>消費税の納付義務がある場合はさらに10%の積み立てが必要です。早めの確保で年度末の負担を減らせます。</div>
        </div>
      </div>

      <Card style={{ marginTop: 20 }}>
        <SectionTitle>月別積立状況</SectionTitle>
        {history.map(row => (
          <div key={row.m} style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 14 }}>
            <div style={{ fontSize: 13, color: C.textMuted, width: 32, flexShrink: 0 }}>{row.m}</div>
            <div style={{ flex: 1 }}><Bar pct={row.pct} color={row.color} h={10} /></div>
            <div style={{ fontSize: 13, fontWeight: 700, color: row.color, width: 72, textAlign: 'right', fontFeatureSettings: tnum }}>{row.amt}</div>
          </div>
        ))}
      </Card>

      {(() => {
        const monthlyInvest = (() => {
          const s = Store.get('settings', {});
          const budgets = Store.get('budgets', {});
          return budgets['投資'] || s.savingsGoal || 0;
        })();
        if (monthlyInvest <= 0) return null;
        const fv = (pmt, rate, years) => Math.round(pmt * ((Math.pow(1 + rate/12, years*12) - 1) / (rate/12)));
        const r5 = 0.05;
        const rows = [
          { label: '10年後', val: fv(monthlyInvest, r5, 10) },
          { label: '20年後', val: fv(monthlyInvest, r5, 20) },
          { label: '30年後', val: fv(monthlyInvest, r5, 30) },
        ];
        return (
          <Card style={{ marginTop: 20, background: 'linear-gradient(135deg, #EDE8F8 0%, #E8F5F0 100%)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>将来の資産シミュレーション</div>
                <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>毎月 ¥{fmt(monthlyInvest)} 積立 × 年利5%（複利）</div>
              </div>
              <span style={{ fontSize: 18 }}>📈</span>
            </div>
            <div style={{ display: 'flex', gap: 16 }}>
              {rows.map(r => (
                <div key={r.label} style={{ flex: 1, background: 'white', borderRadius: 14, padding: '16px 14px', textAlign: 'center' }}>
                  <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>{r.label}</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: C.invest, fontFeatureSettings: tnum, letterSpacing: '-0.5px' }}>¥{fmt(r.val)}</div>
                  <div style={{ fontSize: 10, color: C.textFaint, marginTop: 3 }}>元本 ¥{fmt(monthlyInvest * (r.label==='10年後'?120:r.label==='20年後'?240:360))}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 12, fontSize: 11, color: C.textFaint, lineHeight: 1.6 }}>※ 参考値。実際の運用利回りは変動します。NISA・iDeCo口座では利益が非課税になります。</div>
          </Card>
        );
      })()}
    </Shell>
  );
}

// ── REPORT ────────────────────────────────────────────────────────────────
function ReportScreen({ go }) {
  const allTxns = Store.get('transactions', []);
  const today = new Date();
  const months = Array.from({length: 6}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - 5 + i, 1);
    const ym = d.toISOString().slice(0,7);
    const mTxns = allTxns.filter(t => t.date && t.date.startsWith(ym));
    const inc = mTxns.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
    const exp = mTxns.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
    return { label: `${d.getMonth()+1}月`, rawInc: inc, rawExp: exp, isCurrent: i === 5 };
  });
  const maxVal = Math.max(...months.map(m => Math.max(m.rawInc, m.rawExp)), 1);
  const chartH = 100;
  const scale = v => Math.round(v / maxVal * chartH);

  const currYm = TODAY.slice(0,7);
  const currTxns = allTxns.filter(t => t.date && t.date.startsWith(currYm));
  const thisInc = currTxns.filter(t => t.type==='income').reduce((s,t)=>s+t.amount, 0);
  const thisExp = currTxns.filter(t => t.type==='expense').reduce((s,t)=>s+t.amount, 0);
  const savingsRate = thisInc > 0 ? ((thisInc - thisExp) / thisInc * 100).toFixed(1) : '0.0';

  const prevYm = new Date(today.getFullYear(), today.getMonth()-1, 1).toISOString().slice(0,7);
  const prevTxns = allTxns.filter(t => t.date && t.date.startsWith(prevYm));
  const prevInc = prevTxns.filter(t => t.type==='income').reduce((s,t)=>s+t.amount, 0);
  const prevExp = prevTxns.filter(t => t.type==='expense').reduce((s,t)=>s+t.amount, 0);

  const byCat = {};
  currTxns.filter(t => t.type==='expense').forEach(t => { byCat[t.category] = (byCat[t.category]||0) + t.amount; });
  const ranking = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([name,amt],i) => ({ rank:i+1, name, amt }));

  const mom = [
    { label:'収入',    prevAmt: prevInc, currAmt: thisInc },
    { label:'支出',    prevAmt: prevExp, currAmt: thisExp },
  ].map(r => {
    const diff = r.currAmt - r.prevAmt;
    const positive = r.label === '収入' ? diff >= 0 : diff <= 0;
    return { ...r, diff, positive, diffStr: (diff >= 0 ? '+' : '') + `¥${fmt(Math.abs(diff))}` };
  });

  const summary = [
    { label:'収入',   value:`¥${fmt(thisInc)}`, color: C.primary, sub:'今月確定' },
    { label:'支出',   value:`¥${fmt(thisExp)}`, color: C.text,    sub:'今月合計' },
    { label:'貯蓄率', value:`${savingsRate}%`,  color: C.invest,  sub:'税引き前' },
  ];

  const fixedItems = Store.get('fixedExpenses', []).filter(i => i.active);
  const fixedMonthly = fixedItems.filter(i => i.cycle !== 'yearly').reduce((s, i) => s + i.amount, 0);
  const fixedYearly  = fixedItems.filter(i => i.cycle === 'yearly').reduce((s, i) => s + i.amount, 0);
  const fixedCatMap = { rent:'🏠', utility:'💡', comms:'📱', sub:'📺', insure:'🛡️', other:'📋' };

  return (
    <Shell active="report" go={go} title="月次レポート" subtitle={`${today.getMonth()+1}月の収支サマリー`} actions={<MonthPill />}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 20 }}>
        {summary.map(s => (
          <Card key={s.label} hover>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 8 }}>{s.label}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: s.color, letterSpacing: '-1px', fontFeatureSettings: tnum }}>{s.value}</div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>{s.sub}</div>
          </Card>
        ))}
      </div>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>6ヶ月の収支推移</div>
          <div style={{ display: 'flex', gap: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}><div style={{ width: 11, height: 11, borderRadius: 3, background: C.primary }} /><span style={{ fontSize: 12, color: C.textMuted }}>収入</span></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}><div style={{ width: 11, height: 11, borderRadius: 3, background: C.info }} /><span style={{ fontSize: 12, color: C.textMuted }}>支出</span></div>
          </div>
        </div>
        <svg viewBox="0 0 348 150" style={{ width: '100%', maxHeight: 260, overflow: 'visible' }}>
          {[10, 43, 77].map(y => <line key={y} x1="0" y1={y} x2="348" y2={y} stroke={C.bgCard} strokeWidth="1"/>)}
          <line x1="0" y1="110" x2="348" y2="110" stroke={C.border} strokeWidth="1.2"/>
          {months.map((d, i) => {
            const ih = scale(d.rawInc), eh = scale(d.rawExp);
            return (
              <g key={d.label}>
                <rect x={i*58+6}  y={110-ih} width="20" height={ih} rx="4" fill={C.primary} opacity={d.isCurrent ? 1 : 0.7}/>
                <rect x={i*58+29} y={110-eh} width="20" height={eh} rx="4" fill={C.info}    opacity={d.isCurrent ? 1 : 0.7}/>
                <text x={i*58+24} y="128" textAnchor="middle" fontSize="10" fill={d.isCurrent ? C.text : C.textFaint} fontWeight={d.isCurrent ? '700' : '400'} fontFamily="sans-serif">{d.label}</text>
              </g>
            );
          })}
        </svg>
      </Card>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, alignItems: 'start', marginBottom: 20 }}>
        <Card>
          <SectionTitle>支出カテゴリ Top4</SectionTitle>
          {ranking.length === 0 ? (
            <div style={{ textAlign:'center', padding:'24px 0', color:C.textFaint, fontSize:13 }}>まだ支出がありません</div>
          ) : ranking.map(r => (
            <div key={r.rank} style={{ display: 'flex', alignItems: 'center', gap: 13, marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.textMuted, width: 18 }}>{r.rank}</div>
              <div style={{ width: 10, height: 10, borderRadius: 3, background: C.info }} />
              <div style={{ flex: 1, fontSize: 14, color: C.text, fontWeight: 500 }}>{r.name}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.text, fontFeatureSettings: tnum }}>¥{fmt(r.amt)}</div>
            </div>
          ))}
        </Card>
        <Card>
          <SectionTitle>前月比較</SectionTitle>
          {mom.map((r, i) => (
            <div key={r.label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingBottom: i < 1 ? 13 : 0, borderBottom: i < 1 ? `1px solid ${C.bgCard}` : 'none', marginBottom: i < 1 ? 13 : 0 }}>
              <span style={{ fontSize: 14, color: C.textMed }}>{r.label}</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 12, color: C.textMuted, fontFeatureSettings: tnum }}>前月 ¥{fmt(r.prevAmt)}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: r.positive ? C.primary : C.warning, fontFeatureSettings: tnum }}>{r.diffStr}</span>
              </div>
            </div>
          ))}
        </Card>
      </div>

      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <SectionTitle style={{ marginBottom: 0 }}>契約中のサブスク・固定費</SectionTitle>
          <div style={{ display: 'flex', gap: 14 }}>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600 }}>毎月</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.info, fontFeatureSettings: tnum }}>¥{fmt(fixedMonthly)}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600 }}>年間一括</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.invest, fontFeatureSettings: tnum }}>¥{fmt(fixedYearly)}</div>
            </div>
          </div>
        </div>
        {fixedItems.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '24px 0', color: C.textFaint, fontSize: 13 }}>登録された固定費がありません</div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 10 }}>
            {fixedItems.map(item => (
              <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 10, background: C.bg, borderRadius: 12, padding: '12px 14px' }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>
                  {fixedCatMap[item.cat] || '📋'}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.name}</div>
                  <div style={{ fontSize: 11, color: C.textFaint, marginTop: 2 }}>
                    {item.payment} · {item.cycle === 'yearly' ? `年1回（${item.month}月）` : item.day}
                  </div>
                </div>
                {item.cycle === 'yearly' && <span style={{ fontSize: 10, fontWeight: 700, color: C.invest, background: C.invest+'18', borderRadius: 5, padding: '2px 6px', flexShrink: 0 }}>年払</span>}
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text, fontFeatureSettings: tnum, flexShrink: 0 }}>¥{fmt(item.amount)}</div>
              </div>
            ))}
          </div>
        )}
      </Card>
    </Shell>
  );
}

  { id: 'savings',  name: '預金',       emoji: '🏦', color: '#097D60' },
  { id: 'stocks',   name: '投資・株式', emoji: '📈', color: '#E8935F' },
  { id: 'property', name: '不動産',     emoji: '🏠', color: '#6A5E9C' },
  { id: 'other',    name: 'その他',     emoji: '📋', color: '#9CA3AF' },
];
const NW_LIAB_CATS = [
  { id: 'mortgage', name: '住宅ローン',   emoji: '🏦', color: '#C8748E' },
  { id: 'loan',     name: '奨学金ローン', emoji: '🎓', color: '#DC6B6B' },

];

function NetWorthScreen({ go }) {
  const [data, setData] = useState(() => Store.get('networth', { assets: [], liabilities: [] }));
  const [viewTab, setViewTab] = useState('assets');
  const [showForm, setShowForm] = useState(false);
  const [formTab, setFormTab] = useState('assets');
  const [form, setForm] = useState({ name: '', institution: '', amount: '', cat: 'savings' });

  const save = () => {
    if (!form.name || !form.amount) return;
    const item = { id: Date.now(), name: form.name, institution: form.institution, amount: Number(form.amount), cat: form.cat };
    const next = { ...data, [formTab]: [...data[formTab], item], updatedAt: TODAY };
    setData(next); Store.set('networth', next);
    setForm({ name: '', institution: '', amount: '', cat: formTab === 'assets' ? 'savings' : 'mortgage' });
    setShowForm(false);
  };
  const remove = (type, id) => {
    const next = { ...data, [type]: data[type].filter(i => i.id !== id), updatedAt: TODAY };
    setData(next); Store.set('networth', next);
  };

  const totalAssets = data.assets.reduce((s,i) => s+i.amount, 0);
  const totalLiab   = data.liabilities.reduce((s,i) => s+i.amount, 0);
  const netWorth    = totalAssets - totalLiab;
  const nwPos       = netWorth >= 0;
  const viewItems   = data[viewTab];
  const viewCats    = viewTab === 'assets' ? NW_ASSET_CATS : NW_LIAB_CATS;
  const inputStyle  = { background: C.bg, borderRadius: 10, padding: '11px 14px', fontSize: 14, color: C.text, border: `1.5px solid ${C.border}`, width: '100%', outline: 'none' };

  return (
    <Shell active="networth" go={go} title="財産目録" subtitle="資産と負債を管理して純資産を把握する" maxWidth={1100}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.6fr', gap: 20, alignItems: 'start' }}>

        {/* Left column */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Card>
            <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>純資産　①−②</div>
            <div style={{ fontSize: 38, fontWeight: 700, letterSpacing: '-2px', fontFeatureSettings: tnum, color: nwPos ? C.primary : C.warning }}>
              {nwPos ? '' : '−'}¥{fmt(Math.abs(netWorth))}
            </div>
            {data.updatedAt && <div style={{ fontSize: 11, color: C.textFaint, marginTop: 4 }}>最終更新 {data.updatedAt}</div>}
            <div style={{ height: 1, background: C.border, margin: '16px 0' }} />
            <div style={{ display: 'flex', gap: 16 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>プラスの財産 ①</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: C.primary, fontFeatureSettings: tnum }}>¥{fmt(totalAssets)}</div>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>マイナスの財産 ②</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: C.warning, fontFeatureSettings: tnum }}>¥{fmt(totalLiab)}</div>
              </div>
            </div>
          </Card>

          <button onClick={() => setShowForm(v => !v)} className="lift" style={{ width: '100%', background: C.primary, color: 'white', borderRadius: 12, padding: '12px', fontSize: 14, fontWeight: 700, boxShadow: '0 6px 18px rgba(9,125,96,0.28)' }}>
            {showForm ? '× 閉じる' : '+ 財産を追加'}
          </button>

          {showForm && (
            <Card>
              <div style={{ display: 'flex', background: C.bg, borderRadius: 12, padding: 3, gap: 3, marginBottom: 16 }}>
                {[{k:'assets',l:'プラスの財産'},{k:'liabilities',l:'マイナスの財産'}].map(t => (
                  <button key={t.k} onClick={() => { setFormTab(t.k); setForm(f=>({...f, cat: t.k==='assets'?'savings':'mortgage'})); }}
                    style={{ flex:1, background: formTab===t.k ? C.primary : 'transparent', color: formTab===t.k ? 'white' : C.textMuted, borderRadius: 10, padding: '8px', fontSize: 12, fontWeight: formTab===t.k ? 700 : 400 }}>{t.l}</button>
                ))}
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div>
                  <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>名称</div>
                  <input value={form.name} onChange={e => setForm(f=>({...f, name: e.target.value}))} placeholder="例：普通預金、○○株式" style={inputStyle} />
                </div>
                <div>
                  <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>金融機関名（任意）</div>
                  <input value={form.institution} onChange={e => setForm(f=>({...f, institution: e.target.value}))} placeholder="例：○○銀行" style={inputStyle} />

                <div>
                  <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>金額（円）</div>
                  <input type="number" value={form.amount} onChange={e => setForm(f=>({...f, amount: e.target.value}))} placeholder="0" style={{ ...inputStyle, fontSize: 22, fontWeight: 700 }} />
                </div>
                <div>
                  <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>カテゴリ</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                    {(formTab === 'assets' ? NW_ASSET_CATS : NW_LIAB_CATS).map(c => (
